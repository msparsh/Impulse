                        } else return;

                        if (nextIndex >= 0 && nextIndex < blocks.length) {
                            e.preventDefault();
                            blocks[nextIndex].focus();
                        }
                    });
                }

                paintBlock(block) {
                    const date = block.dataset.date;
                    const row = block.dataset.row;
                    const col = block.dataset.col;
                    const currentProjId =
                        this.state.getSchedule(date)?.blocks[`${row}-${col}`];
                    const targetProjId =
                        this.state.paintProjectId === "CLEAR"
                            ? null
                            : this.state.paintProjectId;
                    if (currentProjId !== targetProjId)
                        globalBus.emit("block:update", {
                            date,
                            row,
                            col,
                            projectId: targetProjId,
                        });
                }

                listenToEvents() {
                    globalBus.on(
                        "block:updated",
                        ({ date, row, col, project }) => {
                            const blockEl =
                                this.blockNodes[`${date}-${row}-${col}`];
                            if (!blockEl) return;
                            if (project) {
                                blockEl.style.backgroundColor = project.color;
                                blockEl.classList.add("filled");
                                blockEl.title = project.name;
                            } else {
                                blockEl.style.backgroundColor = "";
                                blockEl.classList.remove("filled");
                                blockEl.title = "Empty (Click to set)";
                            }
                            blockEl.dataset.origBg =
                                blockEl.style.backgroundColor;
                        },
                    );
                    globalBus.on("view:refresh", () => this.refreshAllViews());
                    globalBus.on("schedule:refreshed", () =>
                        this.refreshScheduleView(),
                    );
                    globalBus.on("analytics:refreshed", () =>
                        this.renderAnalytics(
                            this.state.getDailyAnalytics(),
                            this.state.getTypes(),
                        ),
                    );
                    globalBus.on("hierarchy:refreshed", () => {
                        this.renderSettings();
                        this.renderSidebarProjects(
                            this.state.getProjects(),
                            this.state.getTypes(),
                        );
                    });

                    globalBus.on("preview:blocks", (changes) => {
                        Object.values(this.blockNodes).forEach((block) => {
                            if (block.classList.contains("is-previewing")) {
                                block.classList.remove(
                                    "is-previewing",
                                    "preview-clear",
                                );
                                block.style.backgroundColor =
                                    block.dataset.origBg || "";
                            }
                            if (!block.classList.contains("is-previewing"))
                                block.dataset.origBg =
                                    block.style.backgroundColor;
                        });

                        if (!changes) return;
                        Object.entries(changes).forEach(([key, pid]) => {
                            const block = this.blockNodes[key];
                            if (!block) return;
                            block.classList.add("is-previewing");
                            if (pid === null) {
                                block.classList.add("preview-clear");
                                block.style.backgroundColor = "";
                            } else {
                                const p = this.state.getProjectById(pid);
                                if (p) block.style.backgroundColor = p.color;
                            }
                        });
                    });
                }

                refreshAllViews() {
                    const date = this.state.getCurrentDate();
                    this.renderHeader(date);
                    this.renderCalendar();
                    this.renderSidebarProjects(
                        this.state.getProjects(),
                        this.state.getTypes(),
                    );
                    this.refreshScheduleView();
                    this.renderAnalytics(
                        this.state.getDailyAnalytics(),
                        this.state.getTypes(),
                    );

                    document.getElementById("btn-view-day").className =
                        `flex-1 py-1.5 text-xs font-bold rounded-lg transition ${this.state.data.viewMode === "day" ? "shadow-sm bg-white text-gray-800" : "text-gray-500 hover:text-gray-700"}`;
                    document.getElementById("btn-view-week").className =
                        `flex-1 py-1.5 text-xs font-bold rounded-lg transition ${this.state.data.viewMode === "week" ? "shadow-sm bg-white text-gray-800" : "text-gray-500 hover:text-gray-700"}`;
                }

                refreshScheduleView() {
                    if (this.state.data.viewMode === "week")
                        this.renderWeekSchedule(
                            this.state.getCurrentDate(),
                            this.state.getHours(),
                            this.state.getProjects(),
                        );
                    else
                        this.renderDaySchedule(
                            this.state.getCurrentDate(),
                            this.state.getHours(),
                            this.state.getProjects(),
                        );

                    this.updateCurrentBlockHighlight();
                }

                renderHeader(dateStr) {
                    const [year, month, day] = dateStr.split("-").map(Number);
                    const dateObj = new Date(year, month - 1, day);

                    if (this.state.data.viewMode === "week") {
                        const start = this.getStartOfWeek(dateStr);
                        const end = new Date(start);
                        end.setDate(start.getDate() + 6);
                        document.getElementById("display-day").innerText =
                            "Week View";
                        document.getElementById("display-date").innerHTML =
                            `<span>${start.toLocaleDateString("en-US", { month: "short", day: "numeric" })} - ${end.toLocaleDateString("en-US", { month: "short", day: "numeric", year: "numeric" })}</span><svg class="w-5 h-5 text-gray-400 group-hover:text-indigo-600 transition-colors" viewBox="0 0 20 20" fill="currentColor"><path fill-rule="evenodd" d="M5.293 7.293a1 1 0 011.414 0L10 10.586l3.293-3.293a1 1 0 111.414 1.414l-4 4a1 1 0 01-1.414 0l-4-4a1 1 0 010-1.414z" clip-rule="evenodd" /></svg>`;
                    } else {
                        const parts = dateObj
                            .toLocaleDateString("en-US", {
                                weekday: "long",
                                year: "numeric",
                                month: "long",
                                day: "numeric",
                            })
                            .split(", ");
                        document.getElementById("display-day").innerText =
                            parts[0];
                        document.getElementById("display-date").innerHTML =
                            `<span>${parts[1]}, ${parts[2]}</span><svg class="w-5 h-5 text-gray-400 group-hover:text-indigo-600 transition-colors" viewBox="0 0 20 20" fill="currentColor"><path fill-rule="evenodd" d="M5.293 7.293a1 1 0 011.414 0L10 10.586l3.293-3.293a1 1 0 111.414 1.414l-4 4a1 1 0 01-1.414 0l-4-4a1 1 0 010-1.414z" clip-rule="evenodd" /></svg>`;
                    }
                }

                renderCalendar() {
                    const grid = document.getElementById("calendar-grid");
                    const monthLabel = document.getElementById(
                        "calendar-month-label",
                    );
                    grid.innerHTML = "";

                    const year = this.state.viewYear;
                    const month = this.state.viewMonth;
                    monthLabel.innerText = new Date(
                        year,
                        month,
                        1,
                    ).toLocaleString("default", {
                        month: "long",
                        year: "numeric",
                    });

                    const firstDay = new Date(year, month, 1).getDay();
                    const daysInMonth = new Date(year, month + 1, 0).getDate();

                    for (let i = 0; i < firstDay; i++)
                        grid.innerHTML += `<div class="py-2"></div>`;

                    for (let day = 1; day <= daysInMonth; day++) {
                        const loopDateStr = `${year}-${String(month + 1).padStart(2, "0")}-${String(day).padStart(2, "0")}`;
                        const isActive =
                            loopDateStr === this.state.getCurrentDate();
                        grid.innerHTML += `<div onclick="app.selectDate('${loopDateStr}'); app.toggleCalendarPopover(event)" class="py-1 cursor-pointer hover:bg-indigo-50 hover:text-indigo-700 rounded-lg transition font-medium ${isActive ? "active-date shadow-md" : "text-gray-700"}">${day}</div>`;
                    }
                }

                renderSidebarProjects(projects, types) {
                    const list = document.getElementById("project-list");
                    list.innerHTML = "";

                    const isEraserActive =
                        this.state.paintProjectId === "CLEAR";
                    const eraserCard = document.createElement("div");
                    eraserCard.className = `project-card flex items-center gap-3 p-2 rounded-lg bg-white border ${isEraserActive ? "paint-active" : "border-gray-100"} shadow-sm cursor-pointer transition mb-4`;
                    eraserCard.title = "Eraser (Clear Blocks)";
                    eraserCard.innerHTML = `<div class="w-4 h-4 rounded-full flex-shrink-0 border-2 border-red-400 bg-red-50 flex items-center justify-center"></div><span class="text-sm font-semibold text-gray-800 truncate hide-on-collapse">Eraser</span>${isEraserActive ? '<span class="paint-active-indicator bg-red-500">Active</span>' : ""}`;
                    eraserCard.onclick = () => app.togglePaintMode("CLEAR");
                    list.appendChild(eraserCard);

                    types.forEach((t) => {
                        const typeProjects = projects.filter(
                            (p) => p.typeId === t.id,
                        );
                        if (typeProjects.length === 0) return;

                        const header = document.createElement("div");
                        header.className =
                            "text-xs font-bold text-gray-400 uppercase tracking-wider mb-2 pl-1 hide-on-collapse";
                        header.textContent = t.name;
                        list.appendChild(header);

                        typeProjects.forEach((p) => {
                            const isActivePaint =
                                this.state.paintProjectId === p.id;
                            const badgeHTML = isActivePaint
                                ? `<span class="paint-active-indicator">Paint</span>`
                                : "";
                            const pCard = document.createElement("div");
                            pCard.className = `project-card flex items-center gap-3 p-2 rounded-lg bg-white border ${isActivePaint ? "paint-active" : "border-gray-100"} shadow-sm cursor-pointer transition`;
                            pCard.title = p.name;
                            pCard.innerHTML = `<div class="w-4 h-4 rounded-full flex-shrink-0" style="background-color: ${p.color};"></div><span class="text-sm font-semibold text-gray-800 truncate hide-on-collapse">${p.name}</span>${badgeHTML}`;
                            pCard.onclick = () => app.togglePaintMode(p.id);
                            list.appendChild(pCard);
                        });
                    });
                }

                renderAnalytics(typeCounts, types) {
                    const bar = document.getElementById("analytics-bar");
                    bar.innerHTML = "";
                    let totalAssigned = 0;
                    types.forEach((t) => {
                        const bCount = typeCounts[t.id] || 0;
                        if (bCount > 0) {
                            const minutes = bCount * 10;
                            const hoursStr =
                                minutes >= 60
                                    ? `${(minutes / 60).toFixed(1)}h`
                                    : `${minutes}m`;
                            bar.innerHTML += `<div class="flex items-center gap-2 px-3 py-1.5 rounded-full bg-gray-50 border border-gray-200 shadow-sm"><span class="text-xs font-semibold text-gray-700">${t.name}: <span class="text-gray-500">${hoursStr}</span></span></div>`;
                            totalAssigned++;
                        }
                    });
                    if (totalAssigned === 0)
                        bar.innerHTML = `<span class="text-sm text-gray-400 font-medium italic">Press '/' to explore commands or click to schedule.</span>`;
                }

                renderDaySchedule(targetDateStr, hours, projects) {
                    const container = document.getElementById("schedule-grid");
                    container.innerHTML = "";
                    this.blockNodes = {};
                    const scheduleObj = this.state.getSchedule(targetDateStr);
                    const blocks = scheduleObj.blocks;
                    const now = new Date();
                    const logicalToday = this.state.getLocalISODate(now);
                    const isToday = targetDateStr === logicalToday;
                    let currentRowIndex = now.getHours();

                    hours.forEach((time, rowIndex) => {
                        const isCurrentRow =
                            isToday && rowIndex === currentRowIndex;
                        const rowEl = document.createElement("div");
                        rowEl.className =
                            "flex items-center gap-4 md:gap-8 group p-2 -mx-2 transition";

                        const timeLabel = document.createElement("div");
                        timeLabel.className =
                            "w-12 md:w-16 text-[10px] md:text-xs font-bold text-gray-400 uppercase tracking-wider text-right shrink-0";
                        timeLabel.textContent = time;

                        if (isCurrentRow) {
                            rowEl.classList.add("current-row-highlight");
                            timeLabel.classList.add("current-time-label");
                        }

                        const blocksContainer = document.createElement("div");
                        blocksContainer.className =
                            "flex gap-2 md:gap-3 flex-wrap";

                        for (let colIndex = 0; colIndex < 6; colIndex++) {
                            const block = document.createElement("button");
                            block.className =
                                "schedule-block circle-btn shadow-sm";
                            block.dataset.date = targetDateStr;
                            block.dataset.row = rowIndex;
                            block.dataset.col = colIndex;
                            block.tabIndex = 0;
                            const blockProjectId =
                                blocks[`${rowIndex}-${colIndex}`];
                            const project = projects.find(
                                (p) => p.id === blockProjectId,
                            );
                            if (project) {
                                block.style.backgroundColor = project.color;
                                block.classList.add("filled");
                                block.title = project.name;
                            } else {
                                block.title =
                                    "Empty (Use Paint or Cmd '/' to set)";
                            }
                            block.dataset.origBg = block.style.backgroundColor;
                            this.blockNodes[
                                `${targetDateStr}-${rowIndex}-${colIndex}`
                            ] = block;
                            blocksContainer.appendChild(block);
                        }
                        rowEl.appendChild(timeLabel);
                        rowEl.appendChild(blocksContainer);
                        container.appendChild(rowEl);
                    });
                }

                getStartOfWeek(dateStr) {
                    const [y, m, d] = dateStr.split("-").map(Number);
                    const dateObj = new Date(y, m - 1, d);
                    const day = dateObj.getDay();
                    dateObj.setDate(dateObj.getDate() - day);
                    return dateObj;
                }

                renderWeekSchedule(currentDateStr, hours, projects) {
                    const container = document.getElementById("schedule-grid");
                    container.innerHTML = "";
                    this.blockNodes = {};
                    const startOfWeek = this.getStartOfWeek(currentDateStr);
                    const weekDates = [];
                    const weekLabels = [];
                    const days = [
                        "SUN",
                        "MON",
                        "TUE",
                        "WED",
                        "THU",
                        "FRI",
                        "SAT",
                    ];

                    for (let i = 0; i < 7; i++) {
                        let d = new Date(startOfWeek);
                        d.setDate(startOfWeek.getDate() + i);
                        const year = d.getFullYear();
                        const month = String(d.getMonth() + 1).padStart(2, "0");
                        const date = String(d.getDate()).padStart(2, "0");
                        const formattedDate = `${year}-${month}-${date}`;
                        weekDates.push(formattedDate);
                        weekLabels.push({
                            day: days[i],
                            date: d.getDate(),
                            isCurrent: formattedDate === currentDateStr,
                        });
                    }

                    const headerRow = document.createElement("div");
                    headerRow.className =
                        "grid grid-cols-[60px_repeat(7,1fr)] gap-2 md:gap-4 mb-2 pb-2 border-b border-gray-100 sticky top-0 bg-white z-10 pt-2";
                    headerRow.innerHTML =
                        `<div></div>` +
                        weekLabels
                            .map(
                                (l) =>
                                    `<div class="flex flex-col items-center justify-center cursor-pointer hover:bg-gray-50 rounded py-1 transition ${l.isCurrent ? "bg-indigo-50 text-indigo-700" : "text-gray-500"}" onclick="app.selectDate('${weekDates[weekLabels.indexOf(l)]}')"><span class="text-[9px] font-bold tracking-widest">${l.day}</span><span class="text-sm font-black ${l.isCurrent ? "text-indigo-700" : "text-gray-800"}">${l.date}</span></div>`,
                            )
                            .join("");
                    container.appendChild(headerRow);

                    const now = new Date();
                    const logicalToday = this.state.getLocalISODate(now);
                    let currentRowIndex = now.getHours();

                    hours.forEach((time, rowIndex) => {
                        const rowEl = document.createElement("div");
                        rowEl.className =
                            "grid grid-cols-[60px_repeat(7,1fr)] gap-2 md:gap-4 items-center group py-1";

                        const timeLabel = document.createElement("div");
                        timeLabel.className =
                            "text-right text-[10px] font-bold text-gray-400 uppercase tracking-wider pr-2";
                        timeLabel.textContent = time;
                        rowEl.appendChild(timeLabel);

                        weekDates.forEach((dateStr) => {
                            const isTodayCol = dateStr === logicalToday;
                            const isCurrentCell =
                                isTodayCol && rowIndex === currentRowIndex;
                            const cellObj = this.state.getSchedule(dateStr);
                            const blocks = cellObj.blocks;
                            const cellContainer = document.createElement("div");
                            cellContainer.className = `week-cell ${isCurrentCell ? "border-indigo-300 bg-indigo-50/30" : ""}`;

                            for (let colIndex = 0; colIndex < 6; colIndex++) {
                                const block = document.createElement("div");
                                block.className = "schedule-block tiny-dot";
                                block.dataset.date = dateStr;
                                block.dataset.row = rowIndex;
                                block.dataset.col = colIndex;
                                block.tabIndex = 0;
                                const blockProjectId =
                                    blocks[`${rowIndex}-${colIndex}`];
                                const project = projects.find(
                                    (p) => p.id === blockProjectId,
                                );
                                if (project) {
                                    block.style.backgroundColor = project.color;
                                    block.classList.add("filled");
                                    block.title = project.name;
                                } else {
                                    block.title =
                                        "Empty (Use Paint or Cmd '/' to set)";
                                }
                                block.dataset.origBg =
                                    block.style.backgroundColor;
                                this.blockNodes[
                                    `${dateStr}-${rowIndex}-${colIndex}`
                                ] = block;
                                cellContainer.appendChild(block);
                            }
                            rowEl.appendChild(cellContainer);
                        });
                        container.appendChild(rowEl);
                    });
                }

                renderSettings() {
                    const list = document.getElementById("hierarchy-list");
                    list.innerHTML = "";

                    const types = this.state.getTypes();
                    const projects = this.state.getProjects();

                    types.forEach((t) => {
                        const typeProjs = projects.filter(
                            (p) => p.typeId === t.id,
                        );
                        const typeBlock = document.createElement("div");
                        typeBlock.className = "mb-8 bg-gray-50 rounded-xl";
                        typeBlock.draggable = true;
                        typeBlock.dataset.dragEntity = "type";
                        typeBlock.dataset.dragId = t.id;
                        typeBlock.dataset.dropZone = "true";
                        typeBlock.dataset.dropEntity = "type";

                        typeBlock.innerHTML = `
                        <div class="flex items-center justify-between mb-3 group/type border border-gray-200 bg-white p-3 rounded-xl shadow-sm"><div class="flex items-center gap-2"><svg class="grab-handle w-5 h-5 text-gray-400" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="9" cy="12" r="1"/><circle cx="9" cy="5" r="1"/><circle cx="9" cy="19" r="1"/><circle cx="15" cy="12" r="1"/><circle cx="15" cy="5" r="1"/><circle cx="15" cy="19" r="1"/></svg><h4 class="text-sm font-black text-gray-900 uppercase tracking-widest" contenteditable="true" data-entity="type" data-id="${t.id}" title="Click to edit">${t.name}</h4><span class="text-xs text-gray-500 bg-gray-100 px-2 py-0.5 rounded-full font-bold">${typeProjs.length}</span></div><div class="flex gap-2 opacity-0 group-hover/type:opacity-100 transition"><button onclick="app.addProjectToType('${t.id}')" class="text-xs font-bold text-indigo-600 hover:bg-indigo-50 px-3 py-1.5 rounded-lg border border-indigo-100">Add Project</button><button onclick="app.requestRemoveType('${t.id}')" class="text-xs font-bold text-red-500 hover:bg-red-50 px-3 py-1.5 rounded-lg border border-transparent">Delete</button></div></div>
                        <div class="flex flex-col gap-2 pl-8 pb-2" id="proj-container-${t.id}" data-drop-zone="true" data-drop-entity="type-container" data-drop-id="${t.id}"></div>
                    `;
                        list.appendChild(typeBlock);

                        const projContainer = document.getElementById(
                            `proj-container-${t.id}`,
                        );

                        if (typeProjs.length === 0) {
                            projContainer.innerHTML = `<div class="text-xs text-gray-400 italic py-3 pointer-events-none">Empty category. Drop projects here or click 'Add Project'.</div>`;
                        } else {
                            typeProjs.forEach((p) => {
                                const pCard = document.createElement("div");
                                pCard.className =
                                    "flex items-center justify-between p-3 bg-white border border-gray-200 rounded-xl shadow-sm hover:shadow-md transition group/proj";
                                pCard.draggable = true;
                                pCard.dataset.dragEntity = "project";
                                pCard.dataset.dragId = p.id;
                                pCard.dataset.dropZone = "true";
                                pCard.dataset.dropEntity = "project";
                                pCard.innerHTML = `<div class="flex items-center gap-3 flex-1 overflow-hidden"><svg class="grab-handle w-5 h-5 text-gray-300 shrink-0" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><line x1="8" y1="6" x2="16" y2="6"/><line x1="8" y1="12" x2="16" y2="12"/><line x1="8" y1="18" x2="16" y2="18"/></svg><input type="color" data-entity="project-color" data-id="${p.id}" value="${p.color}" class="w-6 h-6 rounded-md cursor-pointer border-0 p-0 shadow-inner shrink-0 bg-transparent"/><span class="text-sm font-semibold text-gray-800 truncate" contenteditable="true" data-entity="project" data-id="${p.id}" title="Click to edit">${p.name}</span></div><button onclick="app.removeProject('${p.id}')" class="opacity-0 group-hover/proj:opacity-100 text-red-400 hover:text-red-600 font-bold text-xs transition px-2 py-1 bg-red-50 rounded-md">Remove</button>`;
                                projContainer.appendChild(pCard);
                            });
                        }
                    });
                }

                toggleModal(modalId, show) {
                    const modal = document.getElementById(modalId);
                    const bg = modal;
                    const content = modal.querySelector(".modal-content");
                    if (show) {
                        modal.classList.remove("hidden");
                        bg.classList.remove("closing");
                        content.classList.remove("closing");
                    } else {
                        bg.classList.add("closing");
                        content.classList.add("closing");
                        setTimeout(() => {
                            modal.classList.add("hidden");
                            bg.classList.remove("closing");
                            content.classList.remove("closing");
                        }, 100);
                    }
                }

                showConfirm(typeId) {
                    const projs = this.state.getProjectsByType(typeId);
                    document.getElementById("confirm-count").innerText =
                        projs.length;
                    document.getElementById("confirm-project-list").innerHTML =
                        projs.map((p) => `<li>${p.name}</li>`).join("");
                    document.getElementById("confirm-action-btn").onclick =
                        () => {
                            app.executeRemoveType(typeId);
                            this.toggleModal("confirm-modal", false);
                        };
                    this.toggleModal("confirm-modal", true);
                }
            }

            // ==========================================
            // 4. APP CONTROLLER
            // ==========================================
            class AppController {
                constructor() {
                    this.state = new StateManager();
                    this.ui = new UIManager(this.state);
                    this.cmd = new CommandPalette(this, this.state);
                    this.clipboardDay = null;
                    this.focusTimerInterval = null;

                    this.setupLogicListeners();
                    this.state.ensureDateExists(this.state.getCurrentDate());

                    // Initialize Sidebar State
                    if (this.state.data.isSidebarCollapsed) {
                        document
                            .getElementById("app-sidebar")
                            .classList.add("sidebar-collapsed");
                        document.getElementById("icon-arrow").style.opacity =
                            "0";
                        document.getElementById("icon-arrow").style.transform =
                            "rotate(-90deg)";
                        document.getElementById("icon-burger").style.opacity =
                            "1";
                        document.getElementById("icon-burger").style.transform =
                            "rotate(0deg)";
                    }

                    globalBus.emit("view:refresh");

                    setTimeout(() => {
                        const timeLabel = document.querySelector(
                            ".current-time-label",
                        );
                        if (timeLabel) {
                            const row = timeLabel.closest(".grid, .flex");
                            const rowIdx = Array.from(
                                row.parentElement.children,
                            ).indexOf(row);
                            if (rowIdx < 20) {
                                document.getElementById(
                                    "scroll-container",
                                ).scrollTop = row.offsetTop - 100;
                            }
                        }
                    }, 100);
                }

                enterFocusModeSelection(startRow, startCol) {
                    const overlay =
                        document.getElementById("focus-mode-overlay");
                    const selector = document.getElementById(
                        "focus-project-selector",
                    );
                    const nameEl =
                        document.getElementById("focus-project-name");
                    const timerEl = document.getElementById("focus-timer");
                    const list = document.getElementById("focus-project-list");

                    if (this.focusTimerInterval) {
                        clearInterval(this.focusTimerInterval);
                    }

                    nameEl.classList.add("hidden");
                    timerEl.classList.add("hidden");
                    selector.classList.remove("hidden");
                    overlay.classList.remove("hidden");

                    list.innerHTML = "";
                    const projects = this.state.getProjects();

                    if (projects.length === 0) {
                        list.innerHTML = `<div class="p-4 text-center text-gray-500 text-sm font-bold border border-dashed border-gray-300 rounded-xl">No projects available. Close to create one first!</div>`;
                    } else {
                        projects.forEach((p) => {
                            const btn = document.createElement("button");
                            btn.className =
                                "flex items-center gap-3 p-3 w-full hover:bg-indigo-50 rounded-xl transition text-left group/btn border border-gray-200 hover:border-indigo-300 hover:shadow-md bg-white shadow-sm mb-2";
                            btn.innerHTML = `<div class="w-4 h-4 rounded-full flex-shrink-0" style="background-color: ${p.color}"></div><span class="text-sm font-bold text-gray-800 truncate">${p.name}</span>`;
                            btn.onclick = () =>
                                this.selectFocusProject(
                                    p.id,
                                    startRow,
                                    startCol,
                                );
                            list.appendChild(btn);
                        });
                    }
                }

                selectFocusProject(projectId, row, col) {
                    const dateStr = this.state.getLocalISODate(new Date());

                    globalBus.emit("block:update", {
                        date: dateStr,
                        row: row,
                        col: col,
                        projectId: projectId,
                    });

                    document
                        .getElementById("focus-project-selector")
                        .classList.add("hidden");
                    document
                        .getElementById("focus-timer")
                        .classList.remove("hidden");
                    document
                        .getElementById("focus-project-name")
                        .classList.remove("hidden");

                    this.enterFocusMode(projectId, row, col);
                }

                enterFocusMode(projectId, startRow, startCol) {
                    if (this.focusTimerInterval) {
                        clearInterval(this.focusTimerInterval);
                    }

                    const project = this.state.getProjectById(projectId);
                    if (!project) return;

                    const overlay =
                        document.getElementById("focus-mode-overlay");
                    const nameEl =
                        document.getElementById("focus-project-name");
                    const timerEl = document.getElementById("focus-timer");

                    nameEl.innerText = project.name;
                    nameEl.style.color = project.color;
                    overlay.classList.remove("hidden");

                    document
                        .getElementById("focus-project-selector")
                        .classList.add("hidden");
                    document
                        .getElementById("focus-project-name")
                        .classList.remove("hidden");
                    document
                        .getElementById("focus-timer")
                        .classList.remove("hidden");

                    const today = this.state.getLocalISODate(new Date());
                    const blocks = this.state.getSchedule(today).blocks;

                    let r = startRow;
                    let c = startCol;

                    while (blocks[`${r}-${c}`] === projectId) {
                        c++;
                        if (c > 5) {
                            c = 0;
                            r++;
                        }
                        if (r > 23) break;
                    }

                    const now = new Date();
                    const endTime = new Date(
                        now.getFullYear(),
                        now.getMonth(),
                        now.getDate(),
                        r,
                        c * 10,
                        0,
                    );

                    const updateTimer = () => {
                        const currentTime = new Date();
                        const diff = Math.max(0, endTime - currentTime);

                        if (diff === 0) {
                            clearInterval(this.focusTimerInterval);
                            timerEl.innerText = "00:00";
                            return;
                        }

                        const totalSeconds = Math.floor(diff / 1000);
                        const h = Math.floor(totalSeconds / 3600);
                        const m = Math.floor((totalSeconds % 3600) / 60);
                        const s = totalSeconds % 60;

                        let timeStr = "";
                        if (h > 0) timeStr += String(h).padStart(2, "0") + ":";
                        timeStr +=
                            String(m).padStart(2, "0") +
                            ":" +
                            String(s).padStart(2, "0");

                        timerEl.innerText = timeStr;
                    };

                    updateTimer();
                    this.focusTimerInterval = setInterval(updateTimer, 1000);
                }

                exitFocusMode() {
                    document
                        .getElementById("focus-mode-overlay")
                        .classList.add("hidden");
                    if (this.focusTimerInterval) {
                        clearInterval(this.focusTimerInterval);
                    }

                    document
                        .getElementById("focus-project-name")
                        .classList.remove("hidden");
                    document
                        .getElementById("focus-timer")
                        .classList.remove("hidden");
                    document
                        .getElementById("focus-project-selector")
                        .classList.add("hidden");
                }

                setupLogicListeners() {
                    globalBus.on(
                        "block:update",
                        ({ date, row, col, projectId }) => {
                            const targetDate =
                                date || this.state.getCurrentDate();
                            this.state.ensureDateExists(targetDate);
                            this.state.updateState((data) => {
                                const blocks =
                                    data.schedules[targetDate].blocks;
                                if (projectId)
                                    blocks[`${row}-${col}`] = projectId;
                                else delete blocks[`${row}-${col}`];
                            });
                            globalBus.emit("block:updated", {
                                date: targetDate,
                                row,
                                col,
                                project: projectId
                                    ? this.state.getProjectById(projectId)
                                    : null,
                            });
                            globalBus.emit("analytics:refreshed");
                        },
                    );

                    globalBus.on(
                        "schedule:fillRow",
                        ({ date, row, projectId }) => {
                            const targetDate =
                                date || this.state.getCurrentDate();
                            this.state.ensureDateExists(targetDate);
                            this.state.updateState((data) => {
                                const blocks =
                                    data.schedules[targetDate].blocks;
                                for (let c = 0; c < 6; c++) {
                                    if (projectId)
                                        blocks[`${row}-${c}`] = projectId;
                                    else delete blocks[`${row}-${c}`];
                                }
                            });
                            globalBus.emit("schedule:refreshed");
                            globalBus.emit("analytics:refreshed");
                        },
                    );

                    globalBus.on(
                        "hierarchy:updateType",
                        ({ id, name, element }) => {
                            this.state.updateState((data) => {
                                const t = data.types.find((x) => x.id === id);
                                if (t) t.name = name;
                            });
                            element.classList.add("edit-success");
                            setTimeout(
                                () => element.classList.remove("edit-success"),
                                600,
                            );
                            Toast.show("Saved");
                            globalBus.emit("hierarchy:refreshed");
                        },
                    );

                    globalBus.on(
                        "hierarchy:updateProject",
                        ({ id, name, element }) => {
                            this.state.updateState((data) => {
                                const p = data.projects.find(
                                    (x) => x.id === id,
                                );
                                if (p) p.name = name;
                            });
                            element.classList.add("edit-success");
                            setTimeout(
                                () => element.classList.remove("edit-success"),
                                600,
                            );
                            Toast.show("Saved");
                            globalBus.emit("schedule:refreshed");
                            globalBus.emit("hierarchy:refreshed");
                        },
                    );

                    globalBus.on(
                        "hierarchy:updateProjectColor",
                        ({ id, color }) => {
                            this.state.updateState((data) => {
                                const p = data.projects.find(
                                    (x) => x.id === id,
                                );
                                if (p) p.color = color;
                            });
                            globalBus.emit("schedule:refreshed");
                            globalBus.emit("hierarchy:refreshed");
                        },
                    );

                    globalBus.on(
                        "hierarchy:reorderType",
                        ({ sourceId, targetId }) => {
                            if (sourceId === targetId) return;
                            this.state.updateState((data) => {
                                const arr = data.types;
                                const fromIdx = arr.findIndex(
                                    (t) => t.id === sourceId,
                                );
                                const toIdx = arr.findIndex(
                                    (t) => t.id === targetId,
                                );
                                if (fromIdx !== -1 && toIdx !== -1) {
                                    const [item] = arr.splice(fromIdx, 1);
                                    arr.splice(toIdx, 0, item);
                                }
                            });
                            globalBus.emit("hierarchy:refreshed");
                        },
                    );

                    globalBus.on(
                        "hierarchy:reorderProject",
                        ({ sourceId, targetId }) => {
                            if (sourceId === targetId) return;
                            this.state.updateState((data) => {
                                const arr = data.projects;
                                const fromIdx = arr.findIndex(
                                    (p) => p.id === sourceId,
                                );
                                const toIdx = arr.findIndex(
                                    (p) => p.id === targetId,
                                );
                                if (fromIdx !== -1 && toIdx !== -1) {
                                    const targetType = arr[toIdx].typeId;
                                    const [item] = arr.splice(fromIdx, 1);
                                    item.typeId = targetType;
                                    arr.splice(toIdx, 0, item);
                                }
                            });
                            globalBus.emit("hierarchy:refreshed");
                        },
                    );

                    globalBus.on(
                        "hierarchy:moveProjectToType",
                        ({ projectId, typeId }) => {
                            this.state.updateState((data) => {
                                const p = data.projects.find(
                                    (x) => x.id === projectId,
                                );
                                if (p) p.typeId = typeId;
                            });
                            globalBus.emit("hierarchy:refreshed");
                        },
                    );
                }

                commitChanges(changes) {
                    this.state.updateState((data) => {
                        Object.entries(changes).forEach(([key, pid]) => {
                            const parts = key.split("-");
                            const dStr = `${parts[0]}-${parts[1]}-${parts[2]}`;
                            const r = parts[3];
                            const c = parts[4];
                            if (!data.schedules[dStr])
                                data.schedules[dStr] = { blocks: {} };
                            const blocks = data.schedules[dStr].blocks;
                            if (pid === null) delete blocks[`${r}-${c}`];
                            else blocks[`${r}-${c}`] = pid;
                        });
                    });
                    globalBus.emit("schedule:refreshed");
                    globalBus.emit("analytics:refreshed");
                }

                setViewMode(mode) {
                    this.state.updateState((data) => (data.viewMode = mode));
                    globalBus.emit("view:refresh");
                }

                copyDay() {
                    this.clipboardDay = JSON.parse(
                        JSON.stringify(
                            this.state.getSchedule(this.state.getCurrentDate()),
                        ),
                    );
                    Toast.show("Day copied");
                }

                pasteDay() {
                    if (!this.clipboardDay) {
                        Toast.show("Clipboard empty", "error");
                        return;
                    }
                    this.state.updateState((data) => {
                        data.schedules[data.currentDate] = JSON.parse(
                            JSON.stringify(this.clipboardDay),
                        );
                    });
                    globalBus.emit("schedule:refreshed");
                    globalBus.emit("analytics:refreshed");
                    Toast.show("Schedule pasted");
                }

                clearDay() {
                    this.state.updateState((data) => {
                        data.schedules[data.currentDate] = { blocks: {} };
                    });
                    globalBus.emit("schedule:refreshed");
                    globalBus.emit("analytics:refreshed");
                    Toast.show("Day cleared");
                }

                toggleSidebar() {
                    this.state.updateState((data) => {
                        data.isSidebarCollapsed = !data.isSidebarCollapsed;
                    });
                    const sidebar = document.getElementById("app-sidebar");
                    sidebar.classList.toggle("sidebar-collapsed");
                    const burger = document.getElementById("icon-burger");
                    const arrow = document.getElementById("icon-arrow");

                    if (sidebar.classList.contains("sidebar-collapsed")) {
                        arrow.style.opacity = "0";
                        arrow.style.transform = "rotate(-90deg)";
                        burger.style.opacity = "1";
                        burger.style.transform = "rotate(0deg)";
                    } else {
                        arrow.style.opacity = "1";
                        arrow.style.transform = "rotate(0deg)";
                        burger.style.opacity = "0";
                        burger.style.transform = "rotate(90deg)";
                    }
                }

                toggleCalendarPopover(e) {
                    if (e) e.stopPropagation();
                    const pop = document.getElementById("calendar-popover");
                    pop.classList.toggle("hidden");
                }

                togglePaintMode(projectId) {
                    if (!projectId || this.state.paintProjectId === projectId) {
                        this.state.paintProjectId = null;
                        document
                            .getElementById("paint-banner")
                            .classList.add("hidden");
                    } else {
                        this.state.paintProjectId = projectId;
                        let name = "Eraser";
                        if (projectId !== "CLEAR") {
                            const project =
                                this.state.getProjectById(projectId);
                            name = project ? project.name : "";
                        }
                        document.getElementById("paint-banner-text").innerText =
                            name;
                        document
                            .getElementById("paint-banner")
                            .classList.remove("hidden");
                    }
                    globalBus.emit("hierarchy:refreshed");
                }

                shiftMonth(dir) {
                    let m = this.state.viewMonth + dir;
                    let y = this.state.viewYear;
                    if (m < 0) {
                        m = 11;
                        y--;
                    } else if (m > 11) {
                        m = 0;
                        y++;
                    }
                    this.state.viewMonth = m;
                    this.state.viewYear = y;
                    this.ui.renderCalendar();
                }

                shiftDate(days) {
                    const [y, m, d] = this.state
                        .getCurrentDate()
                        .split("-")
                        .map(Number);
                    const curr = new Date(y, m - 1, d);
                    curr.setDate(curr.getDate() + days);
                    const localISOTime = `${curr.getFullYear()}-${String(curr.getMonth() + 1).padStart(2, "0")}-${String(curr.getDate()).padStart(2, "0")}`;
                    this.state.viewMonth = curr.getMonth();
                    this.state.viewYear = curr.getFullYear();
                    this.selectDate(localISOTime);
                }

                goToToday() {
                    const todayStr = this.state.getLocalISODate();
                    const [y, m, d] = todayStr.split("-").map(Number);
                    this.state.viewMonth = m - 1;
                    this.state.viewYear = y;
                    this.selectDate(todayStr);
                }

                selectDate(dateStr) {
                    this.state.updateState((data) => {
                        data.currentDate = dateStr;
                    });
                    this.state.ensureDateExists(dateStr);
                    globalBus.emit("view:refresh");
                }

                openSettingsModal() {
                    this.ui.renderSettings();
                    this.ui.toggleModal("settings-modal", true);
                }
                closeSettingsModal() {
                    this.ui.toggleModal("settings-modal", false);
                }

                addType() {
                    const input = document.getElementById("new-type-name");
                    const name = input.value.trim();
                    if (!name) return;

                    if (
                        this.state
                            .getTypes()
                            .some(
                                (t) =>
                                    t.name.toLowerCase() === name.toLowerCase(),
                            )
                    ) {
                        Toast.show(
                            `Category "${name}" already exists!`,
                            "error",
                        );
                        return;
                    }
                    this.state.updateState((data) => {
                        data.types.push({ id: "t_" + Date.now(), name });
                    });
                    input.value = "";
                    Toast.show(`Added ${name}`);
                    globalBus.emit("hierarchy:refreshed");
                }

                requestRemoveType(id) {
                    const projectsLinked = this.state.getProjectsByType(id);
                    if (projectsLinked.length > 0) this.ui.showConfirm(id);
                    else this.executeRemoveType(id);
                }

                cancelConfirm() {
                    this.ui.toggleModal("confirm-modal", false);
                }

                executeRemoveType(id) {
                    this.state.updateState((data) => {
                        data.types = data.types.filter((t) => t.id !== id);
                        const toDeleteIds = this.state
                            .getProjectsByType(id)
                            .map((p) => p.id);
                        data.projects = data.projects.filter(
                            (p) => !toDeleteIds.includes(p.id),
                        );

                        for (let date in data.schedules) {
                            const blocks = data.schedules[date].blocks;
                            for (let key in blocks)
                                if (toDeleteIds.includes(blocks[key]))
                                    delete blocks[key];
                        }
                    });
                    Toast.show("Category deleted");
                    globalBus.emit("view:refresh");
                    this.ui.renderSettings();
                }

                addProjectToType(typeId) {
                    const baseName = "New Project";
                    let newName = baseName;
                    let counter = 1;
                    while (
                        this.state.getProjects().some((p) => p.name === newName)
                    ) {
                        newName = `${baseName} ${counter}`;
                        counter++;
                    }
                    const randomHex =
                        "#" +
                        Math.floor(Math.random() * 16777215)
                            .toString(16)
                            .padStart(6, "0");
                    this.state.updateState((data) => {
                        data.projects.push({
                            id: "p_" + Date.now(),
                            name: newName,
                            color: randomHex,
                            typeId: typeId,
                        });
                    });
                    Toast.show("Added new project");
                    globalBus.emit("hierarchy:refreshed");
                }

                removeProject(id) {
                    this.state.updateState((data) => {
                        data.projects = data.projects.filter(
                            (p) => p.id !== id,
                        );
                        for (let date in data.schedules) {
                            const blocks = data.schedules[date].blocks;
                            for (let key in blocks)
                                if (blocks[key] === id) delete blocks[key];
                        }
                    });
                    Toast.show("Project removed");
                    globalBus.emit("view:refresh");
                    this.ui.renderSettings();
                }
            }

            window.app = new AppController();
        </script>
    </body>
</html>
