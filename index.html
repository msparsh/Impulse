<!doctype html>
<html lang="en">
    <head>
        <meta charset="UTF-8" />
        <meta name="viewport" content="width=device-width, initial-scale=1.0" />
        <title>Visual Schedule Planner Pro - v5</title>
        <script src="https://cdn.tailwindcss.com"></script>
        <link
            href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap"
            rel="stylesheet"
        />
        <style>
            body {
                font-family: "Inter", sans-serif;
                background-color: #f9fafb;
                color: #1a1a1a;
            }
            .circle-btn {
                width: 44px;
                height: 44px;
                border-radius: 50%;
                display: flex;
                align-items: center;
                justify-content: center;
                font-size: 20px;
                transition: all 0.2s cubic-bezier(0.4, 0, 0.2, 1);
                position: relative;
                background-color: #e5e7eb;
                border: 2px solid transparent;
                cursor: pointer;
            }
            .circle-btn:hover {
                transform: scale(1.1);
                filter: brightness(95%);
                z-index: 10;
            }
            .circle-btn.filled {
                border-color: rgba(0, 0, 0, 0.1);
            }
            .active-date {
                background-color: #4f46e5;
                color: white !important;
                font-weight: bold;
                border-radius: 8px;
            }
            .choice-menu {
                position: absolute;
                top: 50px;
                left: 50%;
                transform: translateX(-50%);
                background: white;
                border: 1px solid #e5e7eb;
                border-radius: 12px;
                padding: 8px;
                display: flex;
                flex-direction: column;
                gap: 4px;
                box-shadow: 0 10px 25px -5px rgba(0, 0, 0, 0.15);
                z-index: 50;
                width: 200px;
            }
            .custom-scroll::-webkit-scrollbar {
                width: 6px;
            }
            .custom-scroll::-webkit-scrollbar-thumb {
                background: #cbd5e1;
                border-radius: 4px;
            }
            @keyframes fadeIn {
                from {
                    opacity: 0;
                }
                to {
                    opacity: 1;
                }
            }
            @keyframes slideUp {
                from {
                    transform: translateY(20px);
                    opacity: 0;
                }
                to {
                    transform: translateY(0);
                    opacity: 1;
                }
            }
            .modal-bg {
                animation: fadeIn 0.2s ease-out forwards;
            }
            .modal-content {
                animation: slideUp 0.2s ease-out forwards;
            }
        </style>
    </head>
    <body class="p-4 md:p-8 h-screen flex flex-col overflow-hidden relative">
        <div
            class="max-w-7xl mx-auto w-full h-full flex flex-col bg-white rounded-2xl shadow-sm border border-gray-100 overflow-hidden relative"
        >
            <header
                class="flex items-center justify-between p-6 border-b border-gray-100"
            >
                <div class="flex items-center gap-4">
                    <div
                        class="w-10 h-10 bg-indigo-600 rounded-lg flex items-center justify-center text-white font-bold text-xl"
                    >
                        V
                    </div>
                    <h1 class="text-xl font-bold">Visual Planner Pro</h1>
                </div>
                <div class="flex items-center gap-6">
                    <button
                        onclick="app.goToToday()"
                        class="px-4 py-2 border border-gray-200 rounded-full text-xs font-bold hover:bg-gray-50 text-gray-600 transition shadow-sm"
                    >
                        Today
                    </button>
                    <div class="text-right border-l border-gray-200 pl-6">
                        <h2
                            id="display-date"
                            class="text-xl font-bold text-indigo-900"
                        >
                            ...
                        </h2>
                        <p id="display-day" class="text-gray-500 text-sm">
                            ...
                        </p>
                    </div>
                    <button
                        onclick="app.openSettingsModal()"
                        class="w-10 h-10 rounded-full border border-gray-200 flex items-center justify-center hover:bg-gray-50 hover:border-gray-300 transition text-gray-600 shadow-sm"
                    >
                        <svg
                            width="20"
                            height="20"
                            viewBox="0 0 24 24"
                            fill="none"
                            stroke="currentColor"
                            stroke-width="2"
                            stroke-linecap="round"
                            stroke-linejoin="round"
                        >
                            <line x1="12" y1="5" x2="12" y2="19"></line>
                            <line x1="5" y1="12" x2="19" y2="12"></line>
                        </svg>
                    </button>
                </div>
            </header>

            <div class="flex flex-1 overflow-hidden">
                <aside
                    class="w-80 border-r border-gray-100 p-6 flex flex-col gap-8 overflow-y-auto custom-scroll bg-gray-50"
                >
                    <div
                        class="bg-white p-4 rounded-xl shadow-sm border border-gray-100"
                    >
                        <div class="flex items-center justify-between mb-4">
                            <span
                                id="calendar-month-label"
                                class="text-sm font-bold text-gray-800"
                                >...</span
                            >
                        </div>
                        <div
                            class="grid grid-cols-7 gap-1 text-center text-xs font-medium mb-2"
                        >
                            <div class="text-gray-400">S</div>
                            <div class="text-gray-400">M</div>
                            <div class="text-gray-400">T</div>
                            <div class="text-gray-400">W</div>
                            <div class="text-gray-400">T</div>
                            <div class="text-gray-400">F</div>
                            <div class="text-gray-400">S</div>
                        </div>
                        <div
                            id="calendar-grid"
                            class="grid grid-cols-7 gap-1 text-center text-sm"
                        ></div>
                    </div>

                    <div>
                        <h3
                            class="text-sm font-bold text-gray-800 mb-3 flex items-center gap-2"
                        >
                            Active Projects
                        </h3>
                        <div
                            id="project-list"
                            class="flex flex-col gap-2 mb-4"
                        ></div>
                    </div>
                </aside>

                <main class="flex-1 flex flex-col overflow-hidden bg-white">
                    <div
                        class="p-6 border-b border-gray-100 bg-white z-10 shadow-sm"
                    >
                        <h3
                            class="text-sm font-bold text-gray-800 mb-3 flex items-center gap-2"
                        >
                            Daily Time Allocation
                        </h3>
                        <div
                            id="analytics-bar"
                            class="flex flex-wrap gap-4"
                        ></div>
                    </div>

                    <div class="flex-1 overflow-y-auto p-6 custom-scroll">
                        <div
                            id="schedule-grid"
                            class="flex flex-col gap-6 max-w-4xl mx-auto pb-20"
                        ></div>
                    </div>
                </main>
            </div>
        </div>

        <div
            id="settings-modal"
            class="fixed inset-0 bg-black/40 hidden z-50 flex items-center justify-center backdrop-blur-sm p-4"
        >
            <div
                class="bg-white rounded-2xl shadow-2xl w-full max-w-3xl overflow-hidden modal-content flex flex-col max-h-[90vh]"
            >
                <div
                    class="p-4 border-b border-gray-100 flex justify-between items-center bg-gray-50"
                >
                    <h3 class="font-bold text-gray-800">Manage Data</h3>
                    <button
                        onclick="app.closeSettingsModal()"
                        class="text-gray-400 hover:text-gray-700 transition"
                    >
                        <svg
                            width="20"
                            height="20"
                            viewBox="0 0 24 24"
                            fill="none"
                            stroke="currentColor"
                            stroke-width="2"
                            stroke-linecap="round"
                            stroke-linejoin="round"
                        >
                            <line x1="18" y1="6" x2="6" y2="18"></line>
                            <line x1="6" y1="6" x2="18" y2="18"></line>
                        </svg>
                    </button>
                </div>
                <div class="flex flex-1 overflow-hidden">
                    <div
                        class="flex-1 border-r border-gray-100 p-6 overflow-y-auto custom-scroll"
                    >
                        <h4
                            class="text-sm font-bold text-gray-800 mb-4 border-b pb-2"
                        >
                            1. Types
                        </h4>
                        <div class="flex gap-2 mb-6">
                            <input
                                type="text"
                                id="new-type-name"
                                placeholder="New Type Name"
                                class="text-sm p-2 border border-gray-200 rounded-lg flex-1 focus:outline-none focus:border-indigo-500"
                            />
                            <button
                                onclick="app.addType()"
                                class="bg-gray-800 text-white px-4 py-2 rounded-lg text-sm font-bold hover:bg-gray-700 transition"
                            >
                                Add
                            </button>
                        </div>
                        <div
                            id="settings-types-list"
                            class="flex flex-col gap-2"
                        ></div>
                    </div>
                    <div
                        class="flex-1 p-6 overflow-y-auto custom-scroll bg-gray-50/50"
                    >
                        <h4
                            class="text-sm font-bold text-gray-800 mb-4 border-b pb-2"
                        >
                            2. Projects
                        </h4>
                        <div
                            class="flex flex-col gap-3 mb-6 bg-white p-4 rounded-xl border border-gray-100 shadow-sm"
                        >
                            <input
                                type="text"
                                id="new-proj-name"
                                placeholder="Project Name"
                                class="text-sm p-2 border border-gray-200 rounded-lg w-full focus:outline-none focus:border-indigo-500"
                            />
                            <div class="flex gap-2">
                                <input
                                    type="color"
                                    id="new-proj-color"
                                    value="#8b5cf6"
                                    class="h-10 w-12 rounded-lg cursor-pointer border border-gray-200 p-1"
                                />
                                <select
                                    id="new-proj-type"
                                    class="text-sm p-2 border border-gray-200 rounded-lg flex-1 bg-white focus:outline-none focus:border-indigo-500"
                                ></select>
                            </div>
                            <button
                                onclick="app.addProject()"
                                class="w-full bg-indigo-600 text-white text-sm py-2 rounded-lg font-bold hover:bg-indigo-700 transition shadow-sm"
                            >
                                Save Project
                            </button>
                        </div>
                        <div
                            id="settings-projects-list"
                            class="flex flex-col gap-2"
                        ></div>
                    </div>
                </div>
            </div>
        </div>

        <script>
            // -----------------------------------------------------------------------------
            // 0. EVENT BUS
            // -----------------------------------------------------------------------------
            class EventEmitter {
                constructor() {
                    this.events = {};
                }
                on(event, listener) {
                    if (!this.events[event]) this.events[event] = [];
                    this.events[event].push(listener);
                }
                emit(event, data) {
                    if (this.events[event])
                        this.events[event].forEach((l) => l(data));
                }
            }

            const globalBus = new EventEmitter();

            // -----------------------------------------------------------------------------
            // 1. STATE MANAGEMENT (Model & Derived State)
            // -----------------------------------------------------------------------------
            class StateManager {
                constructor() {
                    this.storageKey = "planner_state_v5";
                    this.hours = [
                        "7 AM",
                        "8 AM",
                        "9 AM",
                        "10 AM",
                        "11 AM",
                        "12 PM",
                        "1 PM",
                        "2 PM",
                        "3 PM",
                        "4 PM",
                        "5 PM",
                        "6 PM",
                        "7 PM",
                        "8 PM",
                        "9 PM",
                        "10 PM",
                        "11 PM",
                    ];
                    this.data = this.loadState();
                }

                getDefaultState() {
                    const today = new Date();
                    const offset = today.getTimezoneOffset() * 60000;
                    const localISOTime = new Date(today - offset)
                        .toISOString()
                        .split("T")[0];

                    return {
                        version: 2,
                        currentDate: localISOTime,
                        types: [
                            { id: "t_work", name: "Work" },
                            { id: "t_personal", name: "Personal" },
                        ],
                        projects: [
                            {
                                id: "p_deep",
                                name: "Deep Work",
                                color: "#6b92f2",
                                typeId: "t_work",
                            },
                            {
                                id: "p_study",
                                name: "Study",
                                color: "#f2a644",
                                typeId: "t_personal",
                            },
                            {
                                id: "p_health",
                                name: "Health/Meals",
                                color: "#568f32",
                                typeId: "t_personal",
                            },
                        ],
                        schedules: {
                            [localISOTime]: {
                                blocks: {
                                    "1-0": "p_deep",
                                    "1-1": "p_deep",
                                    "1-2": "p_deep",
                                    "2-2": "p_study",
                                    "2-3": "p_study",
                                    "2-4": "p_study",
                                    "5-0": "p_health",
                                    "5-1": "p_health",
                                    "5-2": "p_health",
                                },
                            },
                        },
                    };
                }

                loadState() {
                    const saved = localStorage.getItem(this.storageKey);
                    return saved ? JSON.parse(saved) : this.getDefaultState();
                }

                saveState() {
                    localStorage.setItem(
                        this.storageKey,
                        JSON.stringify(this.data),
                    );
                }

                updateState(updaterFn) {
                    updaterFn(this.data);
                    this.saveState();
                }

                ensureDateExists(dateStr) {
                    if (!this.data.schedules[dateStr]) {
                        this.updateState((data) => {
                            data.schedules[dateStr] = { blocks: {} };
                        });
                    }
                }

                // --- Getters (Strict UI Access) ---
                getProjectById(id) {
                    return this.data.projects.find((p) => p.id === id);
                }
                getProjects() {
                    return this.data.projects;
                }
                getTypes() {
                    return this.data.types;
                }
                getCurrentDate() {
                    return this.data.currentDate;
                }
                getHours() {
                    return this.hours;
                }
                getCurrentSchedule() {
                    return this.data.schedules[this.data.currentDate];
                }

                // --- Derived State (Analytics Engine) ---
                getDailyAnalytics() {
                    let typeCounts = {};
                    const blocks =
                        this.data.schedules[this.data.currentDate]?.blocks ||
                        {};

                    Object.values(blocks).forEach((projectId) => {
                        const project = this.getProjectById(projectId);
                        if (project) {
                            typeCounts[project.typeId] =
                                (typeCounts[project.typeId] || 0) + 1;
                        }
                    });
                    return typeCounts;
                }
            }

            // -----------------------------------------------------------------------------
            // 2. UI MANAGEMENT (View)
            // -----------------------------------------------------------------------------
            class UIManager {
                constructor(state) {
                    this.state = state; // Uses strictly getters, never touches state.data directly
                    this.blockNodes = {}; // Cache for O(1) DOM updates
                    this.setupDelegation();
                    this.listenToEvents();
                }

                setupDelegation() {
                    const grid = document.getElementById("schedule-grid");

                    grid.addEventListener("click", (e) => {
                        const block = e.target.closest(".schedule-block");
                        if (block) {
                            e.stopPropagation();
                            this.closeAllMenus();
                            this.renderChoiceMenu(
                                block,
                                block.dataset.row,
                                block.dataset.col,
                            );
                        }
                    });

                    grid.addEventListener("contextmenu", (e) => {
                        const block = e.target.closest(".schedule-block");
                        if (block) {
                            e.preventDefault();
                            globalBus.emit("block:update", {
                                row: block.dataset.row,
                                col: block.dataset.col,
                                projectId: null,
                            });
                        }
                    });

                    document.addEventListener("click", () =>
                        this.closeAllMenus(),
                    );
                    document.addEventListener("keydown", (e) => {
                        if (e.key === "Escape") {
                            this.closeAllMenus();
                            this.toggleModal("settings-modal", false);
                        }
                    });
                }

                listenToEvents() {
                    // O(1) Targeted DOM Update
                    globalBus.on("block:updated", ({ row, col, project }) => {
                        const blockEl = this.blockNodes[`${row}-${col}`];
                        if (!blockEl) return;

                        if (project) {
                            blockEl.style.backgroundColor = project.color;
                            blockEl.classList.add("filled");
                            blockEl.title = project.name;
                        } else {
                            blockEl.style.backgroundColor = "";
                            blockEl.classList.remove("filled");
                            blockEl.title = "Empty (Click to set)";
                        }
                    });

                    // Orchestrated UI Refreshes
                    globalBus.on("view:refresh", () => this.refreshAllViews());

                    globalBus.on("schedule:refreshed", () => {
                        this.renderSchedule(
                            this.state.getCurrentSchedule(),
                            this.state.getHours(),
                            this.state.getProjects(),
                        );
                    });

                    globalBus.on("analytics:refreshed", () => {
                        this.renderAnalytics(
                            this.state.getDailyAnalytics(),
                            this.state.getTypes(),
                        );
                    });
                }

                closeAllMenus() {
                    document
                        .querySelectorAll(".choice-menu")
                        .forEach((m) => m.remove());
                }

                refreshAllViews() {
                    const date = this.state.getCurrentDate();
                    this.renderHeader(date);
                    this.renderCalendar(date);
                    this.renderSidebarProjects(
                        this.state.getProjects(),
                        this.state.getTypes(),
                    );
                    this.renderSchedule(
                        this.state.getCurrentSchedule(),
                        this.state.getHours(),
                        this.state.getProjects(),
                    );
                    this.renderAnalytics(
                        this.state.getDailyAnalytics(),
                        this.state.getTypes(),
                    );
                }

                renderHeader(dateStr) {
                    const [year, month, day] = dateStr.split("-");
                    const dateObj = new Date(year, month - 1, day);
                    const options = {
                        weekday: "long",
                        year: "numeric",
                        month: "long",
                        day: "numeric",
                    };
                    const parts = dateObj
                        .toLocaleDateString("en-US", options)
                        .split(", ");
                    document.getElementById("display-day").innerText = parts[0];
                    document.getElementById("display-date").innerText =
                        parts[1] + ", " + parts[2];
                }

                renderCalendar(currentDate) {
                    const grid = document.getElementById("calendar-grid");
                    const monthLabel = document.getElementById(
                        "calendar-month-label",
                    );
                    grid.innerHTML = "";

                    const [yearStr, monthStr, dayStr] = currentDate.split("-");
                    const year = parseInt(yearStr, 10);
                    const month = parseInt(monthStr, 10) - 1;

                    const localDateObj = new Date(year, month, 1);
                    monthLabel.innerText = localDateObj.toLocaleString(
                        "default",
                        { month: "long", year: "numeric" },
                    );

                    const firstDay = new Date(year, month, 1).getDay();
                    const daysInMonth = new Date(year, month + 1, 0).getDate();

                    for (let i = 0; i < firstDay; i++)
                        grid.innerHTML += `<div class="py-2 text-gray-300"></div>`;

                    for (let day = 1; day <= daysInMonth; day++) {
                        const loopDateStr = `${year}-${String(month + 1).padStart(2, "0")}-${String(day).padStart(2, "0")}`;
                        const isActive = loopDateStr === currentDate;

                        grid.innerHTML += `
                        <div onclick="app.selectDate('${loopDateStr}')"
                             class="py-1 cursor-pointer hover:bg-indigo-50 rounded-md transition ${isActive ? "active-date shadow-md" : "text-gray-700"}">
                            ${day}
                        </div>`;
                    }
                }

                renderSidebarProjects(projects, types) {
                    const list = document.getElementById("project-list");
                    list.innerHTML = "";
                    projects.forEach((p) => {
                        const typeName =
                            types.find((t) => t.id === p.typeId)?.name ||
                            "Unknown";
                        list.innerHTML += `
                        <div class="flex items-center gap-3 p-2 rounded-lg bg-white border border-gray-100 shadow-sm">
                            <div class="w-4 h-4 rounded-full" style="background-color: ${p.color};"></div>
                            <div class="flex flex-col">
                                <span class="text-sm font-bold text-gray-800 leading-tight">${p.name}</span>
                                <span class="text-[10px] text-gray-400 uppercase tracking-wide">${typeName}</span>
                            </div>
                        </div>`;
                    });
                }

                renderAnalytics(typeCounts, types) {
                    const bar = document.getElementById("analytics-bar");
                    bar.innerHTML = "";
                    let totalAssigned = 0;

                    types.forEach((t) => {
                        const bCount = typeCounts[t.id] || 0;
                        if (bCount > 0) {
                            const minutes = bCount * 10;
                            const hoursStr =
                                minutes >= 60
                                    ? `${(minutes / 60).toFixed(1)}h`
                                    : `${minutes}m`;
                            bar.innerHTML += `
                            <div class="flex items-center gap-2 px-3 py-1.5 rounded-full bg-gray-50 border border-gray-200 shadow-sm">
                                <span class="text-xs font-semibold text-gray-700">${t.name}: <span class="text-gray-500">${hoursStr}</span></span>
                            </div>`;
                            totalAssigned++;
                        }
                    });

                    if (totalAssigned === 0)
                        bar.innerHTML = `<span class="text-sm text-gray-400 italic">No blocks assigned.</span>`;
                }

                renderSchedule(scheduleObj, hours, projects) {
                    const container = document.getElementById("schedule-grid");
                    container.innerHTML = "";
                    this.blockNodes = {}; // Reset cache

                    const blocks = scheduleObj.blocks;

                    hours.forEach((time, rowIndex) => {
                        const rowEl = document.createElement("div");
                        rowEl.className = "flex items-center gap-8 group";

                        const timeLabel = document.createElement("div");
                        timeLabel.className =
                            "w-16 text-xs font-bold text-gray-400 uppercase tracking-wider text-right";
                        timeLabel.textContent = time;

                        const blocksContainer = document.createElement("div");
                        blocksContainer.className =
                            "flex gap-3 md:gap-4 flex-wrap bg-gray-50 p-2 rounded-2xl group-hover:bg-gray-100 transition";

                        for (let colIndex = 0; colIndex < 6; colIndex++) {
                            const block = document.createElement("button");
                            block.className =
                                "schedule-block circle-btn shadow-sm";
                            block.dataset.row = rowIndex;
                            block.dataset.col = colIndex;

                            const blockProjectId =
                                blocks[`${rowIndex}-${colIndex}`];
                            const project = projects.find(
                                (p) => p.id === blockProjectId,
                            );

                            if (project) {
                                block.style.backgroundColor = project.color;
                                block.classList.add("filled");
                                block.title = project.name;
                            } else {
                                block.title = "Empty (Click to set)";
                            }

                            this.blockNodes[`${rowIndex}-${colIndex}`] = block; // Cache element!
                            blocksContainer.appendChild(block);
                        }

                        rowEl.appendChild(timeLabel);
                        rowEl.appendChild(blocksContainer);
                        container.appendChild(rowEl);
                    });
                }

                renderChoiceMenu(blockElement, rowIndex, colIndex) {
                    const menu = document.createElement("div");
                    menu.className = "choice-menu";

                    this.state.getProjects().forEach((p) => {
                        const btn = document.createElement("button");
                        btn.className =
                            "flex items-center justify-between p-2 w-full hover:bg-gray-100 rounded-lg transition text-left group/btn";
                        btn.innerHTML = `
                        <div class="flex items-center gap-3 overflow-hidden">
                            <div class="w-4 h-4 rounded-full shadow-sm flex-shrink-0" style="background-color: ${p.color}"></div>
                            <span class="text-xs font-bold text-gray-700 truncate">${p.name}</span>
                        </div>
                        <div class="opacity-0 group-hover/btn:opacity-100 text-[10px] text-gray-400 bg-white px-2 py-1 rounded shadow-sm border border-gray-100 fill-hour-btn" title="Fill entire hour">Fill Hr</div>
                        `;
                        btn.onclick = (event) => {
                            event.stopPropagation();
                            if (
                                event.target.classList.contains("fill-hour-btn")
                            ) {
                                globalBus.emit("schedule:fillRow", {
                                    row: rowIndex,
                                    projectId: p.id,
                                });
                            } else {
                                globalBus.emit("block:update", {
                                    row: rowIndex,
                                    col: colIndex,
                                    projectId: p.id,
                                });
                            }
                            this.closeAllMenus();
                        };
                        menu.appendChild(btn);
                    });

                    const reset = document.createElement("button");
                    reset.className =
                        "mt-1 p-2 w-full text-left text-xs font-bold text-red-500 hover:bg-red-50 rounded-lg transition border-t border-gray-100";
                    reset.innerText = "Clear Block";
                    reset.onclick = (event) => {
                        event.stopPropagation();
                        globalBus.emit("block:update", {
                            row: rowIndex,
                            col: colIndex,
                            projectId: null,
                        });
                        this.closeAllMenus();
                    };

                    menu.appendChild(reset);
                    blockElement.appendChild(menu);

                    // SMART POSITIONING
                    const rect = blockElement.getBoundingClientRect();
                    const menuHeight = menu.offsetHeight;
                    if (rect.bottom + menuHeight > window.innerHeight) {
                        menu.style.top = "auto";
                        menu.style.bottom = "50px";
                        menu.style.boxShadow =
                            "0 -10px 25px -5px rgba(0, 0, 0, 0.15)";
                    }
                }

                renderSettings() {
                    const types = this.state.getTypes();
                    const projects = this.state.getProjects();

                    const typeSelect = document.getElementById("new-proj-type");
                    typeSelect.innerHTML =
                        types.length === 0
                            ? "<option disabled>No types available</option>"
                            : "";
                    types.forEach(
                        (t) =>
                            (typeSelect.innerHTML += `<option value="${t.id}">${t.name}</option>`),
                    );

                    const typesList = document.getElementById(
                        "settings-types-list",
                    );
                    typesList.innerHTML = "";
                    types.forEach((t) => {
                        typesList.innerHTML += `
                        <div class="flex items-center justify-between p-3 bg-white border border-gray-100 rounded-lg shadow-sm">
                            <span class="text-sm font-medium text-gray-700">${t.name}</span>
                            <button onclick="app.removeType('${t.id}')" class="text-red-400 hover:text-red-600 font-bold text-xs">Remove</button>
                        </div>`;
                    });

                    const projList = document.getElementById(
                        "settings-projects-list",
                    );
                    projList.innerHTML = "";
                    projects.forEach((p) => {
                        const typeName =
                            types.find((t) => t.id === p.typeId)?.name ||
                            "Unknown";
                        projList.innerHTML += `
                        <div class="flex items-center justify-between p-3 bg-white border border-gray-100 rounded-lg shadow-sm">
                            <div class="flex items-center gap-3">
                                <div class="w-4 h-4 rounded-full" style="background-color: ${p.color};"></div>
                                <div class="flex flex-col">
                                    <span class="text-sm font-bold text-gray-800">${p.name}</span>
                                    <span class="text-[10px] text-gray-400 uppercase">${typeName}</span>
                                </div>
                            </div>
                            <button onclick="app.removeProject('${p.id}')" class="text-red-400 hover:text-red-600 font-bold text-xs">Remove</button>
                        </div>`;
                    });
                }

                toggleModal(modalId, show) {
                    const modal = document.getElementById(modalId);
                    if (show) {
                        modal.classList.remove("hidden");
                        modal.classList.add("modal-bg");
                    } else {
                        modal.classList.add("hidden");
                        modal.classList.remove("modal-bg");
                    }
                }
            }

            // -----------------------------------------------------------------------------
            // 3. APP CONTROLLER (Business Logic)
            // -----------------------------------------------------------------------------
            class AppController {
                constructor() {
                    this.state = new StateManager();
                    this.ui = new UIManager(this.state);
                    this.setupLogicListeners();

                    this.state.ensureDateExists(this.state.getCurrentDate());
                    globalBus.emit("view:refresh");
                }

                setupLogicListeners() {
                    globalBus.on("block:update", ({ row, col, projectId }) => {
                        this.state.updateState((data) => {
                            const blocks =
                                data.schedules[data.currentDate].blocks;
                            const key = `${row}-${col}`;
                            if (projectId) blocks[key] = projectId;
                            else delete blocks[key];
                        });

                        const project = projectId
                            ? this.state.getProjectById(projectId)
                            : null;
                        globalBus.emit("block:updated", { row, col, project });
                        globalBus.emit("analytics:refreshed"); // UI updates itself
                    });

                    globalBus.on("schedule:fillRow", ({ row, projectId }) => {
                        this.state.updateState((data) => {
                            const blocks =
                                data.schedules[data.currentDate].blocks;
                            for (let c = 0; c < 6; c++) {
                                if (projectId)
                                    blocks[`${row}-${c}`] = projectId;
                                else delete blocks[`${row}-${c}`];
                            }
                        });

                        globalBus.emit("schedule:refreshed"); // UI handles rendering
                        globalBus.emit("analytics:refreshed"); // UI handles rendering
                    });
                }

                // --- HTML Bound Actions ---
                goToToday() {
                    const today = new Date();
                    const offset = today.getTimezoneOffset() * 60000;
                    const localISOTime = new Date(today - offset)
                        .toISOString()
                        .split("T")[0];
                    this.selectDate(localISOTime);
                }

                selectDate(dateStr) {
                    this.state.updateState((data) => {
                        data.currentDate = dateStr;
                    });
                    this.state.ensureDateExists(dateStr);
                    globalBus.emit("view:refresh");
                }

                openSettingsModal() {
                    this.ui.renderSettings();
                    this.ui.toggleModal("settings-modal", true);
                }

                closeSettingsModal() {
                    this.ui.toggleModal("settings-modal", false);
                }

                addType() {
                    const input = document.getElementById("new-type-name");
                    const name = input.value.trim();
                    if (!name) return;

                    this.state.updateState((data) => {
                        data.types.push({ id: "t_" + Date.now(), name });
                    });
                    input.value = "";
                    this.ui.renderSettings();
                }

                removeType(id) {
                    this.state.updateState((data) => {
                        data.types = data.types.filter((t) => t.id !== id);
                    });
                    this.state
                        .getProjects()
                        .filter((p) => p.typeId === id)
                        .forEach((p) => this.removeProject(p.id, false));
                    this.ui.renderSettings();
                    globalBus.emit("view:refresh");
                }

                addProject() {
                    const nameInput = document.getElementById("new-proj-name");
                    const colorInput =
                        document.getElementById("new-proj-color");
                    const typeInput = document.getElementById("new-proj-type");
                    const name = nameInput.value.trim();

                    if (!name || !typeInput.value)
                        return alert("Name and Type are required!");

                    this.state.updateState((data) => {
                        data.projects.push({
                            id: "p_" + Date.now(),
                            name: name,
                            color: colorInput.value,
                            typeId: typeInput.value,
                        });
                    });

                    nameInput.value = "";
                    this.ui.renderSettings();
                    globalBus.emit("view:refresh");
                }

                removeProject(id, renderAfter = true) {
                    this.state.updateState((data) => {
                        data.projects = data.projects.filter(
                            (p) => p.id !== id,
                        );
                        for (let date in data.schedules) {
                            const blocks = data.schedules[date].blocks;
                            for (let key in blocks) {
                                if (blocks[key] === id) delete blocks[key];
                            }
                        }
                    });

                    if (renderAfter) {
                        this.ui.renderSettings();
                        globalBus.emit("view:refresh");
                    }
                }
            }

            window.app = new AppController();
        </script>
    </body>
</html>
