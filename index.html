<!doctype html>
<html lang="en">
    <head>
        <meta charset="UTF-8" />
        <meta name="viewport" content="width=device-width, initial-scale=1.0" />
        <title>Visual Schedule Planner Pro</title>
        <script src="https://cdn.tailwindcss.com"></script>
        <link
            href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap"
            rel="stylesheet"
        />
        <style>
            body {
                font-family: "Inter", sans-serif;
                background-color: #f9fafb;
                color: #1a1a1a;
            }
            .circle-btn {
                width: 44px;
                height: 44px;
                border-radius: 50%;
                display: flex;
                align-items: center;
                justify-content: center;
                font-size: 20px;
                transition: all 0.2s cubic-bezier(0.4, 0, 0.2, 1);
                position: relative;
                background-color: #e5e7eb;
                border: 2px solid transparent;
                cursor: pointer;
            }
            .circle-btn:hover {
                transform: scale(1.1);
                filter: brightness(95%);
                z-index: 10;
            }
            .circle-btn.filled {
                border-color: rgba(0, 0, 0, 0.1);
            }
            .active-date {
                background-color: #4f46e5;
                color: white !important;
                font-weight: bold;
                border-radius: 8px;
            }
            .choice-menu {
                position: absolute;
                top: 50px;
                left: 50%;
                transform: translateX(-50%);
                background: white;
                border: 1px solid #e5e7eb;
                border-radius: 12px;
                padding: 8px;
                display: flex;
                flex-direction: column;
                gap: 4px;
                box-shadow: 0 10px 25px -5px rgba(0, 0, 0, 0.15);
                z-index: 50;
                width: 200px;
            }
            .custom-scroll::-webkit-scrollbar {
                width: 6px;
            }
            .custom-scroll::-webkit-scrollbar-thumb {
                background: #cbd5e1;
                border-radius: 4px;
            }
            @keyframes fadeIn {
                from {
                    opacity: 0;
                }
                to {
                    opacity: 1;
                }
            }
            @keyframes slideUp {
                from {
                    transform: translateY(20px);
                    opacity: 0;
                }
                to {
                    transform: translateY(0);
                    opacity: 1;
                }
            }
            .modal-bg {
                animation: fadeIn 0.2s ease-out forwards;
            }
            .modal-content {
                animation: slideUp 0.2s ease-out forwards;
            }
        </style>
    </head>
    <body class="p-4 md:p-8 h-screen flex flex-col overflow-hidden relative">
        <div
            class="max-w-7xl mx-auto w-full h-full flex flex-col bg-white rounded-2xl shadow-sm border border-gray-100 overflow-hidden relative"
        >
            <header
                class="flex items-center justify-between p-6 border-b border-gray-100"
            >
                <div class="flex items-center gap-4">
                    <div
                        class="w-10 h-10 bg-indigo-600 rounded-lg flex items-center justify-center text-white font-bold text-xl"
                    >
                        V
                    </div>
                    <h1 class="text-xl font-bold">Visual Planner Pro</h1>
                </div>
                <div class="flex items-center gap-6">
                    <button
                        onclick="goToToday()"
                        class="px-4 py-2 border border-gray-200 rounded-full text-xs font-bold hover:bg-gray-50 text-gray-600 transition shadow-sm"
                    >
                        Today
                    </button>
                    <div class="text-right border-l border-gray-200 pl-6">
                        <h2
                            id="display-date"
                            class="text-xl font-bold text-indigo-900"
                        >
                            ...
                        </h2>
                        <p id="display-day" class="text-gray-500 text-sm">
                            ...
                        </p>
                    </div>
                    <button
                        onclick="openSettingsModal()"
                        class="w-10 h-10 rounded-full border border-gray-200 flex items-center justify-center hover:bg-gray-50 hover:border-gray-300 transition text-gray-600 shadow-sm"
                        title="Settings & Data"
                    >
                        <svg
                            width="20"
                            height="20"
                            viewBox="0 0 24 24"
                            fill="none"
                            stroke="currentColor"
                            stroke-width="2"
                            stroke-linecap="round"
                            stroke-linejoin="round"
                        >
                            <line x1="12" y1="5" x2="12" y2="19"></line>
                            <line x1="5" y1="12" x2="19" y2="12"></line>
                        </svg>
                    </button>
                </div>
            </header>

            <div class="flex flex-1 overflow-hidden">
                <aside
                    class="w-80 border-r border-gray-100 p-6 flex flex-col gap-8 overflow-y-auto custom-scroll bg-gray-50"
                >
                    <div
                        class="bg-white p-4 rounded-xl shadow-sm border border-gray-100"
                    >
                        <div class="flex items-center justify-between mb-4">
                            <span class="text-sm font-bold text-gray-800"
                                >April 2026</span
                            >
                        </div>
                        <div
                            class="grid grid-cols-7 gap-1 text-center text-xs font-medium mb-2"
                        >
                            <div class="text-gray-400">S</div>
                            <div class="text-gray-400">M</div>
                            <div class="text-gray-400">T</div>
                            <div class="text-gray-400">W</div>
                            <div class="text-gray-400">T</div>
                            <div class="text-gray-400">F</div>
                            <div class="text-gray-400">S</div>
                        </div>
                        <div
                            id="calendar-grid"
                            class="grid grid-cols-7 gap-1 text-center text-sm"
                        ></div>
                    </div>

                    <div>
                        <h3
                            class="text-sm font-bold text-gray-800 mb-3 flex items-center gap-2"
                        >
                            Active Projects
                        </h3>
                        <div
                            id="project-list"
                            class="flex flex-col gap-2 mb-4"
                        ></div>
                    </div>
                </aside>

                <main class="flex-1 flex flex-col overflow-hidden bg-white">
                    <div
                        class="p-6 border-b border-gray-100 bg-white z-10 shadow-sm"
                    >
                        <h3
                            class="text-sm font-bold text-gray-800 mb-3 flex items-center gap-2"
                        >
                            Daily Time Allocation
                        </h3>
                        <div
                            id="analytics-bar"
                            class="flex flex-wrap gap-4"
                        ></div>
                    </div>

                    <div class="flex-1 overflow-y-auto p-6 custom-scroll">
                        <div
                            id="schedule-grid"
                            class="flex flex-col gap-6 max-w-4xl mx-auto pb-20"
                        ></div>
                    </div>
                </main>
            </div>
        </div>

        <div
            id="settings-modal"
            class="fixed inset-0 bg-black/40 hidden z-50 flex items-center justify-center backdrop-blur-sm p-4"
        >
            <div
                class="bg-white rounded-2xl shadow-2xl w-full max-w-3xl overflow-hidden modal-content flex flex-col max-h-[90vh]"
            >
                <div
                    class="p-4 border-b border-gray-100 flex justify-between items-center bg-gray-50"
                >
                    <h3 class="font-bold text-gray-800">Manage Data</h3>
                    <button
                        onclick="closeSettingsModal()"
                        class="text-gray-400 hover:text-gray-700 transition"
                    >
                        <svg
                            width="20"
                            height="20"
                            viewBox="0 0 24 24"
                            fill="none"
                            stroke="currentColor"
                            stroke-width="2"
                            stroke-linecap="round"
                            stroke-linejoin="round"
                        >
                            <line x1="18" y1="6" x2="6" y2="18"></line>
                            <line x1="6" y1="6" x2="18" y2="18"></line>
                        </svg>
                    </button>
                </div>

                <div class="flex flex-1 overflow-hidden">
                    <div
                        class="flex-1 border-r border-gray-100 p-6 overflow-y-auto custom-scroll"
                    >
                        <h4
                            class="text-sm font-bold text-gray-800 mb-4 border-b pb-2"
                        >
                            1. Types
                        </h4>

                        <div class="flex gap-2 mb-6">
                            <input
                                type="text"
                                id="new-type-name"
                                placeholder="New Type Name"
                                class="text-sm p-2 border border-gray-200 rounded-lg flex-1 focus:outline-none focus:border-indigo-500"
                            />
                            <button
                                onclick="addType()"
                                class="bg-gray-800 text-white px-4 py-2 rounded-lg text-sm font-bold hover:bg-gray-700 transition"
                            >
                                Add
                            </button>
                        </div>

                        <div
                            id="settings-types-list"
                            class="flex flex-col gap-2"
                        ></div>
                    </div>

                    <div
                        class="flex-1 p-6 overflow-y-auto custom-scroll bg-gray-50/50"
                    >
                        <h4
                            class="text-sm font-bold text-gray-800 mb-4 border-b pb-2"
                        >
                            2. Projects
                        </h4>

                        <div
                            class="flex flex-col gap-3 mb-6 bg-white p-4 rounded-xl border border-gray-100 shadow-sm"
                        >
                            <input
                                type="text"
                                id="new-proj-name"
                                placeholder="Project Name"
                                class="text-sm p-2 border border-gray-200 rounded-lg w-full focus:outline-none focus:border-indigo-500"
                            />
                            <div class="flex gap-2">
                                <input
                                    type="color"
                                    id="new-proj-color"
                                    value="#8b5cf6"
                                    class="h-10 w-12 rounded-lg cursor-pointer border border-gray-200 p-1"
                                />
                                <select
                                    id="new-proj-type"
                                    class="text-sm p-2 border border-gray-200 rounded-lg flex-1 bg-white focus:outline-none focus:border-indigo-500"
                                ></select>
                            </div>
                            <button
                                onclick="addProject()"
                                class="w-full bg-indigo-600 text-white text-sm py-2 rounded-lg font-bold hover:bg-indigo-700 transition shadow-sm"
                            >
                                Save Project
                            </button>
                        </div>

                        <div
                            id="settings-projects-list"
                            class="flex flex-col gap-2"
                        ></div>
                    </div>
                </div>
            </div>
        </div>

        <script>
            // --- DATA PERSISTENCE & STATE ---
            const defaultState = {
                currentDate: "2026-04-12",
                types: [
                    { id: "t_work", name: "Work" },
                    { id: "t_personal", name: "Personal" },
                ],
                projects: [
                    {
                        id: "p_deep",
                        name: "Deep Work",
                        color: "#6b92f2",
                        typeId: "t_work",
                    },
                    {
                        id: "p_study",
                        name: "Study",
                        color: "#f2a644",
                        typeId: "t_personal",
                    },
                    {
                        id: "p_health",
                        name: "Health/Meals",
                        color: "#568f32",
                        typeId: "t_personal",
                    },
                ],
                schedules: {
                    "2026-04-12": [
                        ["p_deep", "p_deep", "p_deep", null, null, null],
                        [null, null, "p_study", "p_study", "p_study", null],
                        [null, null, null, null, null, null],
                        [null, null, null, null, null, null],
                        ["p_health", "p_health", "p_health", null, null, null],
                        [null, null, null, null, null, null],
                        [null, null, null, null, null, null],
                        [null, null, null, null, null, null],
                        [null, null, null, null, null, null],
                        [null, null, null, null, null, null],
                    ],
                },
            };

            // Load from LocalStorage or use default
            const savedData = localStorage.getItem("planner_state");
            let state = savedData ? JSON.parse(savedData) : defaultState;

            const saveState = () => {
                localStorage.setItem("planner_state", JSON.stringify(state));
            };

            const hours = [
                "8 AM",
                "9 AM",
                "10 AM",
                "11 AM",
                "12 PM",
                "1 PM",
                "2 PM",
                "3 PM",
                "4 PM",
                "5 PM",
            ];

            // --- UTILITIES ---
            const closeAllMenus = () =>
                document
                    .querySelectorAll(".choice-menu")
                    .forEach((m) => m.remove());
            document.addEventListener("click", closeAllMenus);

            // Escape key listener for QoL
            document.addEventListener("keydown", (e) => {
                if (e.key === "Escape") {
                    closeAllMenus();
                    closeSettingsModal();
                }
            });

            // --- MODAL CONTROLS ---
            function openSettingsModal() {
                renderSettingsData();
                const modal = document.getElementById("settings-modal");
                modal.classList.remove("hidden");
                modal.classList.add("modal-bg");
            }

            function closeSettingsModal() {
                const modal = document.getElementById("settings-modal");
                modal.classList.add("hidden");
                modal.classList.remove("modal-bg");
            }

            document
                .getElementById("settings-modal")
                .addEventListener("click", function (e) {
                    if (e.target === this) closeSettingsModal();
                });

            function goToToday() {
                // Force April 12, 2026 to match calendar UI layout, or use actual today
                state.currentDate = "2026-04-12";
                saveState();
                refreshAllViews();
            }

            // --- RENDER FUNCTIONS ---
            function updateDateDisplay() {
                const dateObj = new Date(state.currentDate);
                const options = {
                    weekday: "long",
                    year: "numeric",
                    month: "long",
                    day: "numeric",
                };
                const parts = dateObj
                    .toLocaleDateString("en-US", options)
                    .split(", ");
                document.getElementById("display-day").innerText = parts[0];
                document.getElementById("display-date").innerText =
                    parts[1] + ", " + parts[2];
            }

            function renderCalendar() {
                const grid = document.getElementById("calendar-grid");
                grid.innerHTML = "";
                for (let i = 0; i < 3; i++)
                    grid.innerHTML += `<div class="py-2 text-gray-300"></div>`;

                for (let day = 1; day <= 30; day++) {
                    const dateStr = `2026-04-${day.toString().padStart(2, "0")}`;
                    const isActive = dateStr === state.currentDate;
                    grid.innerHTML += `
                    <div onclick="selectDate('${dateStr}')"
                         class="py-1 cursor-pointer hover:bg-indigo-50 rounded-md transition ${isActive ? "active-date shadow-md" : "text-gray-700"}">
                        ${day}
                    </div>`;
                }
            }

            function renderProjectsSidebar() {
                const list = document.getElementById("project-list");
                list.innerHTML = "";
                state.projects.forEach((p) => {
                    const typeName =
                        state.types.find((t) => t.id === p.typeId)?.name ||
                        "Unknown";
                    list.innerHTML += `
                    <div class="flex items-center gap-3 p-2 rounded-lg bg-white border border-gray-100 shadow-sm">
                        <div class="w-4 h-4 rounded-full" style="background-color: ${p.color};"></div>
                        <div class="flex flex-col">
                            <span class="text-sm font-bold text-gray-800 leading-tight">${p.name}</span>
                            <span class="text-[10px] text-gray-400 uppercase tracking-wide">${typeName}</span>
                        </div>
                    </div>`;
                });
            }

            function renderAnalytics() {
                const bar = document.getElementById("analytics-bar");
                bar.innerHTML = "";
                const todayData = state.schedules[state.currentDate] || [];
                let counts = {};

                todayData.forEach((row) => {
                    row.forEach((block) => {
                        if (block) counts[block] = (counts[block] || 0) + 1;
                    });
                });

                let totalAssigned = 0;
                state.projects.forEach((p) => {
                    const blocks = counts[p.id] || 0;
                    if (blocks > 0) {
                        const minutes = blocks * 10;
                        const hoursStr =
                            minutes >= 60
                                ? `${(minutes / 60).toFixed(1)}h`
                                : `${minutes}m`;
                        bar.innerHTML += `
                        <div class="flex items-center gap-2 px-3 py-1.5 rounded-full bg-gray-50 border border-gray-200 shadow-sm">
                            <span class="w-3 h-3 rounded-full" style="background-color: ${p.color}"></span>
                            <span class="text-xs font-semibold text-gray-700">${p.name}: <span class="text-gray-500">${hoursStr}</span></span>
                        </div>`;
                        totalAssigned++;
                    }
                });

                if (totalAssigned === 0)
                    bar.innerHTML = `<span class="text-sm text-gray-400 italic">No blocks assigned.</span>`;
            }

            function renderSchedule() {
                const container = document.getElementById("schedule-grid");
                container.innerHTML = "";

                // Ensure array exists for selected date
                if (!state.schedules[state.currentDate]) {
                    state.schedules[state.currentDate] = Array(10)
                        .fill(null)
                        .map(() => Array(6).fill(null));
                    saveState();
                }

                const dayData = state.schedules[state.currentDate];

                hours.forEach((time, rowIndex) => {
                    const rowEl = document.createElement("div");
                    rowEl.className = "flex items-center gap-8 group";

                    const timeLabel = document.createElement("div");
                    timeLabel.className =
                        "w-16 text-xs font-bold text-gray-400 uppercase tracking-wider text-right";
                    timeLabel.textContent = time;

                    const blocksContainer = document.createElement("div");
                    blocksContainer.className =
                        "flex gap-3 md:gap-4 flex-wrap bg-gray-50 p-2 rounded-2xl group-hover:bg-gray-100 transition";

                    dayData[rowIndex].forEach((blockProjectId, colIndex) => {
                        const block = document.createElement("button");
                        block.className = "circle-btn shadow-sm";

                        const project = state.projects.find(
                            (p) => p.id === blockProjectId,
                        );

                        if (project) {
                            block.style.backgroundColor = project.color;
                            block.classList.add("filled");
                            block.title = project.name;
                        } else {
                            block.title = "Empty (Click to set)";
                        }

                        // QoL: Right-Click to instantly clear
                        block.oncontextmenu = (e) => {
                            e.preventDefault();
                            updateBlock(rowIndex, colIndex, null);
                        };

                        block.onclick = (e) => {
                            e.stopPropagation();
                            closeAllMenus();

                            const menu = document.createElement("div");
                            menu.className = "choice-menu";

                            state.projects.forEach((p) => {
                                const btn = document.createElement("button");
                                btn.className =
                                    "flex items-center justify-between p-2 w-full hover:bg-gray-100 rounded-lg transition text-left group/btn";

                                btn.innerHTML = `
                                <div class="flex items-center gap-3 overflow-hidden">
                                    <div class="w-4 h-4 rounded-full shadow-sm flex-shrink-0" style="background-color: ${p.color}"></div>
                                    <span class="text-xs font-bold text-gray-700 truncate">${p.name}</span>
                                </div>
                                <div class="opacity-0 group-hover/btn:opacity-100 text-[10px] text-gray-400 bg-white px-2 py-1 rounded shadow-sm border border-gray-100 fill-hour-btn" title="Fill entire hour">Fill Hr</div>
                            `;

                                btn.onclick = (event) => {
                                    event.stopPropagation();
                                    // QoL: Click "Fill Hr" inside the button to fill row
                                    if (
                                        event.target.classList.contains(
                                            "fill-hour-btn",
                                        )
                                    ) {
                                        fillRow(rowIndex, p.id);
                                    } else {
                                        updateBlock(rowIndex, colIndex, p.id);
                                    }
                                };
                                menu.appendChild(btn);
                            });

                            const reset = document.createElement("button");
                            reset.className =
                                "mt-1 p-2 w-full text-left text-xs font-bold text-red-500 hover:bg-red-50 rounded-lg transition border-t border-gray-100";
                            reset.innerText = "Clear Block";
                            reset.onclick = (event) => {
                                event.stopPropagation();
                                updateBlock(rowIndex, colIndex, null);
                            };
                            menu.appendChild(reset);
                            block.appendChild(menu);
                        };

                        blocksContainer.appendChild(block);
                    });

                    rowEl.appendChild(timeLabel);
                    rowEl.appendChild(blocksContainer);
                    container.appendChild(rowEl);
                });
            }

            // --- SETTINGS MANAGEMENT ---
            function renderSettingsData() {
                const typeSelect = document.getElementById("new-proj-type");
                typeSelect.innerHTML =
                    state.types.length === 0
                        ? "<option disabled>No types available</option>"
                        : "";
                state.types.forEach(
                    (t) =>
                        (typeSelect.innerHTML += `<option value="${t.id}">${t.name}</option>`),
                );

                const typesList = document.getElementById(
                    "settings-types-list",
                );
                typesList.innerHTML = "";
                state.types.forEach((t) => {
                    typesList.innerHTML += `
                    <div class="flex items-center justify-between p-3 bg-white border border-gray-100 rounded-lg shadow-sm">
                        <span class="text-sm font-medium text-gray-700">${t.name}</span>
                        <button onclick="removeType('${t.id}')" class="text-red-400 hover:text-red-600 font-bold text-xs">Remove</button>
                    </div>`;
                });

                const projList = document.getElementById(
                    "settings-projects-list",
                );
                projList.innerHTML = "";
                state.projects.forEach((p) => {
                    const typeName =
                        state.types.find((t) => t.id === p.typeId)?.name ||
                        "Unknown";
                    projList.innerHTML += `
                    <div class="flex items-center justify-between p-3 bg-white border border-gray-100 rounded-lg shadow-sm">
                        <div class="flex items-center gap-3">
                            <div class="w-4 h-4 rounded-full" style="background-color: ${p.color};"></div>
                            <div class="flex flex-col">
                                <span class="text-sm font-bold text-gray-800">${p.name}</span>
                                <span class="text-[10px] text-gray-400 uppercase">${typeName}</span>
                            </div>
                        </div>
                        <button onclick="removeProject('${p.id}')" class="text-red-400 hover:text-red-600 font-bold text-xs">Remove</button>
                    </div>`;
                });
            }

            function addType() {
                const input = document.getElementById("new-type-name");
                const name = input.value.trim();
                if (!name) return;
                state.types.push({ id: "t_" + Date.now(), name });
                input.value = "";
                saveState();
                renderSettingsData();
            }

            function removeType(id) {
                state.types = state.types.filter((t) => t.id !== id);
                state.projects
                    .filter((p) => p.typeId === id)
                    .forEach((p) => removeProject(p.id, false));
                saveState();
                renderSettingsData();
                refreshAllViews();
            }

            function addProject() {
                const nameInput = document.getElementById("new-proj-name");
                const colorInput = document.getElementById("new-proj-color");
                const typeInput = document.getElementById("new-proj-type");

                const name = nameInput.value.trim();
                if (!name || !typeInput.value)
                    return alert("Name and Type are required!");

                state.projects.push({
                    id: "p_" + Date.now(),
                    name: name,
                    color: colorInput.value,
                    typeId: typeInput.value,
                });

                nameInput.value = "";
                saveState();
                renderSettingsData();
                refreshAllViews();
            }

            function removeProject(id, updateStorage = true) {
                state.projects = state.projects.filter((p) => p.id !== id);
                for (let date in state.schedules) {
                    state.schedules[date] = state.schedules[date].map((row) =>
                        row.map((block) => (block === id ? null : block)),
                    );
                }
                if (updateStorage) saveState();
                renderSettingsData();
                refreshAllViews();
            }

            // --- ACTIONS ---
            function selectDate(dateStr) {
                state.currentDate = dateStr;
                saveState();
                refreshAllViews();
            }

            function updateBlock(row, col, projectId) {
                state.schedules[state.currentDate][row][col] = projectId;
                saveState();
                closeAllMenus();
                renderSchedule();
                renderAnalytics();
            }

            function fillRow(row, projectId) {
                for (let i = 0; i < 6; i++) {
                    state.schedules[state.currentDate][row][i] = projectId;
                }
                saveState();
                closeAllMenus();
                renderSchedule();
                renderAnalytics();
            }

            function refreshAllViews() {
                updateDateDisplay();
                renderCalendar();
                renderProjectsSidebar();
                renderSchedule();
                renderAnalytics();
            }

            // --- INITIALIZE ---
            refreshAllViews();
        </script>
    </body>
</html>
