                    );
                    globalBus.on("ui:goToday", () => {
                        this.goToToday();
                        this.toggleCalendarPopover();
                    });
                    globalBus.on("ui:setView", (mode) =>
                        this.setViewMode(mode),
                    );
                    globalBus.on("ui:cycleView", () =>
                        this.setViewMode(
                            this.state.data.viewMode === "day" ? "week" : "day",
                        ),
                    );
                    globalBus.on("ui:exitFocus", () => this.exitFocusMode());
                    globalBus.on("ui:togglePaint", (id) =>
                        this.togglePaintMode(id),
                    );
                    globalBus.on("ui:closeSettings", () =>
                        this.closeSettingsModal(),
                    );
                    globalBus.on("ui:addType", () => this.addType());
                    globalBus.on("ui:cancelConfirm", () =>
                        this.cancelConfirm(),
                    );
                    globalBus.on("ui:selectDate", (date) => {
                        this.selectDate(date);
                        this.toggleCalendarPopover();
                    });
                    globalBus.on("ui:addProject", (typeId) =>
                        this.addProjectToType(typeId),
                    );
                    globalBus.on("ui:removeType", (typeId) =>
                        this.requestRemoveType(typeId),
                    );
                    globalBus.on("ui:removeProject", (projId) =>
                        this.removeProject(projId),
                    );
                    globalBus.on("ui:enterFocus", ({ projectId, row, col }) =>
                        this.enterFocusMode(projectId, row, col),
                    );
                    globalBus.on("ui:enterFocusSelection", ({ row, col }) =>
                        this.enterFocusModeSelection(row, col),
                    );
                }

                enterFocusModeSelection(startRow, startCol) {
                    const overlay =
                        document.getElementById("focus-mode-overlay");
                    const selector = document.getElementById(
                        "focus-project-selector",
                    );
                    const nameEl =
                        document.getElementById("focus-project-name");
                    const timerEl = document.getElementById("focus-timer");
                    const list = document.getElementById("focus-project-list");

                    if (this.focusTimerInterval)
                        clearInterval(this.focusTimerInterval);

                    nameEl.classList.add("hidden");
                    timerEl.classList.add("hidden");
                    selector.classList.remove("hidden");
                    overlay.classList.remove("hidden");

                    list.innerHTML = "";
                    const projects = this.state.getProjects();

                    if (projects.length === 0) {
                        list.innerHTML = `<div class="p-4 text-center text-gray-500 text-sm font-bold border border-dashed border-gray-300 rounded-xl">No projects available. Close to create one first!</div>`;
                    } else {
                        projects.forEach((p) => {
                            const btn = document.createElement("button");
                            btn.className =
                                "flex items-center gap-3 p-3 w-full hover:bg-indigo-50 rounded-xl transition text-left group/btn border border-gray-200 hover:border-indigo-300 hover:shadow-md bg-white shadow-sm mb-2";

                            const dot = document.createElement("div");
                            dot.className =
                                "w-4 h-4 rounded-full flex-shrink-0";
                            dot.style.backgroundColor = p.color;

                            const span = document.createElement("span");
                            span.className =
                                "text-sm font-bold text-gray-800 truncate";
                            span.textContent = p.name; // XSS Safe

                            btn.appendChild(dot);
                            btn.appendChild(span);
                            btn.onclick = () =>
                                this.selectFocusProject(
                                    p.id,
                                    startRow,
                                    startCol,
                                );
                            list.appendChild(btn);
                        });
                    }
                }

                selectFocusProject(projectId, row, col) {
                    const dateStr = this.state.getLocalISODate(new Date());
                    globalBus.emit("block:update", {
                        date: dateStr,
                        row: row,
                        col: col,
                        projectId: projectId,
                    });

                    document
                        .getElementById("focus-project-selector")
                        .classList.add("hidden");
                    document
                        .getElementById("focus-timer")
                        .classList.remove("hidden");
                    document
                        .getElementById("focus-project-name")
                        .classList.remove("hidden");

                    this.enterFocusMode(projectId, row, col);
                }

                enterFocusMode(projectId, startRow, startCol) {
                    if (this.focusTimerInterval)
                        clearInterval(this.focusTimerInterval);

                    const project = this.state.getProjectById(projectId);
                    if (!project) return;

                    const overlay =
                        document.getElementById("focus-mode-overlay");
                    const nameEl =
                        document.getElementById("focus-project-name");
                    const timerEl = document.getElementById("focus-timer");

                    nameEl.textContent = project.name; // XSS Safe
                    nameEl.style.color = project.color;
                    overlay.classList.remove("hidden");

                    document
                        .getElementById("focus-project-selector")
                        .classList.add("hidden");
                    document
                        .getElementById("focus-project-name")
                        .classList.remove("hidden");
                    document
                        .getElementById("focus-timer")
                        .classList.remove("hidden");

                    const today = this.state.getLocalISODate(new Date());
                    const blocks = this.state.getSchedule(today).blocks;

                    let r = startRow;
                    let c = startCol;

                    while (blocks[`${r}-${c}`] === projectId) {
                        c++;
                        if (c > 5) {
                            c = 0;
                            r++;
                        }
                        if (r > 23) break;
                    }

                    const now = new Date();
                    const endTime = new Date(
                        now.getFullYear(),
                        now.getMonth(),
                        now.getDate(),
                        r,
                        c * 10,
                        0,
                    );

                    const updateTimer = () => {
                        const currentTime = new Date();
                        const diff = Math.max(0, endTime - currentTime);

                        if (diff === 0) {
                            clearInterval(this.focusTimerInterval);
                            timerEl.innerText = "00:00";
                            return;
                        }

                        const totalSeconds = Math.floor(diff / 1000);
                        const h = Math.floor(totalSeconds / 3600);
                        const m = Math.floor((totalSeconds % 3600) / 60);
                        const s = totalSeconds % 60;

                        let timeStr = "";
                        if (h > 0) timeStr += String(h).padStart(2, "0") + ":";
                        timeStr +=
                            String(m).padStart(2, "0") +
                            ":" +
                            String(s).padStart(2, "0");

                        timerEl.innerText = timeStr;
                    };

                    updateTimer();
                    this.focusTimerInterval = setInterval(updateTimer, 1000);
                }

                exitFocusMode() {
                    document
                        .getElementById("focus-mode-overlay")
                        .classList.add("hidden");
                    if (this.focusTimerInterval)
                        clearInterval(this.focusTimerInterval);
                    document
                        .getElementById("focus-project-name")
                        .classList.remove("hidden");
                    document
                        .getElementById("focus-timer")
                        .classList.remove("hidden");
                    document
                        .getElementById("focus-project-selector")
                        .classList.add("hidden");
                }

                setupLogicListeners() {
                    globalBus.on(
                        "block:update",
                        ({ date, row, col, projectId }) => {
                            const targetDate =
                                date || this.state.getCurrentDate();
                            this.state.ensureDateExists(targetDate);

                            let oldProjectId = null;
                            this.state.updateState((data) => {
                                const blocks =
                                    data.schedules[targetDate].blocks;
                                oldProjectId = blocks[`${row}-${col}`];
                                if (projectId)
                                    blocks[`${row}-${col}`] = projectId;
                                else delete blocks[`${row}-${col}`];
                            });

                            // Update O(1) Index Map
                            this.state.updateBlockIndex(
                                targetDate,
                                row,
                                col,
                                projectId,
                                oldProjectId,
                            );

                            globalBus.emit("block:updated", {
                                date: targetDate,
                                row,
                                col,
                                project: projectId
                                    ? this.state.getProjectById(projectId)
                                    : null,
                            });
                            globalBus.emit("analytics:refreshed");
                        },
                    );

                    globalBus.on(
                        "hierarchy:updateType",
                        ({ id, name, element }) => {
                            this.state.updateState((data) => {
                                const t = data.types.find((x) => x.id === id);
                                if (t) t.name = name;
                            });
                            element.classList.add("edit-success");
                            setTimeout(
                                () => element.classList.remove("edit-success"),
                                600,
                            );
                            Toast.show("Saved");
                            globalBus.emit("hierarchy:refreshed");
                        },
                    );

                    globalBus.on(
                        "hierarchy:updateProject",
                        ({ id, name, element }) => {
                            this.state.updateState((data) => {
                                const p = data.projects.find(
                                    (x) => x.id === id,
                                );
                                if (p) p.name = name;
                            });
                            element.classList.add("edit-success");
                            setTimeout(
                                () => element.classList.remove("edit-success"),
                                600,
                            );
                            Toast.show("Saved");
                            globalBus.emit("schedule:refreshed");
                            globalBus.emit("hierarchy:refreshed");
                        },
                    );

                    globalBus.on(
                        "hierarchy:updateProjectColor",
                        ({ id, color }) => {
                            this.state.updateState((data) => {
                                const p = data.projects.find(
                                    (x) => x.id === id,
                                );
                                if (p) p.color = color;
                            });
                            globalBus.emit("schedule:refreshed");
                            globalBus.emit("hierarchy:refreshed");
                        },
                    );

                    globalBus.on(
                        "hierarchy:reorderType",
                        ({ sourceId, targetId }) => {
                            if (sourceId === targetId) return;
                            this.state.updateState((data) => {
                                const arr = data.types;
                                const fromIdx = arr.findIndex(
                                    (t) => t.id === sourceId,
                                );
                                const toIdx = arr.findIndex(
                                    (t) => t.id === targetId,
                                );
                                if (fromIdx !== -1 && toIdx !== -1) {
                                    const [item] = arr.splice(fromIdx, 1);
                                    arr.splice(toIdx, 0, item);
                                }
                            });
                            globalBus.emit("hierarchy:refreshed");
                        },
                    );

                    globalBus.on(
                        "hierarchy:reorderProject",
                        ({ sourceId, targetId }) => {
                            if (sourceId === targetId) return;
                            this.state.updateState((data) => {
                                const arr = data.projects;
                                const fromIdx = arr.findIndex(
                                    (p) => p.id === sourceId,
                                );
                                const toIdx = arr.findIndex(
                                    (p) => p.id === targetId,
                                );
                                if (fromIdx !== -1 && toIdx !== -1) {
                                    const targetType = arr[toIdx].typeId;
                                    const [item] = arr.splice(fromIdx, 1);
                                    item.typeId = targetType;
                                    arr.splice(toIdx, 0, item);
                                }
                            });
                            globalBus.emit("hierarchy:refreshed");
                        },
                    );

                    globalBus.on(
                        "hierarchy:moveProjectToType",
                        ({ projectId, typeId }) => {
                            this.state.updateState((data) => {
                                const p = data.projects.find(
                                    (x) => x.id === projectId,
                                );
                                if (p) p.typeId = typeId;
                            });
                            globalBus.emit("hierarchy:refreshed");
                        },
                    );
                }

                setViewMode(mode) {
                    this.state.updateState((data) => (data.viewMode = mode));
                    globalBus.emit("view:refresh");
                }

                // GHOST METHODS - Untouched as requested
                copyDay() {
                    this.clipboardDay = JSON.parse(
                        JSON.stringify(
                            this.state.getSchedule(this.state.getCurrentDate()),
                        ),
                    );
                    Toast.show("Day copied");
                }
                pasteDay() {
                    if (!this.clipboardDay) {
                        Toast.show("Clipboard empty", "error");
                        return;
                    }
                    this.state.updateState((data) => {
                        data.schedules[data.currentDate] = JSON.parse(
                            JSON.stringify(this.clipboardDay),
                        );
                    });
                    globalBus.emit("schedule:refreshed");
                    globalBus.emit("analytics:refreshed");
                    Toast.show("Schedule pasted");
                }
                clearDay() {
                    this.state.updateState((data) => {
                        data.schedules[data.currentDate] = { blocks: {} };
                    });
                    globalBus.emit("schedule:refreshed");
                    globalBus.emit("analytics:refreshed");
                    Toast.show("Day cleared");
                }

                toggleSidebar() {
                    this.state.updateState((data) => {
                        data.isSidebarCollapsed = !data.isSidebarCollapsed;
                    });
                    const sidebar = document.getElementById("app-sidebar");
                    sidebar.classList.toggle("sidebar-collapsed");
                    const burger = document.getElementById("icon-burger");
                    const arrow = document.getElementById("icon-arrow");

                    if (sidebar.classList.contains("sidebar-collapsed")) {
                        arrow.style.opacity = "0";
                        arrow.style.transform = "rotate(-90deg)";
                        burger.style.opacity = "1";
                        burger.style.transform = "rotate(0deg)";
                    } else {
                        arrow.style.opacity = "1";
                        arrow.style.transform = "rotate(0deg)";
                        burger.style.opacity = "0";
                        burger.style.transform = "rotate(90deg)";
                    }
                }

                toggleCalendarPopover(e) {
                    if (e) e.stopPropagation();
                    const pop = document.getElementById("calendar-popover");
                    if (pop) pop.classList.toggle("hidden");
                }

                togglePaintMode(projectId) {
                    if (!projectId || this.state.paintProjectId === projectId) {
                        this.state.paintProjectId = null;
                        document
                            .getElementById("paint-banner")
                            .classList.add("hidden");
                    } else {
                        this.state.paintProjectId = projectId;
                        let name = "Eraser";
                        if (projectId !== "CLEAR") {
                            const project =
                                this.state.getProjectById(projectId);
                            name = project ? project.name : "";
                        }
                        document.getElementById(
                            "paint-banner-text",
                        ).textContent = name; // XSS SAFE
                        document
                            .getElementById("paint-banner")
                            .classList.remove("hidden");
                    }
                    globalBus.emit("paint:updated", this.state.paintProjectId);
                }

                shiftMonth(dir) {
                    let m = this.state.viewMonth + dir;
                    let y = this.state.viewYear;
                    if (m < 0) {
                        m = 11;
                        y--;
                    } else if (m > 11) {
                        m = 0;
                        y++;
                    }
                    this.state.viewMonth = m;
                    this.state.viewYear = y;
                    this.ui.renderCalendar();
                }

                shiftDate(days) {
                    const [y, m, d] = this.state
                        .getCurrentDate()
                        .split("-")
                        .map(Number);
                    const curr = new Date(y, m - 1, d);
                    curr.setDate(curr.getDate() + days);
                    const localISOTime = `${curr.getFullYear()}-${String(curr.getMonth() + 1).padStart(2, "0")}-${String(curr.getDate()).padStart(2, "0")}`;
                    this.state.viewMonth = curr.getMonth();
                    this.state.viewYear = curr.getFullYear();
                    this.selectDate(localISOTime);
                }

                goToToday() {
                    const todayStr = this.state.getLocalISODate();
                    const [y, m, d] = todayStr.split("-").map(Number);
                    this.state.viewMonth = m - 1;
                    this.state.viewYear = y;
                    this.selectDate(todayStr);
                }

                selectDate(dateStr) {
                    this.state.updateState((data) => {
                        data.currentDate = dateStr;
                    });
                    this.state.ensureDateExists(dateStr);
                    globalBus.emit("view:refresh");
                }

                openSettingsModal() {
                    this.ui.renderSettings();
                    this.ui.toggleModal("settings-modal", true);
                }
                closeSettingsModal() {
                    this.ui.toggleModal("settings-modal", false);
                }

                addType() {
                    const input = document.getElementById("new-type-name");
                    const name = input.value.trim();
                    if (!name) return;

                    if (
                        this.state
                            .getTypes()
                            .some(
                                (t) =>
                                    t.name.toLowerCase() === name.toLowerCase(),
                            )
                    ) {
                        Toast.show(
                            `Category "${name}" already exists!`,
                            "error",
                        );
                        return;
                    }
                    this.state.updateState((data) => {
                        data.types.push({ id: "t_" + Date.now(), name });
                    });
                    input.value = "";
                    Toast.show(`Added ${name}`);
                    globalBus.emit("hierarchy:refreshed");
                }

                requestRemoveType(id) {
                    const projectsLinked = this.state.getProjectsByType(id);
                    if (projectsLinked.length > 0) this.ui.showConfirm(id);
                    else this.executeRemoveType(id);
                }

                cancelConfirm() {
                    this.ui.toggleModal("confirm-modal", false);
                }

                executeRemoveType(id) {
                    const toDeleteIds = this.state
                        .getProjectsByType(id)
                        .map((p) => p.id);

                    this.state.updateState((data) => {
                        data.types = data.types.filter((t) => t.id !== id);
                        data.projects = data.projects.filter(
                            (p) => !toDeleteIds.includes(p.id),
                        );

                        // O(1) Deletion via Map
                        toDeleteIds.forEach((pId) => {
                            if (this.state.projectBlockMap[pId]) {
                                this.state.projectBlockMap[pId].forEach(
                                    (blockString) => {
                                        const [bDate, bKey] =
                                            blockString.split("#");
                                        if (
                                            data.schedules[bDate] &&
                                            data.schedules[bDate].blocks[bKey]
                                        ) {
                                            delete data.schedules[bDate].blocks[
                                                bKey
                                            ];
                                        }
                                    },
                                );
                                delete this.state.projectBlockMap[pId];
                            }
                        });
                    });

                    Toast.show("Category deleted");
                    globalBus.emit("view:refresh");
                    this.ui.renderSettings();
                }

                addProjectToType(typeId) {
                    const baseName = "New Project";
                    let newName = baseName;
                    let counter = 1;
                    while (
                        this.state.getProjects().some((p) => p.name === newName)
                    ) {
                        newName = `${baseName} ${counter}`;
                        counter++;
                    }
                    const randomHex =
                        "#" +
                        Math.floor(Math.random() * 16777215)
                            .toString(16)
                            .padStart(6, "0");
                    this.state.updateState((data) => {
                        data.projects.push({
                            id: "p_" + Date.now(),
                            name: newName,
                            color: randomHex,
                            typeId: typeId,
                        });
                    });
                    Toast.show("Added new project");
                    globalBus.emit("hierarchy:refreshed");
                }

                removeProject(id) {
                    this.state.updateState((data) => {
                        data.projects = data.projects.filter(
                            (p) => p.id !== id,
                        );

                        // O(1) Deletion via Map
                        if (this.state.projectBlockMap[id]) {
                            this.state.projectBlockMap[id].forEach(
                                (blockString) => {
                                    const [bDate, bKey] =
                                        blockString.split("#");
                                    if (
                                        data.schedules[bDate] &&
                                        data.schedules[bDate].blocks[bKey]
                                    ) {
                                        delete data.schedules[bDate].blocks[
                                            bKey
                                        ];
                                    }
                                },
                            );
                            delete this.state.projectBlockMap[id];
                        }
                    });
                    Toast.show("Project removed");
                    globalBus.emit("view:refresh");
                    this.ui.renderSettings();
                }
            }

            window.app = new AppController();
        </script>
    </body>
</html>
