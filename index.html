                    const [year, month, day] = dateStr.split("-").map(Number);
                    const dateObj = new Date(year, month - 1, day);

                    if (this.state.data.viewMode === "week") {
                        const start = this.getStartOfWeek(dateStr);
                        const end = new Date(start);
                        end.setDate(start.getDate() + 6);
                        document.getElementById("display-day").textContent =
                            "Week View";
                        document.getElementById("display-date").innerHTML =
                            `<span>${start.toLocaleDateString("en-US", { month: "short", day: "numeric" })} - ${end.toLocaleDateString("en-US", { month: "short", day: "numeric", year: "numeric" })}</span><svg class="w-5 h-5 text-gray-400 group-hover:text-indigo-600 transition-colors" viewBox="0 0 20 20" fill="currentColor"><path fill-rule="evenodd" d="M5.293 7.293a1 1 0 011.414 0L10 10.586l3.293-3.293a1 1 0 111.414 1.414l-4 4a1 1 0 01-1.414 0l-4-4a1 1 0 010-1.414z" clip-rule="evenodd" /></svg>`;
                    } else {
                        const parts = dateObj
                            .toLocaleDateString("en-US", {
                                weekday: "long",
                                year: "numeric",
                                month: "long",
                                day: "numeric",
                            })
                            .split(", ");
                        document.getElementById("display-day").textContent =
                            parts[0];
                        document.getElementById("display-date").innerHTML =
                            `<span>${parts[1]}, ${parts[2]}</span><svg class="w-5 h-5 text-gray-400 group-hover:text-indigo-600 transition-colors" viewBox="0 0 20 20" fill="currentColor"><path fill-rule="evenodd" d="M5.293 7.293a1 1 0 011.414 0L10 10.586l3.293-3.293a1 1 0 111.414 1.414l-4 4a1 1 0 01-1.414 0l-4-4a1 1 0 010-1.414z" clip-rule="evenodd" /></svg>`;
                    }
                }

                renderCalendar() {
                    const grid = document.getElementById("calendar-grid");
                    const monthLabel = document.getElementById(
                        "calendar-month-label",
                    );
                    grid.innerHTML = "";

                    const year = this.state.viewYear;
                    const month = this.state.viewMonth;
                    monthLabel.textContent = new Date(
                        year,
                        month,
                        1,
                    ).toLocaleString("default", {
                        month: "long",
                        year: "numeric",
                    });

                    const firstDay = new Date(year, month, 1).getDay();
                    const daysInMonth = new Date(year, month + 1, 0).getDate();

                    for (let i = 0; i < firstDay; i++)
                        grid.innerHTML += `<div class="py-2"></div>`;

                    for (let day = 1; day <= daysInMonth; day++) {
                        const loopDateStr = `${year}-${String(month + 1).padStart(2, "0")}-${String(day).padStart(2, "0")}`;
                        const isActive =
                            loopDateStr === this.state.getCurrentDate();
                        grid.innerHTML += `<div data-action="select-date" data-date="${loopDateStr}" class="py-1 cursor-pointer hover:bg-indigo-50 hover:text-indigo-700 rounded-lg transition font-medium ${isActive ? "active-date shadow-md" : "text-gray-700"}">${day}</div>`;
                    }
                }

                renderSidebarProjects(projects, types) {
                    const list = document.getElementById("project-list");
                    list.innerHTML = "";

                    const isEraserActive =
                        this.state.paintProjectId === "CLEAR";
                    const eraserCard = document.createElement("div");
                    eraserCard.className = `project-card flex items-center gap-3 p-2 rounded-lg bg-white border ${isEraserActive ? "paint-active" : "border-gray-100"} shadow-sm cursor-pointer transition mb-4`;
                    eraserCard.title = "Eraser (Clear Blocks)";
                    eraserCard.dataset.action = "toggle-paint";
                    eraserCard.dataset.projectid = "CLEAR";
                    eraserCard.innerHTML = `<div class="w-4 h-4 rounded-full flex-shrink-0 border-2 border-red-400 bg-red-50 flex items-center justify-center"></div><span class="text-sm font-semibold text-gray-800 truncate hide-on-collapse">Eraser</span>${isEraserActive ? '<span class="paint-active-indicator bg-red-500">Active</span>' : ""}`;
                    list.appendChild(eraserCard);

                    types.forEach((t) => {
                        const typeProjects = projects.filter(
                            (p) => p.typeId === t.id,
                        );
                        if (typeProjects.length === 0) return;

                        const header = document.createElement("div");
                        header.className =
                            "text-xs font-bold text-gray-400 uppercase tracking-wider mb-2 pl-1 hide-on-collapse";
                        header.textContent = t.name;
                        list.appendChild(header);

                        typeProjects.forEach((p) => {
                            const isActivePaint =
                                this.state.paintProjectId === p.id;
                            const pCard = document.createElement("div");
                            pCard.className = `project-card flex items-center gap-3 p-2 rounded-lg bg-white border ${isActivePaint ? "paint-active" : "border-gray-100"} shadow-sm cursor-pointer transition`;
                            pCard.title = p.name;
                            pCard.dataset.action = "toggle-paint";
                            pCard.dataset.projectid = p.id;

                            const colorDot = document.createElement("div");
                            colorDot.className =
                                "w-4 h-4 rounded-full flex-shrink-0";
                            colorDot.style.backgroundColor = p.color;

                            const textSpan = document.createElement("span");
                            textSpan.className =
                                "text-sm font-semibold text-gray-800 truncate hide-on-collapse";
                            textSpan.textContent = p.name;

                            pCard.appendChild(colorDot);
                            pCard.appendChild(textSpan);
                            if (isActivePaint) {
                                const badge = document.createElement("span");
                                badge.className = "paint-active-indicator";
                                badge.textContent = "Paint";
                                pCard.appendChild(badge);
                            }
                            list.appendChild(pCard);
                        });
                    });
                }

                renderAnalytics(typeCounts, types) {
                    const bar = document.getElementById("analytics-bar");
                    bar.innerHTML = "";
                    let totalAssigned = 0;
                    types.forEach((t) => {
                        const bCount = typeCounts[t.id] || 0;
                        if (bCount > 0) {
                            const minutes = bCount * 10;
                            const hoursStr =
                                minutes >= 60
                                    ? `${(minutes / 60).toFixed(1)}h`
                                    : `${minutes}m`;

                            const div = document.createElement("div");
                            div.className =
                                "flex items-center gap-2 px-3 py-1.5 rounded-full bg-gray-50 border border-gray-200 shadow-sm";

                            const span = document.createElement("span");
                            span.className =
                                "text-xs font-semibold text-gray-700";
                            span.textContent = `${t.name}: `;

                            const innerSpan = document.createElement("span");
                            innerSpan.className = "text-gray-500";
                            innerSpan.textContent = hoursStr;

                            span.appendChild(innerSpan);
                            div.appendChild(span);
                            bar.appendChild(div);
                            totalAssigned++;
                        }
                    });
                    if (totalAssigned === 0)
                        bar.innerHTML = `<span class="text-sm text-gray-400 font-medium italic">Click a block to schedule.</span>`;
                }

                getStartOfWeek(dateStr) {
                    const [y, m, d] = dateStr.split("-").map(Number);
                    const dateObj = new Date(y, m - 1, d);
                    const day = dateObj.getDay();
                    dateObj.setDate(dateObj.getDate() - day);
                    return dateObj;
                }

                renderWeekSchedule(currentDateStr, hours, projects) {
                    const container = document.getElementById("schedule-grid");
                    container.innerHTML = "";
                    this.blockNodes = {};
                    this.isDaySkeletonBuilt = false;
                    const startOfWeek = this.getStartOfWeek(currentDateStr);
                    const weekDates = [];
                    const weekLabels = [];
                    const days = [
                        "SUN",
                        "MON",
                        "TUE",
                        "WED",
                        "THU",
                        "FRI",
                        "SAT",
                    ];

                    for (let i = 0; i < 7; i++) {
                        let d = new Date(startOfWeek);
                        d.setDate(startOfWeek.getDate() + i);
                        const year = d.getFullYear();
                        const month = String(d.getMonth() + 1).padStart(2, "0");
                        const date = String(d.getDate()).padStart(2, "0");
                        const formattedDate = `${year}-${month}-${date}`;
                        weekDates.push(formattedDate);
                        weekLabels.push({
                            day: days[i],
                            date: d.getDate(),
                            isCurrent: formattedDate === currentDateStr,
                        });
                    }

                    const headerRow = document.createElement("div");
                    headerRow.className =
                        "grid grid-cols-[60px_repeat(7,1fr)] gap-2 md:gap-4 mb-2 pb-2 border-b border-gray-100 sticky top-0 bg-white z-10 pt-2";
                    headerRow.innerHTML =
                        `<div></div>` +
                        weekLabels
                            .map(
                                (l) =>
                                    `<div class="flex flex-col items-center justify-center cursor-pointer hover:bg-gray-50 rounded py-1 transition ${l.isCurrent ? "bg-indigo-50 text-indigo-700" : "text-gray-500"}" data-action="select-date" data-date="${weekDates[weekLabels.indexOf(l)]}"><span class="text-[9px] font-bold tracking-widest">${l.day}</span><span class="text-sm font-black ${l.isCurrent ? "text-indigo-700" : "text-gray-800"}">${l.date}</span></div>`,
                            )
                            .join("");
                    container.appendChild(headerRow);

                    const now = new Date();
                    const logicalToday = this.state.getLocalISODate(now);
                    let currentRowIndex = now.getHours();

                    hours.forEach((time, rowIndex) => {
                        const rowEl = document.createElement("div");
                        rowEl.className =
                            "grid grid-cols-[60px_repeat(7,1fr)] gap-2 md:gap-4 items-center group py-1";

                        const timeLabel = document.createElement("div");
                        timeLabel.className =
                            "text-right text-[10px] font-bold text-gray-400 uppercase tracking-wider pr-2";
                        timeLabel.textContent = time;
                        rowEl.appendChild(timeLabel);

                        weekDates.forEach((dateStr) => {
                            const isTodayCol = dateStr === logicalToday;
                            const isCurrentCell =
                                isTodayCol && rowIndex === currentRowIndex;
                            const cellObj = this.state.getSchedule(dateStr);
                            const blocks = cellObj.blocks;
                            const cellContainer = document.createElement("div");
                            cellContainer.className = `week-cell ${isCurrentCell ? "border-indigo-300 bg-indigo-50/30" : ""}`;

                            for (let colIndex = 0; colIndex < 6; colIndex++) {
                                const block = document.createElement("div");
                                block.className = "schedule-block tiny-dot";
                                block.dataset.date = dateStr;
                                block.dataset.row = rowIndex;
                                block.dataset.col = colIndex;
                                block.setAttribute("tabindex", "-1");

                                const blockProjectId =
                                    blocks[`${rowIndex}-${colIndex}`];
                                const project = projects.find(
                                    (p) => p.id === blockProjectId,
                                );
                                if (project) {
                                    block.style.backgroundColor = project.color;
                                    block.classList.add("filled");
                                    block.title = project.name;
                                } else
                                    block.title =
                                        "Empty (Click or use Paint to set)";

                                block.dataset.origBg =
                                    block.style.backgroundColor;
                                this.blockNodes[
                                    `${dateStr}-${rowIndex}-${colIndex}`
                                ] = block;
                                cellContainer.appendChild(block);
                            }
                            rowEl.appendChild(cellContainer);
                        });
                        container.appendChild(rowEl);
                    });
                }

                renderSettings() {
                    const list = document.getElementById("hierarchy-list");
                    list.innerHTML = "";
                    const types = this.state.getTypes();
                    const projects = this.state.getProjects();

                    types.forEach((t) => {
                        const typeProjs = projects.filter(
                            (p) => p.typeId === t.id,
                        );
                        const typeBlock = document.createElement("div");
                        typeBlock.className = "bg-gray-50 rounded-2xl p-5 border border-gray-200";
                        typeBlock.draggable = true;
                        typeBlock.dataset.dragEntity = "type";
                        typeBlock.dataset.dragId = t.id;
                        typeBlock.dataset.dropZone = "true";
                        typeBlock.dataset.dropEntity = "type";

                        typeBlock.innerHTML = `
                        <div class="flex items-center justify-between mb-4 flex-wrap gap-2 group/type">
                            <div class="flex items-center gap-3">
                                <svg class="grab-handle w-5 h-5 text-gray-400 cursor-grab active:cursor-grabbing" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="9" cy="12" r="1"/><circle cx="9" cy="5" r="1"/><circle cx="9" cy="19" r="1"/><circle cx="15" cy="12" r="1"/><circle cx="15" cy="5" r="1"/><circle cx="15" cy="19" r="1"/></svg>
                                <span class="text-xl font-black text-gray-800 bg-transparent border-b border-dashed border-transparent hover:border-gray-300 px-1 focus:bg-white focus:outline-none transition-colors" contenteditable="true" data-entity="type" data-id="${t.id}" title="Click to edit"></span>
                                <span class="text-xs bg-gray-200 px-2 py-0.5 rounded-full font-bold">${typeProjs.length}</span>
                            </div>
                            <button data-action="remove-type" data-typeid="${t.id}" class="text-red-500 hover:bg-red-100 p-2 rounded-lg transition text-sm font-bold opacity-0 group-hover/type:opacity-100">Delete Category</button>
                        </div>
                        <div class="space-y-2 mb-3" id="proj-container-${t.id}" data-drop-zone="true" data-drop-entity="type-container" data-drop-id="${t.id}"></div>
                        <button data-action="add-project" data-typeid="${t.id}" class="text-indigo-600 text-sm font-bold hover:bg-indigo-50 px-3 py-1.5 rounded-lg inline-flex items-center gap-1 transition">+ Add Project</button>
                        `;

                        typeBlock.querySelector("span[contenteditable]").textContent = t.name;
                        list.appendChild(typeBlock);

                        const projContainer = document.getElementById(
                            `proj-container-${t.id}`,
                        );

                        if (typeProjs.length === 0)
                            projContainer.innerHTML = `<div class="text-xs text-gray-400 italic py-3 pointer-events-none">Empty category. Drop projects here or click 'Add Project'.</div>`;
                        else {
                            typeProjs.forEach((p) => {
                                const pCard = document.createElement("div");
                                pCard.className =
                                    "flex items-center justify-between p-3 bg-white border border-gray-200 rounded-xl shadow-sm hover:shadow-md transition group/proj";
                                pCard.draggable = true;
                                pCard.dataset.dragEntity = "project";
                                pCard.dataset.dragId = p.id;
                                pCard.dataset.dropZone = "true";
                                pCard.dataset.dropEntity = "project";

                                pCard.innerHTML = `
                                <div class="flex items-center gap-3 flex-1 overflow-hidden">
                                    <svg class="grab-handle w-5 h-5 text-gray-300 shrink-0 cursor-grab active:cursor-grabbing" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><line x1="8" y1="6" x2="16" y2="6"/><line x1="8" y1="12" x2="16" y2="12"/><line x1="8" y1="18" x2="16" y2="18"/></svg>
                                    <div class="relative w-8 h-8 rounded-full overflow-hidden shrink-0 shadow-inner">
                                        <input type="color" data-entity="project-color" data-id="${p.id}" value="${p.color}" class="absolute -top-2 -left-2 w-12 h-12 cursor-pointer border-0 p-0" />
                                    </div>
                                    <span class="font-semibold text-gray-800 bg-transparent border-b border-dashed border-transparent hover:border-gray-300 px-1 focus:bg-white focus:outline-none truncate flex-1 transition-colors" contenteditable="true" data-entity="project" data-id="${p.id}" title="Click to edit"></span>
                                </div>
                                <button data-action="remove-project" data-projectid="${p.id}" class="opacity-0 group-hover/proj:opacity-100 text-red-500 hover:bg-red-50 transition px-3 py-1 rounded-md text-sm font-bold">Remove</button>`;

                                pCard.querySelector(
                                    "span[contenteditable]",
                                ).textContent = p.name;
                                projContainer.appendChild(pCard);
                            });
                        }
                    });
                }

                toggleModal(modalId, show) {
                    const modal = document.getElementById(modalId);
                    const bg = modal;
                    const content = modal.querySelector(".modal-content");
                    if (show) {
                        modal.classList.remove("hidden");
                        bg.classList.remove("closing");
                        content.classList.remove("closing");
                    } else {
                        bg.classList.add("closing");
                        content.classList.add("closing");
                        setTimeout(() => {
                            modal.classList.add("hidden");
                            bg.classList.remove("closing");
                            content.classList.remove("closing");
                        }, 100);
                    }
                }

                showConfirm(typeId) {
                    const projs = this.state.getProjectsByType(typeId);
                    document.getElementById("confirm-count").textContent =
                        projs.length;
                    const list = document.getElementById(
                        "confirm-project-list",
                    );
                    list.innerHTML = "";
                    projs.forEach((p) => {
                        const li = document.createElement("li");
                        li.textContent = p.name;
                        list.appendChild(li);
                    });
                    document.getElementById("confirm-action-btn").onclick =
                        () => {
                            app.executeRemoveType(typeId);
                            this.toggleModal("confirm-modal", false);
                        };
                    this.toggleModal("confirm-modal", true);
                }
            }

            // ==========================================
            // 3. APP CONTROLLER
            // ==========================================
            class AppController {
                constructor() {
                    this.state = new StateManager();
                    this.ui = new UIManager(this.state);
                    this.focusTimerInterval = null;

                    this.setupLogicListeners();
                    this.setupUIActionListeners();
                    this.state.ensureDateExists(this.state.getCurrentDate());

                    if (this.state.data.isSidebarCollapsed) {
                        document
                            .getElementById("app-sidebar")
                            .classList.add("sidebar-collapsed");
                        document.getElementById("icon-arrow").style.opacity =
                            "0";
                        document.getElementById("icon-arrow").style.transform =
                            "rotate(-90deg)";
                        document.getElementById("icon-burger").style.opacity =
                            "1";
                        document.getElementById("icon-burger").style.transform =
                            "rotate(0deg)";
                    }

                    globalBus.emit("view:refresh");
                }

                setupUIActionListeners() {
                    globalBus.on("ui:toggleSidebar", () =>
                        this.toggleSidebar(),
                    );
                    globalBus.on("ui:toggleCalendar", (e) =>
                        this.toggleCalendarPopover(e),
                    );
                    globalBus.on("ui:shiftMonth", (dir) =>
                        this.shiftMonth(dir),
                    );
                    globalBus.on("ui:goToday", () => {
                        this.goToToday();
                        this.toggleCalendarPopover();
                    });
                    globalBus.on("ui:setView", (mode) =>
                        this.setViewMode(mode),
                    );
                    globalBus.on("ui:cycleView", () =>
                        this.setViewMode(
                            this.state.data.viewMode === "day" ? "week" : "day",
                        ),
                    );
                    globalBus.on("ui:exitFocus", () => this.exitFocusMode());
                    globalBus.on("ui:togglePaint", (id) =>
                        this.togglePaintMode(id),
                    );
                    globalBus.on("ui:closeSettings", () =>
                        this.closeSettingsModal(),
                    );
                    globalBus.on("ui:openSettings", () =>
                        this.openSettingsModal(),
                    );
                    globalBus.on("ui:addType", () => this.addType());
                    globalBus.on("ui:cancelConfirm", () =>
                        this.cancelConfirm(),
                    );
                    globalBus.on("ui:selectDate", (date) => {
                        this.selectDate(date);
                        this.toggleCalendarPopover();
                    });
                    globalBus.on("ui:addProject", (typeId) =>
                        this.addProjectToType(typeId),
                    );
                    globalBus.on("ui:removeType", (typeId) =>
                        this.requestRemoveType(typeId),
                    );
                    globalBus.on("ui:removeProject", (projId) =>
                        this.removeProject(projId),
                    );
                    globalBus.on("ui:enterFocus", ({ projectId, row, col }) =>
                        this.enterFocusMode(projectId, row, col),
                    );
                    globalBus.on("ui:enterFocusSelection", ({ row, col }) =>
                        this.enterFocusModeSelection(row, col),
                    );
                }

                enterFocusModeSelection(startRow, startCol) {
                    const overlay =
                        document.getElementById("focus-mode-overlay");
                    const selector = document.getElementById(
                        "focus-project-selector",
                    );
                    const nameEl =
                        document.getElementById("focus-project-name");
                    const timerEl = document.getElementById("focus-timer");
                    const list = document.getElementById("focus-project-list");

                    if (this.focusTimerInterval) {
                        clearInterval(this.focusTimerInterval);
                        this.focusTimerInterval = null;
                    }

                    nameEl.classList.add("hidden");
                    timerEl.classList.add("hidden");
                    selector.classList.remove("hidden");
                    overlay.classList.remove("hidden");
                    list.innerHTML = "";
                    const projects = this.state.getProjects();

                    if (projects.length === 0) {
                        list.innerHTML = `<div class="p-4 text-center text-gray-500 text-sm font-bold border border-dashed border-gray-300 rounded-xl">No projects available. Close to create one first!</div>`;
                    } else {
                        projects.forEach((p) => {
                            const btn = document.createElement("button");
                            btn.className =
                                "flex items-center gap-3 p-3 w-full hover:bg-indigo-50 rounded-xl transition text-left group/btn border border-gray-200 hover:border-indigo-300 hover:shadow-md bg-white shadow-sm mb-2";

                            const dot = document.createElement("div");
                            dot.className =
                                "w-4 h-4 rounded-full flex-shrink-0";
                            dot.style.backgroundColor = p.color;

                            const span = document.createElement("span");
                            span.className =
                                "text-sm font-bold text-gray-800 truncate";
                            span.textContent = p.name;

                            btn.appendChild(dot);
                            btn.appendChild(span);
                            btn.onclick = () =>
                                this.selectFocusProject(
                                    p.id,
                                    startRow,
                                    startCol,
                                );
                            list.appendChild(btn);
                        });
                    }
                }

                selectFocusProject(projectId, row, col) {
                    const dateStr = this.state.getLocalISODate(new Date());
                    globalBus.emit("block:update", {
                        date: dateStr,
                        row: row,
                        col: col,
                        projectId: projectId,
                    });
                    document
                        .getElementById("focus-project-selector")
                        .classList.add("hidden");
                    document
                        .getElementById("focus-timer")
                        .classList.remove("hidden");
                    document
                        .getElementById("focus-project-name")
                        .classList.remove("hidden");
                    this.enterFocusMode(projectId, row, col);
                }

                enterFocusMode(projectId, startRow, startCol) {
                    if (this.focusTimerInterval) {
                        clearInterval(this.focusTimerInterval);
                        this.focusTimerInterval = null;
                    }
                    const project = this.state.getProjectById(projectId);
                    if (!project) return;

                    const overlay =
                        document.getElementById("focus-mode-overlay");
                    const nameEl =
                        document.getElementById("focus-project-name");
                    const timerEl = document.getElementById("focus-timer");

                    nameEl.textContent = project.name;
                    nameEl.style.color = project.color;
                    overlay.classList.remove("hidden");
                    document
                        .getElementById("focus-project-selector")
                        .classList.add("hidden");
                    document
                        .getElementById("focus-project-name")
                        .classList.remove("hidden");
                    document
                        .getElementById("focus-timer")
                        .classList.remove("hidden");

                    const today = this.state.getLocalISODate(new Date());
                    const blocks = this.state.getSchedule(today).blocks;

                    let r = startRow;
                    let c = startCol;
                    while (blocks[`${r}-${c}`] === projectId) {
                        c++;
                        if (c > 5) {
                            c = 0;
                            r++;
                        }
                        if (r > 23) break;
                    }

                    const now = new Date();
                    const endTime = new Date(
                        now.getFullYear(),
                        now.getMonth(),
                        now.getDate(),
                        r,
                        c * 10,
                        0,
                    );

                    const updateTimer = () => {
                        const currentTime = new Date();
                        const diff = Math.max(0, endTime - currentTime);
                        if (diff === 0) {
                            clearInterval(this.focusTimerInterval);
                            timerEl.innerText = "00:00";
                            return;
                        }

                        const totalSeconds = Math.floor(diff / 1000);
                        const h = Math.floor(totalSeconds / 3600);
                        const m = Math.floor((totalSeconds % 3600) / 60);
                        const s = totalSeconds % 60;

                        let timeStr = "";
                        if (h > 0) timeStr += String(h).padStart(2, "0") + ":";
                        timeStr +=
                            String(m).padStart(2, "0") +
                            ":" +
                            String(s).padStart(2, "0");
                        timerEl.innerText = timeStr;
                    };
                    updateTimer();
                    this.focusTimerInterval = setInterval(updateTimer, 1000);
                }

                exitFocusMode() {
                    document
                        .getElementById("focus-mode-overlay")
                        .classList.add("hidden");
                    if (this.focusTimerInterval) {
                        clearInterval(this.focusTimerInterval);
                        this.focusTimerInterval = null;
                    }
                    document
                        .getElementById("focus-project-name")
                        .classList.remove("hidden");
                    document
                        .getElementById("focus-timer")
                        .classList.remove("hidden");
                    document
                        .getElementById("focus-project-selector")
                        .classList.add("hidden");
                }

                setupLogicListeners() {
                    globalBus.on(
                        "block:update",
                        ({ date, row, col, projectId, skipHistory }) => {
                            const targetDate =
                                date || this.state.getCurrentDate();
                            this.state.ensureDateExists(targetDate);

                            let oldProjectId = null;
                            this.state.updateState((data) => {
                                const blocks =
                                    data.schedules[targetDate].blocks;
                                oldProjectId = blocks[`${row}-${col}`];
                                if (projectId)
                                    blocks[`${row}-${col}`] = projectId;
                                else delete blocks[`${row}-${col}`];
                            }, !skipHistory);

                            this.state.updateBlockIndex(
                                targetDate,
                                row,
                                col,
                                projectId,
                                oldProjectId,
                            );

                            globalBus.emit("block:updated", {
                                date: targetDate,
                                row,
                                col,
                                project: projectId
                                    ? this.state.getProjectById(projectId)
                                    : null,
                            });
                            globalBus.emit("analytics:refreshed");
                        },
                    );

                    globalBus.on("block:updateBatch", ({ date, updates }) => {
                        const targetDate = date || this.state.getCurrentDate();
                        this.state.ensureDateExists(targetDate);

                        this.state.updateState((data) => {
                            const blocks = data.schedules[targetDate].blocks;
                            updates.forEach((u) => {
                                if (u.projectId)
                                    blocks[`${u.row}-${u.col}`] = u.projectId;
                                else delete blocks[`${u.row}-${u.col}`];
                            });
                        });
                        this.state.buildIndex();
                        globalBus.emit("view:refresh");
                        globalBus.emit("analytics:refreshed");
                    });

                    globalBus.on(
                        "hierarchy:updateType",
                        ({ id, name, element }) => {
                            this.state.updateState((data) => {
                                const t = data.types.find((x) => x.id === id);
                                if (t) t.name = name;
                            });
                            element.classList.add("edit-success");
                            setTimeout(
                                () => element.classList.remove("edit-success"),
                                600,
                            );
                            Toast.show("Saved");
                            globalBus.emit("hierarchy:refreshed");
                        },
                    );

                    globalBus.on(
                        "hierarchy:updateProject",
                        ({ id, name, element }) => {
                            this.state.updateState((data) => {
                                const p = data.projects.find(
                                    (x) => x.id === id,
                                );
                                if (p) p.name = name;
                            });
                            element.classList.add("edit-success");
                            setTimeout(
                                () => element.classList.remove("edit-success"),
                                600,
                            );
                            Toast.show("Saved");
                            globalBus.emit("schedule:refreshed");
                            globalBus.emit("hierarchy:refreshed");
                        },
                    );

                    globalBus.on(
                        "hierarchy:updateProjectColor",
                        ({ id, color }) => {
                            this.state.updateState((data) => {
                                const p = data.projects.find(
                                    (x) => x.id === id,
                                );
                                if (p) p.color = color;
                            });
                            globalBus.emit("schedule:refreshed");
                            globalBus.emit("hierarchy:refreshed");
                        },
                    );

                    globalBus.on(
                        "hierarchy:reorderType",
                        ({ sourceId, targetId }) => {
                            if (sourceId === targetId) return;
                            this.state.updateState((data) => {
                                const arr = data.types;
                                const fromIdx = arr.findIndex(
                                    (t) => t.id === sourceId,
                                );
                                const toIdx = arr.findIndex(
                                    (t) => t.id === targetId,
                                );
                                if (fromIdx !== -1 && toIdx !== -1) {
                                    const [item] = arr.splice(fromIdx, 1);
                                    arr.splice(toIdx, 0, item);
                                }
                            });
                            globalBus.emit("hierarchy:refreshed");
                        },
                    );

                    globalBus.on(
                        "hierarchy:reorderProject",
                        ({ sourceId, targetId }) => {
                            if (sourceId === targetId) return;
                            this.state.updateState((data) => {
                                const arr = data.projects;
                                const fromIdx = arr.findIndex(
                                    (p) => p.id === sourceId,
                                );
                                const toIdx = arr.findIndex(
                                    (p) => p.id === targetId,
                                );
                                if (fromIdx !== -1 && toIdx !== -1) {
                                    const targetType = arr[toIdx].typeId;
                                    const [item] = arr.splice(fromIdx, 1);
                                    item.typeId = targetType;
                                    arr.splice(toIdx, 0, item);
                                }
                            });
                            globalBus.emit("hierarchy:refreshed");
                        },
                    );

                    globalBus.on(
                        "hierarchy:moveProjectToType",
                        ({ projectId, typeId }) => {
                            this.state.updateState((data) => {
                                const p = data.projects.find(
                                    (x) => x.id === projectId,
                                );
                                if (p) p.typeId = typeId;
                            });
                            globalBus.emit("hierarchy:refreshed");
                        },
                    );

                    // Action listeners
                    globalBus.on("action:copy", () => {
                        const dateStr = this.state.getCurrentDate();
                        const blocks =
                            this.state.getSchedule(dateStr)?.blocks || {};
                        this.state.clipboard = JSON.parse(
                            JSON.stringify(blocks),
                        );
                        Toast.show("Schedule copied to clipboard!");
                    });

                    globalBus.on("action:paste", () => {
                        if (!this.state.clipboard) {
                            Toast.show("Clipboard is empty!", "error");
                            return;
                        }
                        const dateStr = this.state.getCurrentDate();
                        this.state.updateState((data) => {
                            data.schedules[dateStr] = {
                                blocks: JSON.parse(
                                    JSON.stringify(this.state.clipboard),
                                ),
                            };
                        });
                        this.state.buildIndex();
                        globalBus.emit("view:refresh");
                        Toast.show("Schedule pasted!");
                    });

                    globalBus.on("action:focus", () => {
                        const now = new Date();
                        const currentHour = now.getHours();
                        const currentCol = Math.floor(now.getMinutes() / 10);
                        const dateStr = this.state.getLocalISODate(now);

                        if (this.state.getCurrentDate() !== dateStr) {
                            this.selectDate(dateStr);
                        }

                        const projectId =
                            this.state.getSchedule(dateStr)?.blocks[
                                `${currentHour}-${currentCol}`
                            ];
                        if (projectId) {
                            this.enterFocusMode(
                                projectId,
                                currentHour,
                                currentCol,
                            );
                        } else {
                            this.enterFocusModeSelection(
                                currentHour,
                                currentCol,
                            );
                        }
                    });

                    globalBus.on("state:undo", () => this.state.undo());
                    globalBus.on("state:redo", () => this.state.redo());
                    globalBus.on("state:saveHistory", () =>
                        this.state.saveHistory(),
                    );
                }

                setViewMode(mode) {
                    this.state.updateState((data) => (data.viewMode = mode));
                    globalBus.emit("view:refresh");
                }

                toggleSidebar() {
                    this.state.updateState((data) => {
                        data.isSidebarCollapsed = !data.isSidebarCollapsed;
                    });
                    const sidebar = document.getElementById("app-sidebar");
                    sidebar.classList.toggle("sidebar-collapsed");
                    const burger = document.getElementById("icon-burger");
                    const arrow = document.getElementById("icon-arrow");

                    if (sidebar.classList.contains("sidebar-collapsed")) {
                        arrow.style.opacity = "0";
                        arrow.style.transform = "rotate(-90deg)";
                        burger.style.opacity = "1";
                        burger.style.transform = "rotate(0deg)";
                    } else {
                        arrow.style.opacity = "1";
                        arrow.style.transform = "rotate(0deg)";
                        burger.style.opacity = "0";
                        burger.style.transform = "rotate(90deg)";
                    }
                }

                toggleCalendarPopover(e) {
                    if (e) e.stopPropagation();
                    const pop = document.getElementById("calendar-popover");
                    if (pop) pop.classList.toggle("hidden");
                }

                togglePaintMode(projectId) {
                    if (!projectId || this.state.paintProjectId === projectId) {
                        this.state.paintProjectId = null;
                        document
                            .getElementById("paint-banner")
                            .classList.add("hidden");
                    } else {
                        this.state.paintProjectId = projectId;
                        let name = "Eraser";
                        if (projectId !== "CLEAR") {
                            const project =
                                this.state.getProjectById(projectId);
                            name = project ? project.name : "";
                        }
                        document.getElementById(
                            "paint-banner-text",
                        ).textContent = name;
                        document
                            .getElementById("paint-banner")
                            .classList.remove("hidden");
                    }
                    globalBus.emit("paint:updated", this.state.paintProjectId);
                }

                shiftMonth(dir) {
                    let m = this.state.viewMonth + dir;
                    let y = this.state.viewYear;
                    if (m < 0) {
                        m = 11;
                        y--;
                    } else if (m > 11) {
                        m = 0;
                        y++;
                    }
                    this.state.viewMonth = m;
                    this.state.viewYear = y;
                    this.ui.renderCalendar();
                }

                goToToday() {
                    const todayStr = this.state.getLocalISODate();
                    const [y, m, d] = todayStr.split("-").map(Number);
                    this.state.viewMonth = m - 1;
                    this.state.viewYear = y;
                    this.selectDate(todayStr);
                }
                selectDate(dateStr) {
                    this.state.updateState((data) => {
                        data.currentDate = dateStr;
                    });
                    this.state.ensureDateExists(dateStr);
                    globalBus.emit("view:refresh");
                }

                openSettingsModal() {
                    this.ui.renderSettings();
                    this.ui.toggleModal("settings-modal", true);
                }
                closeSettingsModal() {
                    this.ui.toggleModal("settings-modal", false);
                }

                addType() {
                    const input = document.getElementById("new-type-name");
                    const name = input.value.trim();
                    if (!name) return;
                    if (
                        this.state
                            .getTypes()
                            .some(
                                (t) =>
                                    t.name.toLowerCase() === name.toLowerCase(),
                            )
                    ) {
                        Toast.show(
                            `Category "${name}" already exists!`,
                            "error",
                        );
                        return;
                    }
                    this.state.updateState((data) => {
                        data.types.push({ id: "t_" + Date.now(), name });
                    });
                    input.value = "";
                    Toast.show(`Added ${name}`);
                    globalBus.emit("hierarchy:refreshed");
                }

                requestRemoveType(id) {
                    const projectsLinked = this.state.getProjectsByType(id);
                    if (projectsLinked.length > 0) this.ui.showConfirm(id);
                    else this.executeRemoveType(id);
                }
                cancelConfirm() {
                    this.ui.toggleModal("confirm-modal", false);
                }

                executeRemoveType(id) {
                    const toDeleteIds = this.state
                        .getProjectsByType(id)
                        .map((p) => p.id);
                    this.state.updateState((data) => {
                        data.types = data.types.filter((t) => t.id !== id);
                        data.projects = data.projects.filter(
                            (p) => !toDeleteIds.includes(p.id),
                        );
                        toDeleteIds.forEach((pId) => {
                            if (this.state.projectBlockMap[pId]) {
                                this.state.projectBlockMap[pId].forEach(
                                    (blockString) => {
                                        const [bDate, bKey] =
                                            blockString.split("#");
                                        if (
                                            data.schedules[bDate] &&
                                            data.schedules[bDate].blocks[bKey]
                                        )
                                            delete data.schedules[bDate].blocks[
                                                bKey
                                            ];
                                    },
                                );
                                delete this.state.projectBlockMap[pId];
                            }
                        });
                    });
                    Toast.show("Category deleted");
                    globalBus.emit("view:refresh");
                    this.ui.renderSettings();
                }

                addProjectToType(typeId) {
                    const baseName = "New Project";
                    let newName = baseName;
                    let counter = 1;
                    while (
                        this.state.getProjects().some((p) => p.name === newName)
                    ) {
                        newName = `${baseName} ${counter}`;
                        counter++;
                    }
                    const randomHex =
                        "#" +
                        Math.floor(Math.random() * 16777215)
                            .toString(16)
                            .padStart(6, "0");
                    this.state.updateState((data) => {
                        data.projects.push({
                            id: "p_" + Date.now(),
                            name: newName,
                            color: randomHex,
                            typeId: typeId,
                        });
                    });
                    Toast.show("Added new project");
                    globalBus.emit("hierarchy:refreshed");
                }

                removeProject(id) {
                    this.state.updateState((data) => {
                        data.projects = data.projects.filter(
                            (p) => p.id !== id,
                        );
                        if (this.state.projectBlockMap[id]) {
                            this.state.projectBlockMap[id].forEach(
                                (blockString) => {
                                    const [bDate, bKey] =
                                        blockString.split("#");
                                    if (
                                        data.schedules[bDate] &&
                                        data.schedules[bDate].blocks[bKey]
                                    )
                                        delete data.schedules[bDate].blocks[
                                            bKey
                                        ];
                                },
                            );
                            delete this.state.projectBlockMap[id];
                        }
                    });
                    Toast.show("Project removed");
                    globalBus.emit("view:refresh");
                    this.ui.renderSettings();
                }
            }

            // ==========================================
            // 4. CLI & SHADOW ENGINE
            // ==========================================
            class CLIParser {
                constructor(stateManager) {
                    this.state = stateManager;
                }

                parse(input) {
                    const result = {
                        action: "add",
                        rows: [],
                        cols: [0, 1, 2, 3, 4, 5],
                        project: null,
                        status: "typing", // typing, valid, clear, error
                        errorMsg: "",
                    };

                    const tokens = input
                        .trim()
                        .toLowerCase()
                        .split(/\s+/)
                        .filter(Boolean);
                    if (tokens.length === 0) return result;

                    let remainingTokens = [];
                    let specifiedCols = [];
                    let timeTokens = [];

                    // Fast Commands
                    if (tokens[0] === "projects") {
                        result.action = "projects";
                        result.status = "valid";
                        return result;
                    } else if (tokens[0] === "copy") {
                        result.action = "copy";
                        result.status = "valid";
                        return result;
                    } else if (tokens[0] === "paste") {
                        result.action = "paste";
                        result.status = "valid";
                        return result;
                    } else if (
                        tokens[0] === "focus" &&
                        (tokens.length === 1 || tokens[1] === "mode")
                    ) {
                        result.action = "focus";
                        result.status = "valid";
                        return result;
                    } else if (tokens[0] === "predict") {
                        result.action = "predict";
                        const freqs = {};
                        let topProj = null;
                        let maxFreq = 0;
                        Object.values(this.state.data.schedules).forEach(
                            (sched) => {
                                Object.values(sched.blocks).forEach((pId) => {
                                    freqs[pId] = (freqs[pId] || 0) + 1;
                                    if (freqs[pId] > maxFreq) {
                                        maxFreq = freqs[pId];
                                        topProj = pId;
                                    }
                                });
                            },
                        );
                        if (!topProj && this.state.data.projects.length > 0)
                            topProj = this.state.data.projects[0].id;

                        const now = new Date();
                        const h = now.getHours();
                        for (let i = h; i < h + 3 && i < 24; i++)
                            result.rows.push(i);
                        result.project = this.state.getProjectById(topProj);

                        result.status = result.project ? "valid" : "error";
                        return result;
                    }

                    // Check for Prefix Flags
                    if (tokens[0] === "clear") {
                        result.action = "clear";
                        tokens.shift();
                    } else if (tokens[0] === "fill") {
                        result.action = "fill";
                        tokens.shift();
                    }

                    if (
                        tokens.length === 0 &&
                        (result.action === "clear" || result.action === "fill")
                    ) {
                        result.status = "error";
                        return result;
                    }

                    // Token classification
                    for (let i = 0; i < tokens.length; i++) {
                        const t = tokens[i];

                        // Blocks 1-6 map to 0-5
                        if (/^[1-6]$/.test(t)) {
                            specifiedCols.push(parseInt(t) - 1);
                            continue;
                        }

                        // Ranges
                        if (
                            [
                                "day",
                                "morning",
                                "afternoon",
                                "evening",
                                "night",
                            ].includes(t)
                        ) {
                            timeTokens.push({ type: "keyword", val: t });
                            continue;
                        }

                        // Time range format (e.g., 1am-2pm)
                        if (/^(\d{1,2})([ap]m?)?-(\d{1,2})([ap]m?)?$/.test(t)) {
                            timeTokens.push({ type: "range", val: t });
                            continue;
                        }

                        // Single time (e.g., 7, 7am, 7p)
                        if (/^(\d{1,2})([ap]m?)?$/.test(t)) {
                            timeTokens.push({ type: "single", val: t });
                            continue;
                        }

                        // Everything else is treated as project string
                        remainingTokens.push(t);
                    }

                    if (specifiedCols.length > 0) result.cols = specifiedCols;
                    result.rows = this.resolveTimes(timeTokens);

                    // Project Resolving Logic
                    if (result.action === "add" || result.action === "fill") {
                        if (remainingTokens.length === 0) {
                            result.status = "typing";
                            return result;
                        }
                        const projToken = remainingTokens.join(" ");
                        const match = this.matchProject(projToken);

                        if (match === null) {
                            result.status = "error";
                            result.errorMsg = "Project not found";
                        } else if (Array.isArray(match)) {
                            result.status = "error";
                            result.errorMsg = "Ambiguous project";
                        } else {
                            result.project = match;
                            if (result.rows.length > 0) result.status = "valid";
                            else result.status = "typing";
                        }
                    } else if (result.action === "clear") {
                        if (result.rows.length > 0) result.status = "clear";
                        else result.status = "typing";
                    }

                    return result;
                }

                resolveTimes(timeTokens) {
                    let rows = new Set();

                    const parseHour = (num, ampm) => {
                        let h = parseInt(num);
                        if (ampm && ampm.startsWith("p") && h < 12) h += 12;
                        else if (ampm && ampm.startsWith("a") && h === 12)
                            h = 0;
                        else if (!ampm) {
                            // AM/PM inference
                            if (h >= 1 && h <= 6) h += 12;
                            else if (h === 12) h = 12;
                        }
                        return h;
                    };

                    timeTokens.forEach((t) => {
                        if (t.type === "keyword") {
                            if (t.val === "day")
                                for (let i = 0; i < 24; i++) rows.add(i);
                            else if (t.val === "morning")
                                for (let i = 1; i < 12; i++) rows.add(i);
                            else if (t.val === "afternoon")
                                for (let i = 12; i < 16; i++) rows.add(i);
                            else if (t.val === "evening")
                                for (let i = 16; i < 22; i++) rows.add(i);
                            else if (t.val === "night") {
                                for (let i = 22; i < 24; i++) rows.add(i);
                                rows.add(0);
                            }
                        } else if (t.type === "single") {
                            const match = t.val.match(/^(\d{1,2})([ap]m?)?$/);
                            rows.add(parseHour(match[1], match[2]));
                        } else if (t.type === "range") {
                            const match = t.val.match(
                                /^(\d{1,2})([ap]m?)?-(\d{1,2})([ap]m?)?$/,
                            );
                            let start = parseHour(match[1], match[2]);
                            let end = parseHour(match[3], match[4]);

                            // Fallback inference crossing the 12-hour gap
                            if (
                                !match[2] &&
                                !match[4] &&
                                start > end &&
                                start <= 12
                            ) {
                                if (end >= 1 && end <= 6) end += 12;
                            }

                            if (start <= end) {
                                for (let i = start; i <= end; i++) rows.add(i);
                            } else {
                                // Wraps around midnight natively
                                for (let i = start; i < 24; i++) rows.add(i);
                                for (let i = 0; i <= end; i++) rows.add(i);
                            }
                        }
                    });
                    return Array.from(rows).filter((r) => r >= 0 && r <= 23);
                }

                matchProject(str) {
                    const projects = this.state.getProjects();
                    let exact = [],
                        acronyms = [],
                        prefix = [],
                        concat = [];
                    const cleanStr = str.replace(/\s+/g, "").toLowerCase();

                    projects.forEach((p) => {
                        const name = p.name.toLowerCase();
                        const acr = name
                            .split(/\s+/)
                            .map((w) => w[0])
                            .join("");
                        const cleanName = name.replace(/\s+/g, "");

                        if (name === str) exact.push(p);
                        if (acr === str) acronyms.push(p);
                        if (name.startsWith(str)) prefix.push(p);
                        if (cleanName.includes(cleanStr)) concat.push(p);
                    });

                    // Priority Waterfall
                    if (exact.length === 1) return exact[0];
                    if (acronyms.length === 1) return acronyms[0];
                    if (prefix.length === 1) return prefix[0];
                    if (concat.length === 1) return concat[0];

                    if (
                        exact.length > 1 ||
                        acronyms.length > 1 ||
                        prefix.length > 1 ||
                        concat.length > 1
                    ) {
                        return []; // Denotes Ambiguity
                    }
                    return null; // Not found
                }
            }

            class CLIController {
                constructor(app) {
                    this.app = app;
                    this.parser = new CLIParser(app.state);
                    this.activeShadows = [];
                    this.isVisible = false;

                    this.container = document.getElementById("cli-container");
                    this.wrapper = document.getElementById("cli-wrapper");
                    this.input = document.getElementById("cli-input");

                    this.bindEvents();
                }

                bindEvents() {
                    document.addEventListener("keydown", (e) => {
                        if (
                            e.key == "/" ||
                            ((e.ctrlKey || e.metaKey) &&
                                e.key.toLowerCase() === "k")
                        ) {
                            e.preventDefault();
                            this.toggleCLI();
                        }
                    });

                    this.input.addEventListener("input", (e) =>
                        this.handleInput(e.target.value),
                    );
                    this.input.addEventListener("keydown", (e) => {
                        if (e.key === "Enter") this.commit();
                        if (e.key === "Escape") {
                            e.preventDefault();
                            this.closeCLI();
                        }
                    });

                    // Close on outside click
                    document.addEventListener("click", (e) => {
                        if (
                            this.isVisible &&
                            !this.container.contains(e.target)
                        )
                            this.closeCLI();
                    });
                }

                toggleCLI() {
                    if (this.isVisible) this.closeCLI();
                    else this.openCLI();
                }

                openCLI() {
                    this.isVisible = true;
                    this.container.classList.remove("hidden");
                    this.input.value = "";
                    this.handleInput("");
                    setTimeout(() => this.input.focus(), 50);
                }

                closeCLI() {
                    this.isVisible = false;
                    this.container.classList.add("hidden");
                    this.clearShadows();
                    this.input.blur();
                }

                handleInput(val) {
                    this.clearShadows();
                    const res = this.parser.parse(val);
                    this.updateUIState(res.status);
                    if (res.status === "valid" || res.status === "clear") {
                        this.applyShadows(res);
                    }
                }

                updateUIState(status) {
                    this.wrapper.className =
                        "relative rounded-2xl backdrop-blur-md bg-white/75 border-2 pointer-events-auto transition-colors duration-200 flex items-center shadow-xl " +
                        `cli-${status}`;

                    if (status === "error") {
                        this.wrapper.style.animation = "none";
                        void this.wrapper.offsetWidth; // Reflow to re-trigger
                        this.wrapper.style.animation =
                            "shake 0.3s cubic-bezier(.36,.07,.19,.97) both";
                    }
                }

                applyShadows(res) {
                    const dateStr = this.app.state.getCurrentDate();
                    res.rows.forEach((r) => {
                        res.cols.forEach((c) => {
                            // Smart fill check for Shadow Engine
                            if (
                                res.action === "fill" ||
                                res.action === "predict"
                            ) {
                                const currentProjId =
                                    this.app.state.getSchedule(dateStr)?.blocks[
                                        `${r}-${c}`
                                    ];
                                if (currentProjId) return; // Skip if already filled
                            }

                            const blockId = `${dateStr}-${r}-${c}`;
                            const block = this.app.ui.blockNodes[blockId];

                            if (block) {
                                this.activeShadows.push(block);
                                if (
                                    res.action === "add" ||
                                    res.action === "fill" ||
                                    res.action === "predict"
                                ) {
                                    block.classList.add("shadow-add");
                                    block.style.setProperty(
                                        "--shadow-color",
                                        res.project.color,
                                    );
                                } else if (res.action === "clear") {
                                    block.classList.add("shadow-clear");
                                }
                            }
                        });
                    });
                }

                clearShadows() {
                    this.activeShadows.forEach((block) => {
                        block.classList.remove("shadow-add", "shadow-clear");
                        block.style.removeProperty("--shadow-color");
                    });
                    this.activeShadows = [];
                }

                commit() {
                    const res = this.parser.parse(this.input.value);
                    if (res.status === "valid" || res.status === "clear") {
                        if (res.action === "projects") {
                            globalBus.emit("ui:openSettings");
                        } else if (res.action === "copy") {
                            globalBus.emit("action:copy");
                        } else if (res.action === "paste") {
                            globalBus.emit("action:paste");
                        } else if (res.action === "focus") {
                            globalBus.emit("action:focus");
                        } else {
                            const dateStr = this.app.state.getCurrentDate();
                            let updates = [];

                            res.rows.forEach((r) => {
                                res.cols.forEach((c) => {
                                    if (
                                        (res.action === "fill" ||
                                            res.action === "predict") &&
                                        this.app.state.getSchedule(dateStr)
                                            ?.blocks[`${r}-${c}`]
                                    ) {
                                        return; // Smart fill bypass
                                    }
                                    const projId =
                                        res.action === "add" ||
                                        res.action === "fill" ||
                                        res.action === "predict"
                                            ? res.project.id
                                            : null;
                                    updates.push({
                                        row: r,
                                        col: c,
                                        projectId: projId,
                                    });
                                });
                            });

                            if (updates.length > 0) {
                                globalBus.emit("block:updateBatch", {
                                    date: dateStr,
                                    updates,
                                });
                            }
                        }
                        this.closeCLI();
                    }
                }
            }

            // Global error boundary
            window.onerror = (msg, src, line, col, err) => {
                console.error("Uncaught error:", err);
                Toast.show("Something went wrong. Try refreshing.", "error");
            };
            window.onunhandledrejection = (event) => {
                console.error("Unhandled rejection:", event.reason);
                Toast.show("Something went wrong. Try refreshing.", "error");
            };

            // Launch Controller
            window.app = new AppController();
            window.cli = new CLIController(window.app);
        </script>
    </body>
</html>
