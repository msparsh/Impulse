<!doctype html>
<html lang="en">
    <head>
        <meta charset="UTF-8" />
        <meta name="viewport" content="width=device-width, initial-scale=1.0" />
        <title>Visual Schedule Planner Pro - v6</title>
        <script src="https://cdn.tailwindcss.com"></script>
        <link
            href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap"
            rel="stylesheet"
        />
        <style>
            body {
                font-family: "Inter", sans-serif;
                background-color: #f9fafb;
                color: #1a1a1a;
            }
            .circle-btn {
                width: 44px;
                height: 44px;
                border-radius: 50%;
                display: flex;
                align-items: center;
                justify-content: center;
                font-size: 20px;
                transition: all 0.2s cubic-bezier(0.4, 0, 0.2, 1);
                position: relative;
                background-color: #e5e7eb;
                border: 2px solid transparent;
                cursor: pointer;
            }
            .circle-btn:hover {
                transform: scale(1.1);
                filter: brightness(95%);
                z-index: 10;
            }
            .circle-btn.filled {
                border-color: rgba(0, 0, 0, 0.1);
            }
            .active-date {
                background-color: #4f46e5;
                color: white !important;
                font-weight: bold;
                border-radius: 8px;
            }
            .choice-menu {
                position: absolute;
                top: 50px;
                left: 50%;
                transform: translateX(-50%);
                background: white;
                border: 1px solid #e5e7eb;
                border-radius: 12px;
                padding: 8px;
                display: flex;
                flex-direction: column;
                gap: 4px;
                box-shadow: 0 10px 25px -5px rgba(0, 0, 0, 0.15);
                z-index: 50;
                width: 200px;
            }
            .custom-scroll::-webkit-scrollbar {
                width: 6px;
            }
            .custom-scroll::-webkit-scrollbar-thumb {
                background: #cbd5e1;
                border-radius: 4px;
            }
            @keyframes fadeIn {
                from {
                    opacity: 0;
                }
                to {
                    opacity: 1;
                }
            }
            @keyframes slideUp {
                from {
                    transform: translateY(20px);
                    opacity: 0;
                }
                to {
                    transform: translateY(0);
                    opacity: 1;
                }
            }
            .modal-bg {
                animation: fadeIn 0.2s ease-out forwards;
            }
            .modal-content {
                animation: slideUp 0.2s ease-out forwards;
            }

            /* Inline Edit Styles */
            [contenteditable="true"] {
                outline: none;
                border-bottom: 1px dashed transparent;
                transition: border-color 0.2s;
            }
            [contenteditable="true"]:hover,
            [contenteditable="true"]:focus {
                border-bottom-color: #cbd5e1;
                background-color: rgba(255, 255, 255, 0.5);
                border-radius: 2px;
            }

            /* Drag and Drop Visuals */
            .drag-over {
                border: 2px dashed #4f46e5 !important;
                background-color: #e0e7ff !important;
            }
            .grab-handle {
                cursor: grab;
                opacity: 0.4;
            }
            .grab-handle:active {
                cursor: grabbing;
            }
        </style>
    </head>
    <body class="p-4 md:p-8 h-screen flex flex-col overflow-hidden relative">
        <div
            class="max-w-7xl mx-auto w-full h-full flex flex-col bg-white rounded-2xl shadow-sm border border-gray-100 overflow-hidden relative"
        >
            <header
                class="flex items-center justify-between p-6 border-b border-gray-100"
            >
                <div class="flex items-center gap-4">
                    <div
                        class="w-10 h-10 bg-indigo-600 rounded-lg flex items-center justify-center text-white font-bold text-xl"
                    >
                        V
                    </div>
                    <h1 class="text-xl font-bold">Visual Planner Pro</h1>
                </div>
                <div class="flex items-center gap-6">
                    <button
                        onclick="app.goToToday()"
                        class="px-4 py-2 border border-gray-200 rounded-full text-xs font-bold hover:bg-gray-50 text-gray-600 transition shadow-sm"
                    >
                        Today
                    </button>
                    <div class="text-right border-l border-gray-200 pl-6">
                        <h2
                            id="display-date"
                            class="text-xl font-bold text-indigo-900"
                        >
                            ...
                        </h2>
                        <p id="display-day" class="text-gray-500 text-sm">
                            ...
                        </p>
                    </div>
                    <button
                        onclick="app.openSettingsModal()"
                        class="w-10 h-10 rounded-full border border-gray-200 flex items-center justify-center hover:bg-gray-50 hover:border-gray-300 transition text-gray-600 shadow-sm"
                    >
                        <svg
                            width="20"
                            height="20"
                            viewBox="0 0 24 24"
                            fill="none"
                            stroke="currentColor"
                            stroke-width="2"
                            stroke-linecap="round"
                            stroke-linejoin="round"
                        >
                            <line x1="12" y1="5" x2="12" y2="19"></line>
                            <line x1="5" y1="12" x2="19" y2="12"></line>
                        </svg>
                    </button>
                </div>
            </header>

            <div class="flex flex-1 overflow-hidden">
                <aside
                    class="w-80 border-r border-gray-100 p-6 flex flex-col gap-8 overflow-y-auto custom-scroll bg-gray-50"
                >
                    <div
                        class="bg-white p-4 rounded-xl shadow-sm border border-gray-100"
                    >
                        <div class="flex items-center justify-between mb-4">
                            <span
                                id="calendar-month-label"
                                class="text-sm font-bold text-gray-800"
                                >...</span
                            >
                        </div>
                        <div
                            class="grid grid-cols-7 gap-1 text-center text-xs font-medium mb-2"
                        >
                            <div class="text-gray-400">S</div>
                            <div class="text-gray-400">M</div>
                            <div class="text-gray-400">T</div>
                            <div class="text-gray-400">W</div>
                            <div class="text-gray-400">T</div>
                            <div class="text-gray-400">F</div>
                            <div class="text-gray-400">S</div>
                        </div>
                        <div
                            id="calendar-grid"
                            class="grid grid-cols-7 gap-1 text-center text-sm"
                        ></div>
                    </div>

                    <div>
                        <h3
                            class="text-sm font-bold text-gray-800 mb-3 flex items-center gap-2"
                        >
                            Active Projects
                        </h3>
                        <div
                            id="project-list"
                            class="flex flex-col gap-2 mb-4"
                        ></div>
                    </div>
                </aside>

                <main class="flex-1 flex flex-col overflow-hidden bg-white">
                    <div
                        class="p-6 border-b border-gray-100 bg-white z-10 shadow-sm"
                    >
                        <h3
                            class="text-sm font-bold text-gray-800 mb-3 flex items-center gap-2"
                        >
                            Daily Time Allocation
                        </h3>
                        <div
                            id="analytics-bar"
                            class="flex flex-wrap gap-4"
                        ></div>
                    </div>

                    <div class="flex-1 overflow-y-auto p-6 custom-scroll">
                        <div
                            id="schedule-grid"
                            class="flex flex-col gap-6 max-w-4xl mx-auto pb-20"
                        ></div>
                    </div>
                </main>
            </div>
        </div>

        <div
            id="settings-modal"
            class="fixed inset-0 bg-black/40 hidden z-50 flex items-center justify-center backdrop-blur-sm p-4"
        >
            <div
                class="bg-white rounded-2xl shadow-2xl w-full max-w-2xl overflow-hidden modal-content flex flex-col max-h-[90vh]"
            >
                <div
                    class="p-4 border-b border-gray-100 flex justify-between items-center bg-gray-50"
                >
                    <h3 class="font-bold text-gray-800 flex items-center gap-2">
                        <svg
                            width="18"
                            height="18"
                            viewBox="0 0 24 24"
                            fill="none"
                            stroke="currentColor"
                            stroke-width="2"
                            stroke-linecap="round"
                            stroke-linejoin="round"
                        >
                            <path d="M12 20h9"></path>
                            <path
                                d="M16.5 3.5a2.121 2.121 0 0 1 3 3L7 19l-4 1 1-4L16.5 3.5z"
                            ></path>
                        </svg>
                        Manage Hierarchy
                    </h3>
                    <button
                        onclick="app.closeSettingsModal()"
                        class="text-gray-400 hover:text-gray-700 transition"
                    >
                        <svg
                            width="20"
                            height="20"
                            viewBox="0 0 24 24"
                            fill="none"
                            stroke="currentColor"
                            stroke-width="2"
                            stroke-linecap="round"
                            stroke-linejoin="round"
                        >
                            <line x1="18" y1="6" x2="6" y2="18"></line>
                            <line x1="6" y1="6" x2="18" y2="18"></line>
                        </svg>
                    </button>
                </div>

                <div class="p-6 border-b border-gray-100 bg-white flex gap-3">
                    <input
                        type="text"
                        id="new-type-name"
                        placeholder="New Category Type..."
                        class="text-sm p-2 border border-gray-200 rounded-lg flex-1 focus:outline-none focus:border-indigo-500 bg-gray-50"
                    />
                    <button
                        onclick="app.addType()"
                        class="bg-gray-800 text-white px-4 py-2 rounded-lg text-sm font-bold hover:bg-gray-700 transition shadow-sm"
                    >
                        Add Type
                    </button>
                </div>

                <div
                    class="flex-1 p-6 overflow-y-auto custom-scroll bg-gray-50/50"
                    id="hierarchy-list"
                ></div>
            </div>
        </div>

        <script>
            // -----------------------------------------------------------------------------
            // 0. EVENT BUS
            // -----------------------------------------------------------------------------
            class EventEmitter {
                constructor() {
                    this.events = {};
                }
                on(event, listener) {
                    if (!this.events[event]) this.events[event] = [];
                    this.events[event].push(listener);
                }
                emit(event, data) {
                    if (this.events[event])
                        this.events[event].forEach((l) => l(data));
                }
            }
            const globalBus = new EventEmitter();

            // -----------------------------------------------------------------------------
            // 1. STATE MANAGEMENT (Model)
            // -----------------------------------------------------------------------------
            class StateManager {
                constructor() {
                    this.storageKey = "planner_state_v6";
                    this.hours = [
                        "7 AM",
                        "8 AM",
                        "9 AM",
                        "10 AM",
                        "11 AM",
                        "12 PM",
                        "1 PM",
                        "2 PM",
                        "3 PM",
                        "4 PM",
                        "5 PM",
                        "6 PM",
                        "7 PM",
                        "8 PM",
                        "9 PM",
                        "10 PM",
                        "11 PM",
                    ];
                    this.data = this.loadState();
                }

                getDefaultState() {
                    const today = new Date();
                    const offset = today.getTimezoneOffset() * 60000;
                    const localISOTime = new Date(today - offset)
                        .toISOString()
                        .split("T")[0];

                    return {
                        version: 3,
                        currentDate: localISOTime,
                        types: [
                            { id: "t_work", name: "Work" },
                            { id: "t_personal", name: "Personal" },
                        ],
                        projects: [
                            {
                                id: "p_deep",
                                name: "Deep Work",
                                color: "#6b92f2",
                                typeId: "t_work",
                            },
                            {
                                id: "p_meetings",
                                name: "Meetings",
                                color: "#9333ea",
                                typeId: "t_work",
                            },
                            {
                                id: "p_study",
                                name: "Study",
                                color: "#f2a644",
                                typeId: "t_personal",
                            },
                            {
                                id: "p_health",
                                name: "Health/Meals",
                                color: "#568f32",
                                typeId: "t_personal",
                            },
                        ],
                        schedules: {
                            [localISOTime]: {
                                blocks: {
                                    "1-0": "p_deep",
                                    "1-1": "p_deep",
                                    "1-2": "p_deep",
                                    "1-3": "p_meetings",
                                    "2-2": "p_study",
                                    "2-3": "p_study",
                                    "2-4": "p_study",
                                    "5-0": "p_health",
                                    "5-1": "p_health",
                                    "5-2": "p_health",
                                },
                            },
                        },
                    };
                }

                loadState() {
                    const saved = localStorage.getItem(this.storageKey);
                    return saved ? JSON.parse(saved) : this.getDefaultState();
                }

                saveState() {
                    localStorage.setItem(
                        this.storageKey,
                        JSON.stringify(this.data),
                    );
                }

                updateState(updaterFn) {
                    updaterFn(this.data);
                    this.saveState();
                }

                ensureDateExists(dateStr) {
                    if (!this.data.schedules[dateStr]) {
                        this.updateState((data) => {
                            data.schedules[dateStr] = { blocks: {} };
                        });
                    }
                }

                // Getters
                getProjectById(id) {
                    return this.data.projects.find((p) => p.id === id);
                }
                getProjects() {
                    return this.data.projects;
                }
                getProjectsByType(typeId) {
                    return this.data.projects.filter(
                        (p) => p.typeId === typeId,
                    );
                }
                getTypes() {
                    return this.data.types;
                }
                getCurrentDate() {
                    return this.data.currentDate;
                }
                getHours() {
                    return this.hours;
                }
                getCurrentSchedule() {
                    return this.data.schedules[this.data.currentDate];
                }

                getDailyAnalytics() {
                    let typeCounts = {};
                    const blocks =
                        this.data.schedules[this.data.currentDate]?.blocks ||
                        {};
                    Object.values(blocks).forEach((projectId) => {
                        const project = this.getProjectById(projectId);
                        if (project)
                            typeCounts[project.typeId] =
                                (typeCounts[project.typeId] || 0) + 1;
                    });
                    return typeCounts;
                }
            }

            // -----------------------------------------------------------------------------
            // 2. UI MANAGEMENT (View)
            // -----------------------------------------------------------------------------
            class UIManager {
                constructor(state) {
                    this.state = state;
                    this.blockNodes = {};
                    this.setupDelegation();
                    this.listenToEvents();
                }

                setupDelegation() {
                    const grid = document.getElementById("schedule-grid");
                    const hierarchyList =
                        document.getElementById("hierarchy-list");

                    // Schedule Grid Interaction
                    grid.addEventListener("click", (e) => {
                        const block = e.target.closest(".schedule-block");
                        if (block) {
                            e.stopPropagation();
                            this.closeAllMenus();
                            this.renderChoiceMenu(
                                block,
                                block.dataset.row,
                                block.dataset.col,
                            );
                        }
                    });

                    grid.addEventListener("contextmenu", (e) => {
                        const block = e.target.closest(".schedule-block");
                        if (block) {
                            e.preventDefault();
                            globalBus.emit("block:update", {
                                row: block.dataset.row,
                                col: block.dataset.col,
                                projectId: null,
                            });
                        }
                    });

                    // Hierarchy Inline Editing Delegation
                    hierarchyList.addEventListener(
                        "blur",
                        (e) => {
                            if (e.target.hasAttribute("contenteditable")) {
                                const newText = e.target.innerText.trim();
                                if (e.target.dataset.entity === "type") {
                                    globalBus.emit("hierarchy:updateType", {
                                        id: e.target.dataset.id,
                                        name: newText,
                                    });
                                } else if (
                                    e.target.dataset.entity === "project"
                                ) {
                                    globalBus.emit("hierarchy:updateProject", {
                                        id: e.target.dataset.id,
                                        name: newText,
                                    });
                                }
                            }
                        },
                        true,
                    ); // Capture phase for blur

                    hierarchyList.addEventListener("keydown", (e) => {
                        if (
                            e.key === "Enter" &&
                            e.target.hasAttribute("contenteditable")
                        ) {
                            e.preventDefault();
                            e.target.blur(); // Triggers the save above
                        }
                    });

                    // Project Color Picker Delegation
                    hierarchyList.addEventListener("change", (e) => {
                        if (e.target.dataset.entity === "project-color") {
                            globalBus.emit("hierarchy:updateProjectColor", {
                                id: e.target.dataset.id,
                                color: e.target.value,
                            });
                        }
                    });

                    document.addEventListener("click", () =>
                        this.closeAllMenus(),
                    );
                    document.addEventListener("keydown", (e) => {
                        if (e.key === "Escape") {
                            this.closeAllMenus();
                            this.toggleModal("settings-modal", false);
                        }
                    });
                }

                listenToEvents() {
                    globalBus.on("block:updated", ({ row, col, project }) => {
                        const blockEl = this.blockNodes[`${row}-${col}`];
                        if (!blockEl) return;
                        if (project) {
                            blockEl.style.backgroundColor = project.color;
                            blockEl.classList.add("filled");
                            blockEl.title = project.name;
                        } else {
                            blockEl.style.backgroundColor = "";
                            blockEl.classList.remove("filled");
                            blockEl.title = "Empty (Click to set)";
                        }
                    });

                    globalBus.on("view:refresh", () => this.refreshAllViews());
                    globalBus.on("schedule:refreshed", () =>
                        this.renderSchedule(
                            this.state.getCurrentSchedule(),
                            this.state.getHours(),
                            this.state.getProjects(),
                        ),
                    );
                    globalBus.on("analytics:refreshed", () =>
                        this.renderAnalytics(
                            this.state.getDailyAnalytics(),
                            this.state.getTypes(),
                        ),
                    );
                    globalBus.on("hierarchy:refreshed", () => {
                        this.renderSettings();
                        this.renderSidebarProjects(
                            this.state.getProjects(),
                            this.state.getTypes(),
                        );
                    });
                }

                closeAllMenus() {
                    document
                        .querySelectorAll(".choice-menu")
                        .forEach((m) => m.remove());
                }

                refreshAllViews() {
                    const date = this.state.getCurrentDate();
                    this.renderHeader(date);
                    this.renderCalendar(date);
                    this.renderSidebarProjects(
                        this.state.getProjects(),
                        this.state.getTypes(),
                    );
                    this.renderSchedule(
                        this.state.getCurrentSchedule(),
                        this.state.getHours(),
                        this.state.getProjects(),
                    );
                    this.renderAnalytics(
                        this.state.getDailyAnalytics(),
                        this.state.getTypes(),
                    );
                }

                renderHeader(dateStr) {
                    const [year, month, day] = dateStr.split("-");
                    const dateObj = new Date(year, month - 1, day);
                    const parts = dateObj
                        .toLocaleDateString("en-US", {
                            weekday: "long",
                            year: "numeric",
                            month: "long",
                            day: "numeric",
                        })
                        .split(", ");
                    document.getElementById("display-day").innerText = parts[0];
                    document.getElementById("display-date").innerText =
                        parts[1] + ", " + parts[2];
                }

                renderCalendar(currentDate) {
                    const grid = document.getElementById("calendar-grid");
                    const monthLabel = document.getElementById(
                        "calendar-month-label",
                    );
                    grid.innerHTML = "";

                    const [yearStr, monthStr, dayStr] = currentDate.split("-");
                    const year = parseInt(yearStr, 10);
                    const month = parseInt(monthStr, 10) - 1;

                    monthLabel.innerText = new Date(
                        year,
                        month,
                        1,
                    ).toLocaleString("default", {
                        month: "long",
                        year: "numeric",
                    });
                    const firstDay = new Date(year, month, 1).getDay();
                    const daysInMonth = new Date(year, month + 1, 0).getDate();

                    for (let i = 0; i < firstDay; i++)
                        grid.innerHTML += `<div class="py-2"></div>`;
                    for (let day = 1; day <= daysInMonth; day++) {
                        const loopDateStr = `${year}-${String(month + 1).padStart(2, "0")}-${String(day).padStart(2, "0")}`;
                        const isActive = loopDateStr === currentDate;
                        grid.innerHTML += `
                        <div onclick="app.selectDate('${loopDateStr}')"
                             class="py-1 cursor-pointer hover:bg-indigo-50 rounded-md transition ${isActive ? "active-date shadow-md" : "text-gray-700"}">
                            ${day}
                        </div>`;
                    }
                }

                renderSidebarProjects(projects, types) {
                    const list = document.getElementById("project-list");
                    list.innerHTML = "";
                    types.forEach((t) => {
                        const typeProjects = projects.filter(
                            (p) => p.typeId === t.id,
                        );
                        if (typeProjects.length === 0) return;

                        list.innerHTML += `<div class="text-xs font-bold text-gray-400 uppercase tracking-wider mt-4 mb-2 pl-1">${t.name}</div>`;
                        typeProjects.forEach((p) => {
                            list.innerHTML += `
                            <div class="flex items-center gap-3 p-2 rounded-lg bg-white border border-gray-100 shadow-sm">
                                <div class="w-4 h-4 rounded-full" style="background-color: ${p.color};"></div>
                                <span class="text-sm font-semibold text-gray-800 leading-tight">${p.name}</span>
                            </div>`;
                        });
                    });
                }

                renderAnalytics(typeCounts, types) {
                    const bar = document.getElementById("analytics-bar");
                    bar.innerHTML = "";
                    let totalAssigned = 0;
                    types.forEach((t) => {
                        const bCount = typeCounts[t.id] || 0;
                        if (bCount > 0) {
                            const minutes = bCount * 10;
                            const hoursStr =
                                minutes >= 60
                                    ? `${(minutes / 60).toFixed(1)}h`
                                    : `${minutes}m`;
                            bar.innerHTML += `
                            <div class="flex items-center gap-2 px-3 py-1.5 rounded-full bg-gray-50 border border-gray-200 shadow-sm">
                                <span class="text-xs font-semibold text-gray-700">${t.name}: <span class="text-gray-500">${hoursStr}</span></span>
                            </div>`;
                            totalAssigned++;
                        }
                    });
                    if (totalAssigned === 0)
                        bar.innerHTML = `<span class="text-sm text-gray-400 italic">No blocks assigned.</span>`;
                }

                renderSchedule(scheduleObj, hours, projects) {
                    const container = document.getElementById("schedule-grid");
                    container.innerHTML = "";
                    this.blockNodes = {};
                    const blocks = scheduleObj.blocks;

                    hours.forEach((time, rowIndex) => {
                        const rowEl = document.createElement("div");
                        rowEl.className = "flex items-center gap-8 group";
                        const timeLabel = document.createElement("div");
                        timeLabel.className =
                            "w-16 text-xs font-bold text-gray-400 uppercase tracking-wider text-right";
                        timeLabel.textContent = time;

                        const blocksContainer = document.createElement("div");
                        blocksContainer.className =
                            "flex gap-3 md:gap-4 flex-wrap bg-gray-50 p-2 rounded-2xl group-hover:bg-gray-100 transition";

                        for (let colIndex = 0; colIndex < 6; colIndex++) {
                            const block = document.createElement("button");
                            block.className =
                                "schedule-block circle-btn shadow-sm";
                            block.dataset.row = rowIndex;
                            block.dataset.col = colIndex;

                            const blockProjectId =
                                blocks[`${rowIndex}-${colIndex}`];
                            const project = projects.find(
                                (p) => p.id === blockProjectId,
                            );

                            if (project) {
                                block.style.backgroundColor = project.color;
                                block.classList.add("filled");
                                block.title = project.name;
                            } else {
                                block.title = "Empty (Click to set)";
                            }
                            this.blockNodes[`${rowIndex}-${colIndex}`] = block;
                            blocksContainer.appendChild(block);
                        }
                        rowEl.appendChild(timeLabel);
                        rowEl.appendChild(blocksContainer);
                        container.appendChild(rowEl);
                    });
                }

                renderChoiceMenu(blockElement, rowIndex, colIndex) {
                    const menu = document.createElement("div");
                    menu.className = "choice-menu";
                    this.state.getTypes().forEach((t) => {
                        const typeProjs = this.state.getProjectsByType(t.id);
                        if (typeProjs.length === 0) return;

                        const header = document.createElement("div");
                        header.className =
                            "text-[10px] font-bold text-gray-400 uppercase tracking-wider px-2 py-1 mt-1";
                        header.innerText = t.name;
                        menu.appendChild(header);

                        typeProjs.forEach((p) => {
                            const btn = document.createElement("button");
                            btn.className =
                                "flex items-center justify-between p-2 w-full hover:bg-gray-100 rounded-lg transition text-left group/btn";
                            btn.innerHTML = `
                            <div class="flex items-center gap-3 overflow-hidden">
                                <div class="w-4 h-4 rounded-full shadow-sm flex-shrink-0" style="background-color: ${p.color}"></div>
                                <span class="text-xs font-bold text-gray-700 truncate">${p.name}</span>
                            </div>
                            <div class="opacity-0 group-hover/btn:opacity-100 text-[10px] text-gray-400 bg-white px-2 py-1 rounded shadow-sm border border-gray-100 fill-hour-btn" title="Fill entire hour">Fill Hr</div>
                            `;
                            btn.onclick = (event) => {
                                event.stopPropagation();
                                if (
                                    event.target.classList.contains(
                                        "fill-hour-btn",
                                    )
                                ) {
                                    globalBus.emit("schedule:fillRow", {
                                        row: rowIndex,
                                        projectId: p.id,
                                    });
                                } else {
                                    globalBus.emit("block:update", {
                                        row: rowIndex,
                                        col: colIndex,
                                        projectId: p.id,
                                    });
                                }
                                this.closeAllMenus();
                            };
                            menu.appendChild(btn);
                        });
                    });

                    const reset = document.createElement("button");
                    reset.className =
                        "mt-2 p-2 w-full text-left text-xs font-bold text-red-500 hover:bg-red-50 rounded-lg transition border-t border-gray-100";
                    reset.innerText = "Clear Block";
                    reset.onclick = (event) => {
                        event.stopPropagation();
                        globalBus.emit("block:update", {
                            row: rowIndex,
                            col: colIndex,
                            projectId: null,
                        });
                        this.closeAllMenus();
                    };

                    menu.appendChild(reset);
                    blockElement.appendChild(menu);

                    const rect = blockElement.getBoundingClientRect();
                    if (rect.bottom + menu.offsetHeight > window.innerHeight) {
                        menu.style.top = "auto";
                        menu.style.bottom = "50px";
                        menu.style.boxShadow =
                            "0 -10px 25px -5px rgba(0, 0, 0, 0.15)";
                    }
                }

                // UNIFIED SETTINGS RENDERER
                renderSettings() {
                    const list = document.getElementById("hierarchy-list");
                    list.innerHTML = "";

                    const types = this.state.getTypes();
                    const projects = this.state.getProjects();

                    types.forEach((t) => {
                        const typeProjs = projects.filter(
                            (p) => p.typeId === t.id,
                        );

                        // Type Header
                        const typeBlock = document.createElement("div");
                        typeBlock.className = "mb-8";

                        typeBlock.innerHTML = `
                            <div class="flex items-center justify-between mb-3 group/type border-b border-gray-200 pb-2">
                                <div class="flex items-center gap-2">
                                    <svg class="grab-handle w-4 h-4 text-gray-400" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="9" cy="12" r="1"/><circle cx="9" cy="5" r="1"/><circle cx="9" cy="19" r="1"/><circle cx="15" cy="12" r="1"/><circle cx="15" cy="5" r="1"/><circle cx="15" cy="19" r="1"/></svg>
                                    <h4 class="text-sm font-black text-gray-900 uppercase tracking-widest" contenteditable="true" data-entity="type" data-id="${t.id}" title="Click to edit">${t.name}</h4>
                                    <span class="text-xs text-gray-400 bg-gray-100 px-2 py-0.5 rounded-full">${typeProjs.length}</span>
                                </div>
                                <div class="flex gap-2 opacity-0 group-hover/type:opacity-100 transition">
                                    <button onclick="app.addProjectToType('${t.id}')" class="text-xs font-bold text-indigo-600 hover:bg-indigo-50 px-2 py-1 rounded">Add Project</button>
                                    <button onclick="app.requestRemoveType('${t.id}')" class="text-xs font-bold text-red-500 hover:bg-red-50 px-2 py-1 rounded">Delete</button>
                                </div>
                            </div>
                            <div class="flex flex-col gap-2 pl-6" id="proj-container-${t.id}"></div>
                        `;
                        list.appendChild(typeBlock);

                        // Nested Projects
                        const projContainer = document.getElementById(
                            `proj-container-${t.id}`,
                        );
                        if (typeProjs.length === 0) {
                            projContainer.innerHTML = `<div class="text-xs text-gray-400 italic py-2">No projects yet. Click 'Add Project' above.</div>`;
                        } else {
                            typeProjs.forEach((p) => {
                                const pCard = document.createElement("div");
                                pCard.className =
                                    "flex items-center justify-between p-3 bg-white border border-gray-100 rounded-xl shadow-sm hover:shadow-md transition group/proj";
                                pCard.innerHTML = `
                                    <div class="flex items-center gap-3 flex-1">
                                        <svg class="grab-handle w-4 h-4 text-gray-300" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><line x1="8" y1="6" x2="16" y2="6"/><line x1="8" y1="12" x2="16" y2="12"/><line x1="8" y1="18" x2="16" y2="18"/></svg>
                                        <input type="color" data-entity="project-color" data-id="${p.id}" value="${p.color}" class="w-6 h-6 rounded-md cursor-pointer border-0 p-0 shadow-inner shrink-0 bg-transparent"/>
                                        <span class="text-sm font-semibold text-gray-800" contenteditable="true" data-entity="project" data-id="${p.id}" title="Click to edit">${p.name}</span>
                                    </div>
                                    <button onclick="app.removeProject('${p.id}')" class="opacity-0 group-hover/proj:opacity-100 text-red-400 hover:text-red-600 font-bold text-xs transition px-2 py-1">Remove</button>
                                `;
                                projContainer.appendChild(pCard);
                            });
                        }
                    });
                }

                toggleModal(modalId, show) {
                    const modal = document.getElementById(modalId);
                    if (show) {
                        modal.classList.remove("hidden");
                        modal.classList.add("modal-bg");
                    } else {
                        modal.classList.add("hidden");
                        modal.classList.remove("modal-bg");
                    }
                }
            }

            // -----------------------------------------------------------------------------
            // 3. APP CONTROLLER (Business Logic)
            // -----------------------------------------------------------------------------
            class AppController {
                constructor() {
                    this.state = new StateManager();
                    this.ui = new UIManager(this.state);
                    this.setupLogicListeners();
                    this.state.ensureDateExists(this.state.getCurrentDate());
                    globalBus.emit("view:refresh");
                }

                setupLogicListeners() {
                    globalBus.on("block:update", ({ row, col, projectId }) => {
                        this.state.updateState((data) => {
                            const blocks =
                                data.schedules[data.currentDate].blocks;
                            const key = `${row}-${col}`;
                            if (projectId) blocks[key] = projectId;
                            else delete blocks[key];
                        });
                        const project = projectId
                            ? this.state.getProjectById(projectId)
                            : null;
                        globalBus.emit("block:updated", { row, col, project });
                        globalBus.emit("analytics:refreshed");
                    });

                    globalBus.on("schedule:fillRow", ({ row, projectId }) => {
                        this.state.updateState((data) => {
                            const blocks =
                                data.schedules[data.currentDate].blocks;
                            for (let c = 0; c < 6; c++) {
                                if (projectId)
                                    blocks[`${row}-${c}`] = projectId;
                                else delete blocks[`${row}-${c}`];
                            }
                        });
                        globalBus.emit("schedule:refreshed");
                        globalBus.emit("analytics:refreshed");
                    });

                    // Hierarchy Updates (Inline Edit Saves)
                    globalBus.on("hierarchy:updateType", ({ id, name }) => {
                        if (!name) return;
                        this.state.updateState((data) => {
                            const t = data.types.find((x) => x.id === id);
                            if (t) t.name = name;
                        });
                        globalBus.emit("hierarchy:refreshed");
                    });

                    globalBus.on("hierarchy:updateProject", ({ id, name }) => {
                        if (!name) return;
                        this.state.updateState((data) => {
                            const p = data.projects.find((x) => x.id === id);
                            if (p) p.name = name;
                        });
                        globalBus.emit("schedule:refreshed");
                        globalBus.emit("hierarchy:refreshed");
                    });

                    globalBus.on(
                        "hierarchy:updateProjectColor",
                        ({ id, color }) => {
                            this.state.updateState((data) => {
                                const p = data.projects.find(
                                    (x) => x.id === id,
                                );
                                if (p) p.color = color;
                            });
                            globalBus.emit("schedule:refreshed");
                            globalBus.emit("hierarchy:refreshed");
                        },
                    );
                }

                // --- HTML Bound Actions ---
                goToToday() {
                    const today = new Date();
                    const offset = today.getTimezoneOffset() * 60000;
                    this.selectDate(
                        new Date(today - offset).toISOString().split("T")[0],
                    );
                }

                selectDate(dateStr) {
                    this.state.updateState((data) => {
                        data.currentDate = dateStr;
                    });
                    this.state.ensureDateExists(dateStr);
                    globalBus.emit("view:refresh");
                }

                openSettingsModal() {
                    this.ui.renderSettings();
                    this.ui.toggleModal("settings-modal", true);
                }

                closeSettingsModal() {
                    this.ui.toggleModal("settings-modal", false);
                }

                addType() {
                    const input = document.getElementById("new-type-name");
                    const name = input.value.trim();
                    if (!name) return;
                    this.state.updateState((data) => {
                        data.types.push({ id: "t_" + Date.now(), name });
                    });
                    input.value = "";
                    globalBus.emit("hierarchy:refreshed");
                }

                requestRemoveType(id) {
                    const projectsLinked = this.state.getProjectsByType(id);
                    if (projectsLinked.length > 0) {
                        const confirmDelete = confirm(
                            `⚠️ Watch out! This category contains ${projectsLinked.length} active project(s).\n\nDeleting this category will permanently delete these projects and clear them from your schedule.\n\nProceed?`,
                        );
                        if (!confirmDelete) return;
                    }
                    this.state.updateState((data) => {
                        data.types = data.types.filter((t) => t.id !== id);
                        // Cascade delete
                        const toDeleteIds = projectsLinked.map((p) => p.id);
                        data.projects = data.projects.filter(
                            (p) => !toDeleteIds.includes(p.id),
                        );

                        // Scrub schedule
                        for (let date in data.schedules) {
                            const blocks = data.schedules[date].blocks;
                            for (let key in blocks) {
                                if (toDeleteIds.includes(blocks[key]))
                                    delete blocks[key];
                            }
                        }
                    });
                    globalBus.emit("view:refresh"); // Need full refresh due to scrub
                    this.ui.renderSettings();
                }

                addProjectToType(typeId) {
                    this.state.updateState((data) => {
                        data.projects.push({
                            id: "p_" + Date.now(),
                            name: "New Project",
                            color: "#94a3b8", // Default slate
                            typeId: typeId,
                        });
                    });
                    globalBus.emit("hierarchy:refreshed");
                }

                removeProject(id) {
                    this.state.updateState((data) => {
                        data.projects = data.projects.filter(
                            (p) => p.id !== id,
                        );
                        for (let date in data.schedules) {
                            const blocks = data.schedules[date].blocks;
                            for (let key in blocks) {
                                if (blocks[key] === id) delete blocks[key];
                            }
                        }
                    });
                    globalBus.emit("view:refresh");
                    this.ui.renderSettings();
                }
            }

            window.app = new AppController();
        </script>
    </body>
</html>
