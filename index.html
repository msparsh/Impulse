<!doctype html>
<html lang="en">
    <head>
        <meta charset="UTF-8" />
        <meta name="viewport" content="width=device-width, initial-scale=1.0" />
        <title>Visual Schedule Planner Pro - v10 (Command Engine)</title>
        <script src="https://cdn.tailwindcss.com"></script>
        <link
            href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;900&display=swap"
            rel="stylesheet"
        />
        <style>
            body {
                font-family: "Inter", sans-serif;
                background-color: #f9fafb;
                color: #1a1a1a;
            }
            .circle-btn {
                width: 44px;
                height: 44px;
                border-radius: 50%;
                display: flex;
                align-items: center;
                justify-content: center;
                font-size: 20px;
                transition:
                    background-color 0.4s ease,
                    transform 0.2s cubic-bezier(0.4, 0, 0.2, 1);
                position: relative;
                background-color: #e5e7eb;
                border: 2px solid transparent;
                cursor: pointer;
                outline: none;
            }
            .circle-btn:hover {
                transform: scale(1.1);
                filter: brightness(95%);
                z-index: 10;
            }
            .circle-btn:focus-visible,
            .circle-btn.js-focus {
                box-shadow: 0 0 0 4px rgba(79, 70, 229, 0.5);
                transform: scale(1.1);
                z-index: 30;
                border-color: #4f46e5;
            }
            .circle-btn.filled {
                border-color: rgba(0, 0, 0, 0.1);
            }
            .active-block {
                box-shadow: 0 0 0 4px rgba(79, 70, 229, 0.4);
                transform: scale(1.1);
                z-index: 20;
            }

            .pulse-fill {
                animation: pulseFill 0.3s cubic-bezier(0.4, 0, 0.2, 1);
            }
            @keyframes pulseFill {
                0% {
                    transform: scale(1);
                }
                50% {
                    transform: scale(1.2);
                    filter: brightness(1.2);
                }
                100% {
                    transform: scale(1);
                }
            }

            .current-time-label {
                color: #ef4444 !important;
                font-weight: 900 !important;
                position: relative;
            }
            .current-time-label::after {
                content: "";
                position: absolute;
                right: -12px;
                top: 50%;
                transform: translateY(-50%);
                width: 8px;
                height: 8px;
                background-color: #ef4444;
                border-radius: 50%;
                animation: pulse-dot 1.5s infinite;
            }
            @keyframes pulse-dot {
                0% {
                    box-shadow: 0 0 0 0 rgba(239, 68, 68, 0.4);
                }
                70% {
                    box-shadow: 0 0 0 6px rgba(239, 68, 68, 0);
                }
                100% {
                    box-shadow: 0 0 0 0 rgba(239, 68, 68, 0);
                }
            }

            .paint-active {
                border-color: #4f46e5 !important;
                box-shadow: 0 0 0 2px rgba(79, 70, 229, 0.2);
                background-color: #eef2ff !important;
            }
            .paint-active-indicator {
                display: inline-block;
                background: #4f46e5;
                color: white;
                font-size: 9px;
                padding: 2px 6px;
                border-radius: 4px;
                text-transform: uppercase;
                font-weight: 900;
                margin-left: auto;
            }
            .active-date {
                background-color: #4f46e5;
                color: white !important;
                font-weight: bold;
                border-radius: 8px;
            }

            .choice-menu {
                position: absolute;
                background: white;
                border: 1px solid #e5e7eb;
                border-radius: 12px;
                padding: 8px;
                display: flex;
                flex-direction: column;
                gap: 4px;
                box-shadow: 0 10px 25px -5px rgba(0, 0, 0, 0.15);
                z-index: 9999;
                width: 200px;
                animation: fadeIn 0.15s ease-out;
            }
            .choice-menu button:focus-visible {
                background-color: #f3f4f6;
                outline: 2px solid #4f46e5;
                outline-offset: -2px;
            }

            .custom-scroll::-webkit-scrollbar {
                width: 6px;
            }
            .custom-scroll::-webkit-scrollbar-thumb {
                background: #cbd5e1;
                border-radius: 4px;
            }
            .sidebar-collapsed {
                width: 0 !important;
                padding-left: 0 !important;
                padding-right: 0 !important;
                opacity: 0;
                overflow: hidden;
                border: none;
            }
            .sidebar-transition {
                transition:
                    width 0.3s ease,
                    padding 0.3s ease,
                    opacity 0.3s ease;
            }

            @keyframes fadeIn {
                from {
                    opacity: 0;
                }
                to {
                    opacity: 1;
                }
            }
            @keyframes fadeOut {
                from {
                    opacity: 1;
                }
                to {
                    opacity: 0;
                }
            }
            @keyframes slideUp {
                from {
                    transform: translateY(20px);
                    opacity: 0;
                }
                to {
                    transform: translateY(0);
                    opacity: 1;
                }
            }
            @keyframes slideDown {
                from {
                    transform: translateY(0);
                    opacity: 1;
                }
                to {
                    transform: translateY(20px);
                    opacity: 0;
                }
            }
            @keyframes slideInRight {
                from {
                    transform: translateX(100%);
                    opacity: 0;
                }
                to {
                    transform: translateX(0);
                    opacity: 1;
                }
            }

            .modal-bg {
                animation: fadeIn 0.2s ease-out forwards;
            }
            .modal-content {
                animation: slideUp 0.2s ease-out forwards;
            }
            .modal-bg.closing {
                animation: fadeOut 0.1s ease-in forwards;
            }
            .modal-content.closing {
                animation: slideDown 0.1s ease-in forwards;
            }
            [contenteditable="true"] {
                outline: none;
                border-bottom: 1px dashed transparent;
                transition:
                    border-color 0.2s,
                    background-color 0.2s;
                padding: 2px 4px;
                border-radius: 4px;
            }
            [contenteditable="true"]:hover,
            [contenteditable="true"]:focus {
                border-bottom-color: #cbd5e1;
                background-color: #f1f5f9;
            }
            .edit-success {
                animation: flashGreen 0.6s;
            }
            @keyframes flashGreen {
                0% {
                    background-color: #dcfce7;
                }
                100% {
                    background-color: transparent;
                }
            }

            .drag-over {
                border: 2px dashed #4f46e5 !important;
                background-color: #e0e7ff !important;
            }
            .drag-over-top {
                border-top: 3px solid #4f46e5 !important;
            }
            .grab-handle {
                cursor: grab;
                opacity: 0.4;
                transition: opacity 0.2s;
            }
            .grab-handle:hover {
                opacity: 0.8;
            }
            .grab-handle:active {
                cursor: grabbing;
            }
            .dragging {
                opacity: 0.6 !important;
                transform: scale(0.97);
                cursor: grabbing !important;
                box-shadow: 0 15px 25px -5px rgba(0, 0, 0, 0.15);
            }

            .toast {
                position: fixed;
                bottom: 24px;
                right: 24px;
                background: #1f2937;
                color: white;
                padding: 12px 24px;
                border-radius: 8px;
                font-size: 14px;
                font-weight: 600;
                box-shadow: 0 10px 15px -3px rgba(0, 0, 0, 0.1);
                z-index: 10000;
                animation: slideInRight 0.3s cubic-bezier(0.4, 0, 0.2, 1);
            }
            .toast.error {
                background: #ef4444;
            }

            /* Command Palette */
            .cmd-palette-wrapper {
                position: fixed;
                inset: 0;
                z-index: 99999;
                display: flex;
                align-items: flex-start;
                justify-content: center;
                padding-top: 12vh;
                background: rgba(255, 255, 255, 0.4);
                backdrop-filter: blur(8px);
                animation: fadeIn 0.1s ease-out forwards;
            }
            .cmd-palette-wrapper.closing {
                animation: fadeOut 0.1s ease-in forwards;
                pointer-events: none;
            }
            .cmd-palette {
                width: 100%;
                max-width: 650px;
                background: white;
                border-radius: 16px;
                box-shadow:
                    0 25px 50px -12px rgba(0, 0, 0, 0.25),
                    0 0 0 1px rgba(0, 0, 0, 0.05);
                display: flex;
                flex-direction: column;
                overflow: hidden;
                animation: slideUp 0.1s ease-out forwards;
            }
            .cmd-palette-input {
                width: 100%;
                padding: 20px 24px;
                font-size: 1.25rem;
                border: none;
                outline: none;
                background: transparent;
                color: #111827;
                font-weight: 500;
            }
            .cmd-palette-input::placeholder {
                color: #9ca3af;
                font-weight: 400;
            }
            .cmd-palette-list {
                max-height: 400px;
                overflow-y: auto;
                padding: 8px;
                border-top: 1px solid #f3f4f6;
            }
            .cmd-item {
                display: flex;
                align-items: center;
                justify-content: space-between;
                padding: 12px 16px;
                border-radius: 8px;
                cursor: pointer;
                transition: background 0s;
                color: #4b5563;
            }
            .cmd-item.active {
                background: #4f46e5;
                color: white;
            }
            .cmd-item.active .cmd-subtext {
                color: #a5b4fc;
            }
            .cmd-item-title {
                font-weight: 600;
                font-size: 14px;
                display: flex;
                align-items: center;
                gap: 8px;
            }
            .cmd-subtext {
                font-size: 11px;
                color: #9ca3af;
                text-transform: uppercase;
                font-weight: 800;
                letter-spacing: 0.5px;
            }
            .cmd-context-badge {
                background: #fee2e2;
                color: #b91c1c;
                font-size: 10px;
                padding: 2px 6px;
                border-radius: 4px;
                font-weight: 800;
            }
        </style>
    </head>
    <body class="p-4 md:p-8 h-screen flex flex-col overflow-hidden relative">

        <script>
            class EventEmitter {
                constructor() {
                    this.events = {};
                }
                on(event, listener) {
                    if (!this.events[event]) this.events[event] = [];
                    this.events[event].push(listener);
                }
                emit(event, data) {
                    if (this.events[event])
                        this.events[event].forEach((l) => l(data));
                }
            }
            const globalBus = new EventEmitter();

            const Toast = {
                show: (msg, type = "success") => {
                    const existing = document.querySelector(".toast");
                    if (existing) existing.remove();
                    const el = document.createElement("div");
                    el.className = `toast ${type === "error" ? "error" : ""}`;
                    el.innerHTML = `${type === "error" ? "⚠️" : "✅"} ${msg}`;
                    document.body.appendChild(el);
                    setTimeout(() => {
                        el.style.animation = "fadeOut 0.3s forwards";
                        setTimeout(() => el.remove(), 300);
                    }, 2500);
                },
            };

            class StateManager {
                constructor() {
                    this.storageKey = "planner_state_v10";
                    this.hours = [
                        "7 AM",
                        "8 AM",
                        "9 AM",
                        "10 AM",
                        "11 AM",
                        "12 PM",
                        "1 PM",
                        "2 PM",
                        "3 PM",
                        "4 PM",
                        "5 PM",
                        "6 PM",
                        "7 PM",
                        "8 PM",
                        "9 PM",
                        "10 PM",
                        "11 PM",
                    ];
                    this.data = this.loadState();
                    const today = new Date();
                    this.viewMonth = today.getMonth();
                    this.viewYear = today.getFullYear();
                    this.paintProjectId = null;
                }

                getDefaultState() {
                    const today = new Date();
                    const localISOTime = new Date(
                        today.getTime() - today.getTimezoneOffset() * 60000,
                    )
                        .toISOString()
                        .split("T")[0];
                    return {
                        version: 7,
                        currentDate: localISOTime,
                        types: [
                            { id: "t_1", name: "Work" },
                            { id: "t_2", name: "Personal" },
                        ],
                        projects: [
                            {
                                id: "p_1",
                                name: "Deep Work",
                                color: "#6b92f2",
                                typeId: "t_1",
                            },
                            {
                                id: "p_2",
                                name: "Meetings",
                                color: "#9333ea",
                                typeId: "t_1",
                            },
                            {
                                id: "p_3",
                                name: "Study",
                                color: "#f2a644",
                                typeId: "t_2",
                            },
                            {
                                id: "p_4",
                                name: "Health/Meals",
                                color: "#568f32",
                                typeId: "t_2",
                            },
                        ],
                        schedules: {
                            [localISOTime]: {
                                blocks: {
                                    "1-0": "p_1",
                                    "1-1": "p_1",
                                    "1-2": "p_1",
                                    "1-3": "p_2",
                                    "2-2": "p_3",
                                    "2-3": "p_3",
                                    "2-4": "p_3",
                                    "5-0": "p_4",
                                    "5-1": "p_4",
                                    "5-2": "p_4",
                                },
                            },
                        },
                    };
                }

                loadState() {
                    const saved = localStorage.getItem(this.storageKey);
                    return saved ? JSON.parse(saved) : this.getDefaultState();
                }
                saveState() {
                    localStorage.setItem(
                        this.storageKey,
                        JSON.stringify(this.data),
                    );
                }
                updateState(updaterFn) {
                    updaterFn(this.data);
                    this.saveState();
                }
                ensureDateExists(dateStr) {
                    if (!this.data.schedules[dateStr])
                        this.updateState((data) => {
                            data.schedules[dateStr] = { blocks: {} };
                        });
                }

                getProjectById(id) {
                    return this.data.projects.find((p) => p.id === id);
                }
                getProjects() {
                    return this.data.projects;
                }
                getProjectsByType(typeId) {
                    return this.data.projects.filter(
                        (p) => p.typeId === typeId,
                    );
                }
                getTypes() {
                    return this.data.types;
                }
                getCurrentDate() {
                    return this.data.currentDate;
                }
                getHours() {
                    return this.hours;
                }
                getCurrentSchedule() {
                    return this.data.schedules[this.data.currentDate];
                }
                getDailyAnalytics() {
                    let counts = {};
                    const blocks =
                        this.data.schedules[this.data.currentDate]?.blocks ||
                        {};
                    Object.values(blocks).forEach((pid) => {
                        const p = this.getProjectById(pid);
                        if (p) counts[p.typeId] = (counts[p.typeId] || 0) + 1;
                    });
                    return counts;
                }
            }
