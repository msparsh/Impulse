<!doctype html>
<html lang="en">
    <head>
        <meta charset="UTF-8" />
        <meta name="viewport" content="width=device-width, initial-scale=1.0" />
        <title>Visual Schedule Planner Pro - v7</title>
        <script src="https://cdn.tailwindcss.com"></script>
        <link
            href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap"
            rel="stylesheet"
        />
        <style>
            body {
                font-family: "Inter", sans-serif;
                background-color: #f9fafb;
                color: #1a1a1a;
            }
            .circle-btn {
                width: 44px;
                height: 44px;
                border-radius: 50%;
                display: flex;
                align-items: center;
                justify-content: center;
                font-size: 20px;
                transition:
                    background-color 0.4s ease,
                    transform 0.2s cubic-bezier(0.4, 0, 0.2, 1);
                position: relative;
                background-color: #e5e7eb;
                border: 2px solid transparent;
                cursor: pointer;
            }
            .circle-btn:hover {
                transform: scale(1.1);
                filter: brightness(95%);
                z-index: 10;
            }
            .circle-btn.filled {
                border-color: rgba(0, 0, 0, 0.1);
            }
            .active-date {
                background-color: #4f46e5;
                color: white !important;
                font-weight: bold;
                border-radius: 8px;
            }
            .choice-menu {
                position: fixed;
                background: white;
                border: 1px solid #e5e7eb;
                border-radius: 12px;
                padding: 8px;
                display: flex;
                flex-direction: column;
                gap: 4px;
                box-shadow: 0 10px 25px -5px rgba(0, 0, 0, 0.15);
                z-index: 9999;
                width: 200px;
                animation: fadeIn 0.15s ease-out;
            }
            .custom-scroll::-webkit-scrollbar {
                width: 6px;
            }
            .custom-scroll::-webkit-scrollbar-thumb {
                background: #cbd5e1;
                border-radius: 4px;
            }

            @keyframes fadeIn {
                from {
                    opacity: 0;
                }
                to {
                    opacity: 1;
                }
            }
            @keyframes fadeOut {
                from {
                    opacity: 1;
                }
                to {
                    opacity: 0;
                }
            }
            @keyframes slideUp {
                from {
                    transform: translateY(20px);
                    opacity: 0;
                }
                to {
                    transform: translateY(0);
                    opacity: 1;
                }
            }
            @keyframes slideDown {
                from {
                    transform: translateY(0);
                    opacity: 1;
                }
                to {
                    transform: translateY(20px);
                    opacity: 0;
                }
            }
            @keyframes slideInRight {
                from {
                    transform: translateX(100%);
                    opacity: 0;
                }
                to {
                    transform: translateX(0);
                    opacity: 1;
                }
            }

            .modal-bg {
                animation: fadeIn 0.2s ease-out forwards;
            }
            .modal-content {
                animation: slideUp 0.2s ease-out forwards;
            }
            .modal-bg.closing {
                animation: fadeOut 0.2s ease-out forwards;
            }
            .modal-content.closing {
                animation: slideDown 0.2s ease-out forwards;
            }

            /* Inline Edit Styles */
            [contenteditable="true"] {
                outline: none;
                border-bottom: 1px dashed transparent;
                transition:
                    border-color 0.2s,
                    background-color 0.2s;
                padding: 2px 4px;
                border-radius: 4px;
            }
            [contenteditable="true"]:hover,
            [contenteditable="true"]:focus {
                border-bottom-color: #cbd5e1;
                background-color: #f1f5f9;
            }
            .edit-success {
                animation: flashGreen 0.6s;
            }
            @keyframes flashGreen {
                0% {
                    background-color: #dcfce7;
                }
                100% {
                    background-color: transparent;
                }
            }

            /* Drag and Drop Visuals */
            .drag-over {
                border: 2px dashed #4f46e5 !important;
                background-color: #e0e7ff !important;
            }
            .drag-over-top {
                border-top: 3px solid #4f46e5 !important;
            }
            .grab-handle {
                cursor: grab;
                opacity: 0.4;
                transition: opacity 0.2s;
            }
            .grab-handle:hover {
                opacity: 0.8;
            }
            .grab-handle:active {
                cursor: grabbing;
            }

            /* Toast */
            .toast {
                position: fixed;
                bottom: 24px;
                right: 24px;
                background: #1f2937;
                color: white;
                padding: 12px 24px;
                border-radius: 8px;
                font-size: 14px;
                font-weight: 600;
                box-shadow: 0 10px 15px -3px rgba(0, 0, 0, 0.1);
                z-index: 10000;
                animation: slideInRight 0.3s cubic-bezier(0.4, 0, 0.2, 1);
            }
            .toast.error {
                background: #ef4444;
            }
        </style>
    </head>
    <body class="p-4 md:p-8 h-screen flex flex-col overflow-hidden relative">
        <div
            class="max-w-7xl mx-auto w-full h-full flex flex-col bg-white rounded-2xl shadow-sm border border-gray-100 overflow-hidden relative"
        >
            <header
                class="flex items-center justify-between p-6 border-b border-gray-100"
            >
                <div class="flex items-center gap-4">
                    <div
                        class="w-10 h-10 bg-indigo-600 rounded-lg flex items-center justify-center text-white font-bold text-xl"
                    >
                        V
                    </div>
                    <h1 class="text-xl font-bold">Visual Planner Pro</h1>
                </div>
                <div class="flex items-center gap-6">
                    <button
                        onclick="app.goToToday()"
                        class="px-4 py-2 border border-gray-200 rounded-full text-xs font-bold hover:bg-gray-50 text-gray-600 transition shadow-sm"
                    >
                        Today
                    </button>
                    <div class="text-right border-l border-gray-200 pl-6">
                        <h2
                            id="display-date"
                            class="text-xl font-bold text-indigo-900"
                        >
                            ...
                        </h2>
                        <p id="display-day" class="text-gray-500 text-sm">
                            ...
                        </p>
                    </div>
                    <button
                        onclick="app.openSettingsModal()"
                        class="w-10 h-10 rounded-full border border-gray-200 flex items-center justify-center hover:bg-gray-50 hover:border-gray-300 transition text-gray-600 shadow-sm"
                    >
                        <svg
                            width="20"
                            height="20"
                            viewBox="0 0 24 24"
                            fill="none"
                            stroke="currentColor"
                            stroke-width="2"
                            stroke-linecap="round"
                            stroke-linejoin="round"
                        >
                            <line x1="12" y1="5" x2="12" y2="19"></line>
                            <line x1="5" y1="12" x2="19" y2="12"></line>
                        </svg>
                    </button>
                </div>
            </header>

            <div class="flex flex-1 overflow-hidden">
                <aside
                    class="w-80 border-r border-gray-100 p-6 flex flex-col gap-8 overflow-y-auto custom-scroll bg-gray-50"
                >
                    <div
                        class="bg-white p-4 rounded-xl shadow-sm border border-gray-100"
                    >
                        <div class="flex items-center justify-between mb-4">
                            <button
                                onclick="app.prevMonth()"
                                class="text-gray-400 hover:text-indigo-600 transition p-1"
                            >
                                <svg
                                    width="16"
                                    height="16"
                                    viewBox="0 0 24 24"
                                    fill="none"
                                    stroke="currentColor"
                                    stroke-width="2"
                                    stroke-linecap="round"
                                    stroke-linejoin="round"
                                >
                                    <polyline
                                        points="15 18 9 12 15 6"
                                    ></polyline>
                                </svg>
                            </button>
                            <span
                                id="calendar-month-label"
                                class="text-sm font-bold text-gray-800"
                                >...</span
                            >
                            <button
                                onclick="app.nextMonth()"
                                class="text-gray-400 hover:text-indigo-600 transition p-1"
                            >
                                <svg
                                    width="16"
                                    height="16"
                                    viewBox="0 0 24 24"
                                    fill="none"
                                    stroke="currentColor"
                                    stroke-width="2"
                                    stroke-linecap="round"
                                    stroke-linejoin="round"
                                >
                                    <polyline
                                        points="9 18 15 12 9 6"
                                    ></polyline>
                                </svg>
                            </button>
                        </div>
                        <div
                            class="grid grid-cols-7 gap-1 text-center text-xs font-medium mb-2"
                        >
                            <div class="text-gray-400">S</div>
                            <div class="text-gray-400">M</div>
                            <div class="text-gray-400">T</div>
                            <div class="text-gray-400">W</div>
                            <div class="text-gray-400">T</div>
                            <div class="text-gray-400">F</div>
                            <div class="text-gray-400">S</div>
                        </div>
                        <div
                            id="calendar-grid"
                            class="grid grid-cols-7 gap-1 text-center text-sm"
                        ></div>
                    </div>

                    <div>
                        <h3
                            class="text-sm font-bold text-gray-800 mb-3 flex items-center gap-2"
                        >
                            Active Projects
                        </h3>
                        <div
                            id="project-list"
                            class="flex flex-col gap-2 mb-4"
                        ></div>
                    </div>
                </aside>

                <main class="flex-1 flex flex-col overflow-hidden bg-white">
                    <div
                        class="p-6 border-b border-gray-100 bg-white z-10 shadow-sm"
                    >
                        <h3
                            class="text-sm font-bold text-gray-800 mb-3 flex items-center gap-2"
                        >
                            Daily Time Allocation
                        </h3>
                        <div
                            id="analytics-bar"
                            class="flex flex-wrap gap-4"
                        ></div>
                    </div>
                    <div class="flex-1 overflow-y-auto p-6 custom-scroll">
                        <div
                            id="schedule-grid"
                            class="flex flex-col gap-6 max-w-4xl mx-auto pb-20"
                        ></div>
                    </div>
                </main>
            </div>
        </div>

        <div
            id="settings-modal"
            class="fixed inset-0 bg-black/40 hidden z-50 flex items-center justify-center backdrop-blur-sm p-4"
        >
            <div
                class="bg-white rounded-2xl shadow-2xl w-full max-w-2xl overflow-hidden modal-content flex flex-col max-h-[90vh]"
            >
                <div
                    class="p-4 border-b border-gray-100 flex justify-between items-center bg-gray-50"
                >
                    <h3 class="font-bold text-gray-800 flex items-center gap-2">
                        <svg
                            width="18"
                            height="18"
                            viewBox="0 0 24 24"
                            fill="none"
                            stroke="currentColor"
                            stroke-width="2"
                            stroke-linecap="round"
                            stroke-linejoin="round"
                        >
                            <path d="M12 20h9"></path>
                            <path
                                d="M16.5 3.5a2.121 2.121 0 0 1 3 3L7 19l-4 1 1-4L16.5 3.5z"
                            ></path>
                        </svg>
                        Manage Hierarchy
                    </h3>
                    <button
                        onclick="app.closeSettingsModal()"
                        class="text-gray-400 hover:text-gray-700 transition p-2"
                    >
                        <svg
                            width="20"
                            height="20"
                            viewBox="0 0 24 24"
                            fill="none"
                            stroke="currentColor"
                            stroke-width="2"
                            stroke-linecap="round"
                            stroke-linejoin="round"
                        >
                            <line x1="18" y1="6" x2="6" y2="18"></line>
                            <line x1="6" y1="6" x2="18" y2="18"></line>
                        </svg>
                    </button>
                </div>
                <div class="p-6 border-b border-gray-100 bg-white flex gap-3">
                    <input
                        type="text"
                        id="new-type-name"
                        placeholder="New Category Type..."
                        class="text-sm p-2 border border-gray-200 rounded-lg flex-1 focus:outline-none focus:border-indigo-500 bg-gray-50"
                    />
                    <button
                        onclick="app.addType()"
                        class="bg-gray-800 text-white px-4 py-2 rounded-lg text-sm font-bold hover:bg-gray-700 transition shadow-sm"
                    >
                        Add Type
                    </button>
                </div>
                <div
                    class="flex-1 p-6 overflow-y-auto custom-scroll bg-gray-50/50"
                    id="hierarchy-list"
                ></div>
            </div>
        </div>

        <div
            id="confirm-modal"
            class="fixed inset-0 bg-black/60 hidden z-[100] flex items-center justify-center backdrop-blur-sm p-4"
        >
            <div
                class="bg-white rounded-2xl shadow-2xl w-full max-w-md overflow-hidden modal-content flex flex-col"
            >
                <div
                    class="p-6 border-b border-gray-100 bg-red-50 text-red-600 flex items-center gap-3"
                >
                    <svg
                        width="24"
                        height="24"
                        viewBox="0 0 24 24"
                        fill="none"
                        stroke="currentColor"
                        stroke-width="2"
                        stroke-linecap="round"
                        stroke-linejoin="round"
                    >
                        <path
                            d="M10.29 3.86L1.82 18a2 2 0 0 0 1.71 3h16.94a2 2 0 0 0 1.71-3L13.71 3.86a2 2 0 0 0-3.42 0z"
                        ></path>
                        <line x1="12" y1="9" x2="12" y2="13"></line>
                        <line x1="12" y1="17" x2="12.01" y2="17"></line>
                    </svg>
                    <h3 class="font-bold text-lg">Delete Category?</h3>
                </div>
                <div class="p-6 text-gray-700 text-sm">
                    <p class="mb-4">
                        This will permanently delete the category and the
                        following
                        <span id="confirm-count" class="font-bold"></span>
                        project(s):
                    </p>
                    <ul
                        id="confirm-project-list"
                        class="list-disc pl-5 mb-4 space-y-1 font-medium text-gray-900 bg-gray-50 p-3 rounded-lg border border-gray-100"
                    ></ul>
                    <p
                        class="text-red-600 font-semibold text-xs uppercase tracking-wide"
                    >
                        All scheduled blocks for these projects will be erased.
                    </p>
                </div>
                <div
                    class="p-4 border-t border-gray-100 bg-gray-50 flex justify-end gap-3"
                >
                    <button
                        onclick="app.cancelConfirm()"
                        class="px-4 py-2 rounded-lg text-sm font-bold text-gray-600 hover:bg-gray-200 transition"
                    >
                        Cancel
                    </button>
                    <button
                        id="confirm-action-btn"
                        class="px-4 py-2 rounded-lg text-sm font-bold bg-red-600 text-white hover:bg-red-700 transition shadow-sm"
                    >
                        Yes, Delete Everything
                    </button>
                </div>
            </div>
        </div>

        <script>
            // -----------------------------------------------------------------------------
            // 0. EVENT BUS & UTILS
            // -----------------------------------------------------------------------------
            class EventEmitter {
                constructor() {
                    this.events = {};
                }
                on(event, listener) {
                    if (!this.events[event]) this.events[event] = [];
                    this.events[event].push(listener);
                }
                emit(event, data) {
                    if (this.events[event])
                        this.events[event].forEach((l) => l(data));
                }
            }
            const globalBus = new EventEmitter();

            const Toast = {
                show: (msg, type = "success") => {
                    const existing = document.querySelector(".toast");
                    if (existing) existing.remove();
                    const el = document.createElement("div");
                    el.className = `toast ${type === "error" ? "error" : ""}`;
                    el.innerHTML = `${type === "error" ? "⚠️" : "✅"} ${msg}`;
                    document.body.appendChild(el);
                    setTimeout(() => {
                        el.style.animation = "fadeOut 0.3s forwards";
                        setTimeout(() => el.remove(), 300);
                    }, 2500);
                },
            };

            // -----------------------------------------------------------------------------
            // 1. STATE MANAGEMENT
            // -----------------------------------------------------------------------------
            class StateManager {
                constructor() {
                    this.storageKey = "planner_state_v7";
                    this.hours = [
                        "7 AM",
                        "8 AM",
                        "9 AM",
                        "10 AM",
                        "11 AM",
                        "12 PM",
                        "1 PM",
                        "2 PM",
                        "3 PM",
                        "4 PM",
                        "5 PM",
                        "6 PM",
                        "7 PM",
                        "8 PM",
                        "9 PM",
                        "10 PM",
                        "11 PM",
                    ];
                    this.data = this.loadState();

                    const today = new Date();
                    this.viewMonth = today.getMonth();
                    this.viewYear = today.getFullYear();
                }

                getDefaultState() {
                    const today = new Date();
                    const offset = today.getTimezoneOffset() * 60000;
                    const localISOTime = new Date(today - offset)
                        .toISOString()
                        .split("T")[0];

                    return {
                        version: 4,
                        currentDate: localISOTime,
                        types: [
                            { id: "t_1", name: "Work" },
                            { id: "t_2", name: "Personal" },
                        ],
                        projects: [
                            {
                                id: "p_1",
                                name: "Deep Work",
                                color: "#6b92f2",
                                typeId: "t_1",
                            },
                            {
                                id: "p_2",
                                name: "Meetings",
                                color: "#9333ea",
                                typeId: "t_1",
                            },
                            {
                                id: "p_3",
                                name: "Study",
                                color: "#f2a644",
                                typeId: "t_2",
                            },
                            {
                                id: "p_4",
                                name: "Health/Meals",
                                color: "#568f32",
                                typeId: "t_2",
                            },
                        ],
                        schedules: {
                            [localISOTime]: {
                                blocks: {
                                    "1-0": "p_1",
                                    "1-1": "p_1",
                                    "1-2": "p_1",
                                    "1-3": "p_2",
                                    "2-2": "p_3",
                                    "2-3": "p_3",
                                    "2-4": "p_3",
                                    "5-0": "p_4",
                                    "5-1": "p_4",
                                    "5-2": "p_4",
                                },
                            },
                        },
                    };
                }

                loadState() {
                    const saved = localStorage.getItem(this.storageKey);
                    return saved ? JSON.parse(saved) : this.getDefaultState();
                }
                saveState() {
                    localStorage.setItem(
                        this.storageKey,
                        JSON.stringify(this.data),
                    );
                }
                updateState(updaterFn) {
                    updaterFn(this.data);
                    this.saveState();
                }
                ensureDateExists(dateStr) {
                    if (!this.data.schedules[dateStr])
                        this.updateState((data) => {
                            data.schedules[dateStr] = { blocks: {} };
                        });
                }

                getProjectById(id) {
                    return this.data.projects.find((p) => p.id === id);
                }
                getProjects() {
                    return this.data.projects;
                }
                getProjectsByType(typeId) {
                    return this.data.projects.filter(
                        (p) => p.typeId === typeId,
                    );
                }
                getTypes() {
                    return this.data.types;
                }
                getCurrentDate() {
                    return this.data.currentDate;
                }
                getHours() {
                    return this.hours;
                }
                getCurrentSchedule() {
                    return this.data.schedules[this.data.currentDate];
                }
                getDailyAnalytics() {
                    let typeCounts = {};
                    const blocks =
                        this.data.schedules[this.data.currentDate]?.blocks ||
                        {};
                    Object.values(blocks).forEach((projectId) => {
                        const project = this.getProjectById(projectId);
                        if (project)
                            typeCounts[project.typeId] =
                                (typeCounts[project.typeId] || 0) + 1;
                    });
                    return typeCounts;
                }
            }

            // -----------------------------------------------------------------------------
            // 2. UI MANAGEMENT
            // -----------------------------------------------------------------------------
            class UIManager {
                constructor(state) {
                    this.state = state;
                    this.blockNodes = {};
                    this.dragState = { type: null, sourceId: null };
                    this.setupDelegation();
                    this.listenToEvents();
                }

                setupDelegation() {
                    const grid = document.getElementById("schedule-grid");
                    const hierarchyList =
                        document.getElementById("hierarchy-list");

                    grid.addEventListener("click", (e) => {
                        const block = e.target.closest(".schedule-block");
                        if (block) {
                            e.stopPropagation();
                            this.closeAllMenus();
                            this.renderChoiceMenu(
                                block,
                                block.dataset.row,
                                block.dataset.col,
                            );
                        }
                    });

                    grid.addEventListener("contextmenu", (e) => {
                        const block = e.target.closest(".schedule-block");
                        if (block) {
                            e.preventDefault();
                            globalBus.emit("block:update", {
                                row: block.dataset.row,
                                col: block.dataset.col,
                                projectId: null,
                            });
                        }
                    });

                    // Inline Edit Focus Capture
                    hierarchyList.addEventListener(
                        "focus",
                        (e) => {
                            if (e.target.hasAttribute("contenteditable")) {
                                e.target.dataset.original =
                                    e.target.innerText.trim();
                            }
                        },
                        true,
                    );

                    // Inline Edit Save
                    hierarchyList.addEventListener(
                        "blur",
                        (e) => {
                            if (e.target.hasAttribute("contenteditable")) {
                                const newText = e.target.innerText.trim();
                                const original = e.target.dataset.original;

                                if (!newText) {
                                    e.target.innerText = original;
                                    Toast.show("Name cannot be empty", "error");
                                    return;
                                }
                                if (newText === original) return;

                                const entityType = e.target.dataset.entity;
                                const id = e.target.dataset.id;

                                // Prevent Duplicates visually
                                let isDuplicate = false;
                                if (entityType === "type")
                                    isDuplicate = this.state
                                        .getTypes()
                                        .some(
                                            (t) =>
                                                t.name.toLowerCase() ===
                                                    newText.toLowerCase() &&
                                                t.id !== id,
                                        );
                                if (entityType === "project")
                                    isDuplicate = this.state
                                        .getProjects()
                                        .some(
                                            (p) =>
                                                p.name.toLowerCase() ===
                                                    newText.toLowerCase() &&
                                                p.id !== id,
                                        );

                                if (isDuplicate) {
                                    e.target.innerText = original;
                                    Toast.show(
                                        `"${newText}" already exists!`,
                                        "error",
                                    );
                                    return;
                                }

                                if (entityType === "type")
                                    globalBus.emit("hierarchy:updateType", {
                                        id,
                                        name: newText,
                                        element: e.target,
                                    });
                                else if (entityType === "project")
                                    globalBus.emit("hierarchy:updateProject", {
                                        id,
                                        name: newText,
                                        element: e.target,
                                    });
                            }
                        },
                        true,
                    );

                    hierarchyList.addEventListener("keydown", (e) => {
                        if (
                            e.key === "Enter" &&
                            e.target.hasAttribute("contenteditable")
                        ) {
                            e.preventDefault();
                            e.target.blur();
                        }
                    });

                    hierarchyList.addEventListener("change", (e) => {
                        if (e.target.dataset.entity === "project-color") {
                            globalBus.emit("hierarchy:updateProjectColor", {
                                id: e.target.dataset.id,
                                color: e.target.value,
                            });
                        }
                    });

                    // Native Drag and Drop Listeners
                    hierarchyList.addEventListener("dragstart", (e) => {
                        const target = e.target.closest("[data-drag-id]");
                        if (!target) return;
                        this.dragState.type = target.dataset.dragEntity;
                        this.dragState.sourceId = target.dataset.dragId;
                        e.dataTransfer.effectAllowed = "move";
                        target.style.opacity = "0.5";
                    });

                    hierarchyList.addEventListener("dragover", (e) => {
                        e.preventDefault(); // allow drop
                        const target = e.target.closest("[data-drop-zone]");
                        if (!target) return;

                        // Only highlight valid drop zones
                        if (
                            this.dragState.type === "type" &&
                            target.dataset.dropEntity === "type"
                        ) {
                            target.classList.add("drag-over-top");
                        } else if (
                            this.dragState.type === "project" &&
                            target.dataset.dropEntity === "project"
                        ) {
                            target.classList.add("drag-over-top");
                        } else if (
                            this.dragState.type === "project" &&
                            target.dataset.dropEntity === "type-container"
                        ) {
                            target.classList.add("drag-over");
                        }
                    });

                    hierarchyList.addEventListener("dragleave", (e) => {
                        const target = e.target.closest("[data-drop-zone]");
                        if (target) {
                            target.classList.remove(
                                "drag-over-top",
                                "drag-over",
                            );
                        }
                    });

                    hierarchyList.addEventListener("dragend", (e) => {
                        e.target.style.opacity = "1";
                        document
                            .querySelectorAll(".drag-over, .drag-over-top")
                            .forEach((el) =>
                                el.classList.remove(
                                    "drag-over",
                                    "drag-over-top",
                                ),
                            );
                        this.dragState = { type: null, sourceId: null };
                    });

                    hierarchyList.addEventListener("drop", (e) => {
                        e.preventDefault();
                        document
                            .querySelectorAll(".drag-over, .drag-over-top")
                            .forEach((el) =>
                                el.classList.remove(
                                    "drag-over",
                                    "drag-over-top",
                                ),
                            );
                        const target = e.target.closest("[data-drop-zone]");
                        if (!target || !this.dragState.sourceId) return;

                        if (
                            this.dragState.type === "type" &&
                            target.dataset.dropEntity === "type"
                        ) {
                            globalBus.emit("hierarchy:reorderType", {
                                sourceId: this.dragState.sourceId,
                                targetId: target.dataset.dragId,
                            });
                        } else if (this.dragState.type === "project") {
                            if (target.dataset.dropEntity === "project") {
                                globalBus.emit("hierarchy:reorderProject", {
                                    sourceId: this.dragState.sourceId,
                                    targetId: target.dataset.dragId,
                                });
                            } else if (
                                target.dataset.dropEntity === "type-container"
                            ) {
                                globalBus.emit("hierarchy:moveProjectToType", {
                                    projectId: this.dragState.sourceId,
                                    typeId: target.dataset.dropId,
                                });
                            }
                        }
                    });

                    document.addEventListener("click", () =>
                        this.closeAllMenus(),
                    );
                    document.addEventListener("keydown", (e) => {
                        if (e.key === "Escape") {
                            this.closeAllMenus();
                            app.closeSettingsModal();
                            app.cancelConfirm();
                        }
                    });
                }

                listenToEvents() {
                    globalBus.on("block:updated", ({ row, col, project }) => {
                        const blockEl = this.blockNodes[`${row}-${col}`];
                        if (!blockEl) return;
                        if (project) {
                            blockEl.style.backgroundColor = project.color;
                            blockEl.classList.add("filled");
                            blockEl.title = project.name;
                        } else {
                            blockEl.style.backgroundColor = "";
                            blockEl.classList.remove("filled");
                            blockEl.title = "Empty (Click to set)";
                        }
                    });

                    globalBus.on("view:refresh", () => this.refreshAllViews());
                    globalBus.on("schedule:refreshed", () =>
                        this.renderSchedule(
                            this.state.getCurrentSchedule(),
                            this.state.getHours(),
                            this.state.getProjects(),
                        ),
                    );
                    globalBus.on("analytics:refreshed", () =>
                        this.renderAnalytics(
                            this.state.getDailyAnalytics(),
                            this.state.getTypes(),
                        ),
                    );
                    globalBus.on("hierarchy:refreshed", () => {
                        this.renderSettings();
                        this.renderSidebarProjects(
                            this.state.getProjects(),
                            this.state.getTypes(),
                        );
                        this.closeAllMenus(); // Avoid stale state
                    });
                }

                closeAllMenus() {
                    document
                        .querySelectorAll(".choice-menu")
                        .forEach((m) => m.remove());
                }

                refreshAllViews() {
                    const date = this.state.getCurrentDate();
                    this.renderHeader(date);
                    this.renderCalendar();
                    this.renderSidebarProjects(
                        this.state.getProjects(),
                        this.state.getTypes(),
                    );
                    this.renderSchedule(
                        this.state.getCurrentSchedule(),
                        this.state.getHours(),
                        this.state.getProjects(),
                    );
                    this.renderAnalytics(
                        this.state.getDailyAnalytics(),
                        this.state.getTypes(),
                    );
                }

                renderHeader(dateStr) {
                    const [year, month, day] = dateStr.split("-");
                    const dateObj = new Date(year, month - 1, day);
                    const parts = dateObj
                        .toLocaleDateString("en-US", {
                            weekday: "long",
                            year: "numeric",
                            month: "long",
                            day: "numeric",
                        })
                        .split(", ");
                    document.getElementById("display-day").innerText = parts[0];
                    document.getElementById("display-date").innerText =
                        parts[1] + ", " + parts[2];
                }

                renderCalendar() {
                    const grid = document.getElementById("calendar-grid");
                    const monthLabel = document.getElementById(
                        "calendar-month-label",
                    );
                    grid.innerHTML = "";

                    const year = this.state.viewYear;
                    const month = this.state.viewMonth;

                    monthLabel.innerText = new Date(
                        year,
                        month,
                        1,
                    ).toLocaleString("default", {
                        month: "long",
                        year: "numeric",
                    });
                    const firstDay = new Date(year, month, 1).getDay();
                    const daysInMonth = new Date(year, month + 1, 0).getDate();

                    for (let i = 0; i < firstDay; i++)
                        grid.innerHTML += `<div class="py-2"></div>`;
                    for (let day = 1; day <= daysInMonth; day++) {
                        const loopDateStr = `${year}-${String(month + 1).padStart(2, "0")}-${String(day).padStart(2, "0")}`;
                        const isActive =
                            loopDateStr === this.state.getCurrentDate();
                        grid.innerHTML += `
                        <div onclick="app.selectDate('${loopDateStr}')"
                             class="py-1 cursor-pointer hover:bg-indigo-50 rounded-md transition ${isActive ? "active-date shadow-md" : "text-gray-700"}">
                            ${day}
                        </div>`;
                    }
                }

                renderSidebarProjects(projects, types) {
                    const list = document.getElementById("project-list");
                    list.innerHTML = "";
                    types.forEach((t) => {
                        const typeProjects = projects.filter(
                            (p) => p.typeId === t.id,
                        );
                        if (typeProjects.length === 0) return;

                        list.innerHTML += `<div class="text-xs font-bold text-gray-400 uppercase tracking-wider mt-4 mb-2 pl-1">${t.name}</div>`;
                        typeProjects.forEach((p) => {
                            list.innerHTML += `
                            <div class="flex items-center gap-3 p-2 rounded-lg bg-white border border-gray-100 shadow-sm">
                                <div class="w-4 h-4 rounded-full" style="background-color: ${p.color};"></div>
                                <span class="text-sm font-semibold text-gray-800 leading-tight">${p.name}</span>
                            </div>`;
                        });
                    });
                }

                renderAnalytics(typeCounts, types) {
                    const bar = document.getElementById("analytics-bar");
                    bar.innerHTML = "";
                    let totalAssigned = 0;
                    types.forEach((t) => {
                        const bCount = typeCounts[t.id] || 0;
                        if (bCount > 0) {
                            const minutes = bCount * 10;
                            const hoursStr =
                                minutes >= 60
                                    ? `${(minutes / 60).toFixed(1)}h`
                                    : `${minutes}m`;
                            bar.innerHTML += `
                            <div class="flex items-center gap-2 px-3 py-1.5 rounded-full bg-gray-50 border border-gray-200 shadow-sm">
                                <span class="text-xs font-semibold text-gray-700">${t.name}: <span class="text-gray-500">${hoursStr}</span></span>
                            </div>`;
                            totalAssigned++;
                        }
                    });
                    if (totalAssigned === 0)
                        bar.innerHTML = `<span class="text-sm text-gray-400 italic">No blocks assigned.</span>`;
                }

                renderSchedule(scheduleObj, hours, projects) {
                    const container = document.getElementById("schedule-grid");
                    container.innerHTML = "";
                    this.blockNodes = {};
                    const blocks = scheduleObj.blocks;

                    hours.forEach((time, rowIndex) => {
                        const rowEl = document.createElement("div");
                        rowEl.className = "flex items-center gap-8 group";
                        const timeLabel = document.createElement("div");
                        timeLabel.className =
                            "w-16 text-xs font-bold text-gray-400 uppercase tracking-wider text-right";
                        timeLabel.textContent = time;

                        const blocksContainer = document.createElement("div");
                        blocksContainer.className =
                            "flex gap-3 md:gap-4 flex-wrap bg-gray-50 p-2 rounded-2xl group-hover:bg-gray-100 transition";

                        for (let colIndex = 0; colIndex < 6; colIndex++) {
                            const block = document.createElement("button");
                            block.className =
                                "schedule-block circle-btn shadow-sm";
                            block.dataset.row = rowIndex;
                            block.dataset.col = colIndex;

                            const blockProjectId =
                                blocks[`${rowIndex}-${colIndex}`];
                            const project = projects.find(
                                (p) => p.id === blockProjectId,
                            );

                            if (project) {
                                block.style.backgroundColor = project.color;
                                block.classList.add("filled");
                                block.title = project.name;
                            } else {
                                block.title = "Empty (Click to set)";
                            }
                            this.blockNodes[`${rowIndex}-${colIndex}`] = block;
                            blocksContainer.appendChild(block);
                        }
                        rowEl.appendChild(timeLabel);
                        rowEl.appendChild(blocksContainer);
                        container.appendChild(rowEl);
                    });
                }

                renderChoiceMenu(blockElement, rowIndex, colIndex) {
                    const menu = document.createElement("div");
                    menu.className = "choice-menu";
                    this.state.getTypes().forEach((t) => {
                        const typeProjs = this.state.getProjectsByType(t.id);
                        if (typeProjs.length === 0) return;

                        const header = document.createElement("div");
                        header.className =
                            "text-[10px] font-bold text-gray-400 uppercase tracking-wider px-2 py-1 mt-1";
                        header.innerText = t.name;
                        menu.appendChild(header);

                        typeProjs.forEach((p) => {
                            const btn = document.createElement("button");
                            btn.className =
                                "flex items-center justify-between p-2 w-full hover:bg-gray-100 rounded-lg transition text-left group/btn";
                            btn.innerHTML = `
                            <div class="flex items-center gap-3 overflow-hidden">
                                <div class="w-4 h-4 rounded-full shadow-sm flex-shrink-0" style="background-color: ${p.color}"></div>
                                <span class="text-xs font-bold text-gray-700 truncate">${p.name}</span>
                            </div>
                            <div class="opacity-0 group-hover/btn:opacity-100 bg-indigo-50 text-indigo-700 font-bold px-2 py-1 rounded border border-indigo-100 text-[10px] fill-hour-btn shadow-sm transition" title="Fill entire hour">FILL HR</div>
                            `;
                            btn.onclick = (event) => {
                                event.stopPropagation();
                                if (
                                    event.target.classList.contains(
                                        "fill-hour-btn",
                                    )
                                ) {
                                    globalBus.emit("schedule:fillRow", {
                                        row: rowIndex,
                                        projectId: p.id,
                                    });
                                } else {
                                    globalBus.emit("block:update", {
                                        row: rowIndex,
                                        col: colIndex,
                                        projectId: p.id,
                                    });
                                }
                                this.closeAllMenus();
                            };
                            menu.appendChild(btn);
                        });
                    });

                    const reset = document.createElement("button");
                    reset.className =
                        "mt-2 p-2 w-full text-left text-xs font-bold text-red-500 hover:bg-red-50 rounded-lg transition border-t border-gray-100";
                    reset.innerText = "Clear Block";
                    reset.onclick = (event) => {
                        event.stopPropagation();
                        globalBus.emit("block:update", {
                            row: rowIndex,
                            col: colIndex,
                            projectId: null,
                        });
                        this.closeAllMenus();
                    };

                    menu.appendChild(reset);
                    document.body.appendChild(menu); // Append to body to avoid clipping

                    // Dynamic Viewport Position
                    const rect = blockElement.getBoundingClientRect();
                    const menuHeight = menu.offsetHeight;
                    let top = rect.bottom + window.scrollY + 8;
                    let left =
                        rect.left + window.scrollX + rect.width / 2 - 100; // center

                    if (
                        top + menuHeight >
                        window.innerHeight + window.scrollY
                    ) {
                        top = rect.top + window.scrollY - menuHeight - 8;
                    }
                    if (left < 10) left = 10;
                    if (left + 200 > window.innerWidth)
                        left = window.innerWidth - 210;

                    menu.style.top = `${top}px`;
                    menu.style.left = `${left}px`;
                }

                renderSettings() {
                    const list = document.getElementById("hierarchy-list");
                    list.innerHTML = "";

                    const types = this.state.getTypes();
                    const projects = this.state.getProjects();

                    types.forEach((t) => {
                        const typeProjs = projects.filter(
                            (p) => p.typeId === t.id,
                        );

                        const typeBlock = document.createElement("div");
                        typeBlock.className = "mb-8 pb-4";
                        typeBlock.draggable = true;
                        typeBlock.dataset.dragEntity = "type";
                        typeBlock.dataset.dragId = t.id;
                        typeBlock.dataset.dropZone = "true";
                        typeBlock.dataset.dropEntity = "type";

                        typeBlock.innerHTML = `
                            <div class="flex items-center justify-between mb-3 group/type border-b border-gray-200 pb-2">
                                <div class="flex items-center gap-2">
                                    <svg class="grab-handle w-5 h-5 text-gray-400" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="9" cy="12" r="1"/><circle cx="9" cy="5" r="1"/><circle cx="9" cy="19" r="1"/><circle cx="15" cy="12" r="1"/><circle cx="15" cy="5" r="1"/><circle cx="15" cy="19" r="1"/></svg>
                                    <h4 class="text-sm font-black text-gray-900 uppercase tracking-widest" contenteditable="true" data-entity="type" data-id="${t.id}" title="Click to edit">${t.name}</h4>
                                    <span class="text-xs text-gray-400 bg-gray-100 px-2 py-0.5 rounded-full">${typeProjs.length}</span>
                                </div>
                                <div class="flex gap-2 opacity-0 group-hover/type:opacity-100 transition">
                                    <button onclick="app.addProjectToType('${t.id}')" class="text-xs font-bold text-indigo-600 hover:bg-indigo-50 px-2 py-1 rounded border border-indigo-100">Add Project</button>
                                    <button onclick="app.requestRemoveType('${t.id}')" class="text-xs font-bold text-red-500 hover:bg-red-50 px-2 py-1 rounded">Delete</button>
                                </div>
                            </div>
                            <div class="flex flex-col gap-2 pl-6 pb-4" id="proj-container-${t.id}" data-drop-zone="true" data-drop-entity="type-container" data-drop-id="${t.id}"></div>
                        `;
                        list.appendChild(typeBlock);

                        const projContainer = document.getElementById(
                            `proj-container-${t.id}`,
                        );
                        if (typeProjs.length === 0) {
                            projContainer.innerHTML = `<div class="text-xs text-gray-400 italic py-3 pointer-events-none">Empty category. Drop projects here or click 'Add'.</div>`;
                        } else {
                            typeProjs.forEach((p) => {
                                const pCard = document.createElement("div");
                                pCard.className =
                                    "flex items-center justify-between p-3 bg-white border border-gray-100 rounded-xl shadow-sm hover:shadow-md transition group/proj";
                                pCard.draggable = true;
                                pCard.dataset.dragEntity = "project";
                                pCard.dataset.dragId = p.id;
                                pCard.dataset.dropZone = "true";
                                pCard.dataset.dropEntity = "project";

                                pCard.innerHTML = `
                                    <div class="flex items-center gap-3 flex-1">
                                        <svg class="grab-handle w-5 h-5 text-gray-300" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><line x1="8" y1="6" x2="16" y2="6"/><line x1="8" y1="12" x2="16" y2="12"/><line x1="8" y1="18" x2="16" y2="18"/></svg>
                                        <input type="color" data-entity="project-color" data-id="${p.id}" value="${p.color}" class="w-6 h-6 rounded-md cursor-pointer border-0 p-0 shadow-inner shrink-0 bg-transparent"/>
                                        <span class="text-sm font-semibold text-gray-800" contenteditable="true" data-entity="project" data-id="${p.id}" title="Click to edit">${p.name}</span>
                                    </div>
                                    <button onclick="app.removeProject('${p.id}')" class="opacity-0 group-hover/proj:opacity-100 text-red-400 hover:text-red-600 font-bold text-xs transition px-2 py-1">Remove</button>
                                `;
                                projContainer.appendChild(pCard);
                            });
                        }
                    });
                }

                toggleModal(modalId, show) {
                    const modal = document.getElementById(modalId);
                    const bg = modal;
                    const content = modal.querySelector(".modal-content");

                    if (show) {
                        modal.classList.remove("hidden");
                        bg.classList.remove("closing");
                        content.classList.remove("closing");
                    } else {
                        bg.classList.add("closing");
                        content.classList.add("closing");
                        setTimeout(() => {
                            modal.classList.add("hidden");
                            bg.classList.remove("closing");
                            content.classList.remove("closing");
                        }, 200); // match animation duration
                    }
                }

                showConfirm(typeId) {
                    const t = this.state
                        .getTypes()
                        .find((x) => x.id === typeId);
                    const projs = this.state.getProjectsByType(typeId);
                    document.getElementById("confirm-count").innerText =
                        projs.length;
                    const list = document.getElementById(
                        "confirm-project-list",
                    );
                    list.innerHTML = projs
                        .map((p) => `<li>${p.name}</li>`)
                        .join("");

                    const btn = document.getElementById("confirm-action-btn");
                    btn.onclick = () => {
                        app.executeRemoveType(typeId);
                        this.toggleModal("confirm-modal", false);
                    };
                    this.toggleModal("confirm-modal", true);
                }
            }

            // -----------------------------------------------------------------------------
            // 3. APP CONTROLLER
            // -----------------------------------------------------------------------------
            class AppController {
                constructor() {
                    this.state = new StateManager();
                    this.ui = new UIManager(this.state);
                    this.setupLogicListeners();
                    this.state.ensureDateExists(this.state.getCurrentDate());
                    globalBus.emit("view:refresh");
                }

                setupLogicListeners() {
                    globalBus.on("block:update", ({ row, col, projectId }) => {
                        this.state.updateState((data) => {
                            const blocks =
                                data.schedules[data.currentDate].blocks;
                            if (projectId) blocks[`${row}-${col}`] = projectId;
                            else delete blocks[`${row}-${col}`];
                        });
                        const project = projectId
                            ? this.state.getProjectById(projectId)
                            : null;
                        globalBus.emit("block:updated", { row, col, project });
                        globalBus.emit("analytics:refreshed");
                    });

                    globalBus.on("schedule:fillRow", ({ row, projectId }) => {
                        this.state.updateState((data) => {
                            const blocks =
                                data.schedules[data.currentDate].blocks;
                            for (let c = 0; c < 6; c++) {
                                if (projectId)
                                    blocks[`${row}-${c}`] = projectId;
                                else delete blocks[`${row}-${c}`];
                            }
                        });
                        globalBus.emit("schedule:refreshed");
                        globalBus.emit("analytics:refreshed");
                    });

                    // Hierarchy Updates
                    globalBus.on(
                        "hierarchy:updateType",
                        ({ id, name, element }) => {
                            this.state.updateState((data) => {
                                const t = data.types.find((x) => x.id === id);
                                if (t) t.name = name;
                            });
                            element.classList.add("edit-success");
                            setTimeout(
                                () => element.classList.remove("edit-success"),
                                600,
                            );
                            Toast.show("Saved");
                            globalBus.emit("hierarchy:refreshed");
                        },
                    );

                    globalBus.on(
                        "hierarchy:updateProject",
                        ({ id, name, element }) => {
                            this.state.updateState((data) => {
                                const p = data.projects.find(
                                    (x) => x.id === id,
                                );
                                if (p) p.name = name;
                            });
                            element.classList.add("edit-success");
                            setTimeout(
                                () => element.classList.remove("edit-success"),
                                600,
                            );
                            Toast.show("Saved");
                            globalBus.emit("schedule:refreshed");
                            globalBus.emit("hierarchy:refreshed");
                        },
                    );

                    globalBus.on(
                        "hierarchy:updateProjectColor",
                        ({ id, color }) => {
                            this.state.updateState((data) => {
                                const p = data.projects.find(
                                    (x) => x.id === id,
                                );
                                if (p) p.color = color;
                            });
                            globalBus.emit("schedule:refreshed");
                            globalBus.emit("hierarchy:refreshed");
                        },
                    );

                    // Drag and drop sorting
                    globalBus.on(
                        "hierarchy:reorderType",
                        ({ sourceId, targetId }) => {
                            if (sourceId === targetId) return;
                            this.state.updateState((data) => {
                                const arr = data.types;
                                const fromIdx = arr.findIndex(
                                    (t) => t.id === sourceId,
                                );
                                const toIdx = arr.findIndex(
                                    (t) => t.id === targetId,
                                );
                                const [item] = arr.splice(fromIdx, 1);
                                arr.splice(toIdx, 0, item);
                            });
                            globalBus.emit("hierarchy:refreshed");
                        },
                    );

                    globalBus.on(
                        "hierarchy:reorderProject",
                        ({ sourceId, targetId }) => {
                            if (sourceId === targetId) return;
                            this.state.updateState((data) => {
                                const arr = data.projects;
                                const fromIdx = arr.findIndex(
                                    (p) => p.id === sourceId,
                                );
                                const toIdx = arr.findIndex(
                                    (p) => p.id === targetId,
                                );
                                const targetType = arr[toIdx].typeId;

                                const [item] = arr.splice(fromIdx, 1);
                                item.typeId = targetType; // inherit type of target
                                arr.splice(toIdx, 0, item);
                            });
                            globalBus.emit("hierarchy:refreshed");
                        },
                    );

                    globalBus.on(
                        "hierarchy:moveProjectToType",
                        ({ projectId, typeId }) => {
                            this.state.updateState((data) => {
                                const p = data.projects.find(
                                    (x) => x.id === projectId,
                                );
                                if (p) p.typeId = typeId;
                            });
                            globalBus.emit("hierarchy:refreshed");
                        },
                    );
                }

                // Calendar Nav
                prevMonth() {
                    let m = this.state.viewMonth - 1;
                    let y = this.state.viewYear;
                    if (m < 0) {
                        m = 11;
                        y--;
                    }
                    this.state.viewMonth = m;
                    this.state.viewYear = y;
                    this.ui.renderCalendar();
                }
                nextMonth() {
                    let m = this.state.viewMonth + 1;
                    let y = this.state.viewYear;
                    if (m > 11) {
                        m = 0;
                        y++;
                    }
                    this.state.viewMonth = m;
                    this.state.viewYear = y;
                    this.ui.renderCalendar();
                }

                goToToday() {
                    const today = new Date();
                    const offset = today.getTimezoneOffset() * 60000;
                    this.state.viewMonth = today.getMonth();
                    this.state.viewYear = today.getFullYear();
                    this.selectDate(
                        new Date(today - offset).toISOString().split("T")[0],
                    );
                }

                selectDate(dateStr) {
                    this.state.updateState((data) => {
                        data.currentDate = dateStr;
                    });
                    this.state.ensureDateExists(dateStr);
                    globalBus.emit("view:refresh");
                }

                openSettingsModal() {
                    this.ui.renderSettings();
                    this.ui.toggleModal("settings-modal", true);
                }

                closeSettingsModal() {
                    this.ui.toggleModal("settings-modal", false);
                }

                addType() {
                    const input = document.getElementById("new-type-name");
                    const name = input.value.trim();
                    if (!name) return;
                    if (
                        this.state
                            .getTypes()
                            .some(
                                (t) =>
                                    t.name.toLowerCase() === name.toLowerCase(),
                            )
                    ) {
                        Toast.show(
                            `Category "${name}" already exists!`,
                            "error",
                        );
                        return;
                    }

                    this.state.updateState((data) => {
                        data.types.push({ id: "t_" + Date.now(), name });
                    });
                    input.value = "";
                    Toast.show(`Added ${name}`);
                    globalBus.emit("hierarchy:refreshed");
                }

                requestRemoveType(id) {
                    const projectsLinked = this.state.getProjectsByType(id);
                    if (projectsLinked.length > 0) {
                        this.ui.showConfirm(id);
                    } else {
                        this.executeRemoveType(id);
                    }
                }

                cancelConfirm() {
                    this.ui.toggleModal("confirm-modal", false);
                }

                executeRemoveType(id) {
                    this.state.updateState((data) => {
                        data.types = data.types.filter((t) => t.id !== id);
                        const toDeleteIds = this.state
                            .getProjectsByType(id)
                            .map((p) => p.id);
                        data.projects = data.projects.filter(
                            (p) => !toDeleteIds.includes(p.id),
                        );
                        for (let date in data.schedules) {
                            const blocks = data.schedules[date].blocks;
                            for (let key in blocks)
                                if (toDeleteIds.includes(blocks[key]))
                                    delete blocks[key];
                        }
                    });
                    Toast.show("Category deleted");
                    globalBus.emit("view:refresh");
                    this.ui.renderSettings();
                }

                addProjectToType(typeId) {
                    // Generate unique default name
                    const baseName = "New Project";
                    let newName = baseName;
                    let counter = 1;
                    while (
                        this.state.getProjects().some((p) => p.name === newName)
                    ) {
                        newName = `${baseName} ${counter}`;
                        counter++;
                    }

                    this.state.updateState((data) => {
                        data.projects.push({
                            id: "p_" + Date.now(),
                            name: newName,
                            color: "#94a3b8",
                            typeId: typeId,
                        });
                    });
                    Toast.show("Added new project");
                    globalBus.emit("hierarchy:refreshed");
                }

                removeProject(id) {
                    this.state.updateState((data) => {
                        data.projects = data.projects.filter(
                            (p) => p.id !== id,
                        );
                        for (let date in data.schedules) {
                            const blocks = data.schedules[date].blocks;
                            for (let key in blocks)
                                if (blocks[key] === id) delete blocks[key];
                        }
                    });
                    Toast.show("Project removed");
                    globalBus.emit("view:refresh");
                    this.ui.renderSettings();
                }
            }

            window.app = new AppController();
        </script>
    </body>
</html>
