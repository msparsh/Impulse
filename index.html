            // --- PART 3: COMMAND PALETTE UI & MATCHER ---
            class CommandPalette {
                constructor(app, state) {
                    this.app = app;
                    this.state = state;
                    this.registry = new CommandRegistry(app, state);
                    this.isOpen = false;
                    this.filteredCommands = [];
                    this.selectedIndex = 0;
                    this.setupDOM();
                    this.setupListeners();
                }

                setupDOM() {
                    this.wrapper = document.createElement("div");
                    this.wrapper.className = "cmd-palette-wrapper hidden";
                    this.wrapper.innerHTML = `
                        <div class="cmd-palette">
                            <input type="text" class="cmd-palette-input" placeholder="Type a command or search (e.g. 'dw' for Deep Work)..." autocomplete="off" spellcheck="false" />
                            <div class="cmd-palette-list"></div>
                        </div>
                    `;
                    document.body.appendChild(this.wrapper);
                    this.input =
                        this.wrapper.querySelector(".cmd-palette-input");
                    this.list = this.wrapper.querySelector(".cmd-palette-list");
                }

                setupListeners() {
                    document.addEventListener("keydown", (e) => {
                        const activeEl = document.activeElement;
                        const inInput =
                            activeEl.tagName === "INPUT" ||
                            activeEl.tagName === "TEXTAREA" ||
                            activeEl.isContentEditable;

                        if (
                            (e.key === "/" && !inInput) ||
                            (e.key === "k" && (e.ctrlKey || e.metaKey))
                        ) {
                            e.preventDefault();
                            this.toggle();
                        }

                        if (this.isOpen) {
                            if (e.key === "Escape") this.close();
                            else if (e.key === "ArrowDown") {
                                e.preventDefault();
                                this.moveSelection(1);
                            } else if (e.key === "ArrowUp") {
                                e.preventDefault();
                                this.moveSelection(-1);
                            } else if (e.key === "Enter") {
                                e.preventDefault();
                                this.executeSelected();
                            }
                        }
                    });
                    this.input.addEventListener("input", () =>
                        this.filterCommands(this.input.value),
                    );
                    this.wrapper.addEventListener("click", (e) => {
                        if (e.target === this.wrapper) this.close();
                    });
                }

                toggle() {
                    if (this.isOpen) this.close();
                    else this.open();
                }

                open() {
                    this.isOpen = true;
                    this.wrapper.classList.remove("hidden", "closing");
                    this.input.value = "";

                    // Detect Context (is a schedule block focused?)
                    let context = null;
                    const activeEl = document.activeElement;
                    if (
                        activeEl &&
                        activeEl.classList.contains("schedule-block")
                    ) {
                        context = {
                            type: "block",
                            row: parseInt(activeEl.dataset.row),
                            col: parseInt(activeEl.dataset.col),
                        };
                    }

                    this.baseCommands = this.registry.getCommands(context);

                    // Sort: Contextual commands first
                    this.baseCommands.sort((a, b) => {
                        if (a.isContext && !b.isContext) return -1;
                        if (!a.isContext && b.isContext) return 1;
                        return 0;
                    });

                    this.filterCommands("");
                    setTimeout(() => this.input.focus(), 10);
                }

                close() {
                    this.isOpen = false;
                    this.wrapper.classList.add("closing");
                    setTimeout(() => {
                        this.wrapper.classList.add("hidden");
                        this.wrapper.classList.remove("closing");
                        // Restore focus to grid if a block was active
                        const gridFocus = document.querySelector(
                            ".schedule-block.js-focus",
                        );
                        if (gridFocus) gridFocus.focus();
                    }, 100);
                }

                // --- PART 2: SMART FUZZY SEARCH ---
                smartMatch(query, targetStr) {
                    const q = query.toLowerCase().replace(/\s+/g, "");
                    const t = targetStr.toLowerCase();

                    // 1. Check exact word match or substring
                    if (t.includes(q)) return true;

                    // 2. Check acronym (e.g., "dw" matches "Deep Work")
                    const acronym = t
                        .split(/\s+/)
                        .map((w) => w[0])
                        .join("");
                    if (acronym.includes(q)) return true;

                    // 3. Sequential Fuzzy Match (chars exist in order)
                    let qIdx = 0;
                    for (let i = 0; i < t.length && qIdx < q.length; i++) {
                        if (t[i] === q[qIdx]) qIdx++;
                    }
                    return qIdx === q.length;
                }

                filterCommands(query) {
                    this.filteredCommands = [];

                    // POWER USER COMMANDS (Dynamic Generation)
                    // e.g., /goto 2026-04-15
                    if (query.toLowerCase().startsWith("goto ")) {
                        const dateStr = query.substring(5).trim();
                        if (dateStr.match(/^\d{4}-\d{2}-\d{2}$/)) {
                            this.filteredCommands.push({
                                id: "dyn-goto",
                                title: `Jump to Date: ${dateStr}`,
                                category: "Dynamic Command",
                                action: () => this.app.selectDate(dateStr),
                            });
                        }
                    }

                    if (query.trim() === "") {
                        this.filteredCommands.push(
                            ...this.baseCommands.slice(0, 15),
                        );
                    } else {
                        const matched = this.baseCommands.filter((cmd) => {
                            const searchTarget = cmd.title + " " + cmd.keywords;
                            return this.smartMatch(query, searchTarget);
                        });
                        this.filteredCommands.push(...matched.slice(0, 20));
                    }

                    this.selectedIndex = 0;
                    this.renderList();
                }

                renderList() {
                    this.list.innerHTML = "";
                    if (this.filteredCommands.length === 0) {
                        this.list.innerHTML = `<div class="p-4 text-center text-gray-500 text-sm">No commands found. Try a different keyword.</div>`;
                        return;
                    }

                    this.filteredCommands.forEach((cmd, idx) => {
                        const item = document.createElement("div");
                        item.className = `cmd-item ${idx === this.selectedIndex ? "active" : ""}`;

                        let dot = cmd.color
                            ? `<div class="w-3 h-3 rounded-full shadow-sm" style="background-color: ${cmd.color}"></div>`
                            : "";
                        let contextBadge = cmd.isContext
                            ? `<span class="cmd-context-badge">Active Block</span>`
                            : "";

                        item.innerHTML = `
                            <div class="flex items-center gap-3">
                                ${dot}
                                <div class="cmd-item-title">${cmd.title} ${contextBadge}</div>
                            </div>
                            <div class="cmd-subtext">${cmd.category}</div>
                        `;

                        item.onmouseenter = () => {
                            this.selectedIndex = idx;
                            this.updateSelectionVisuals();
                        };
                        item.onclick = () => this.executeSelected();
                        this.list.appendChild(item);
                    });
                }

                moveSelection(dir) {
                    this.selectedIndex += dir;
                    if (this.selectedIndex < 0)
                        this.selectedIndex = this.filteredCommands.length - 1;
                    if (this.selectedIndex >= this.filteredCommands.length)
                        this.selectedIndex = 0;
                    this.updateSelectionVisuals();
                    const activeEl = this.list.children[this.selectedIndex];
                    if (activeEl) activeEl.scrollIntoView({ block: "nearest" });
                }

                updateSelectionVisuals() {
                    Array.from(this.list.children).forEach((el, idx) => {
                        if (idx === this.selectedIndex)
                            el.classList.add("active");
                        else el.classList.remove("active");
                    });
                }

                executeSelected() {
                    const cmd = this.filteredCommands[this.selectedIndex];
                    if (cmd) {
                        cmd.action();
                        this.close();
                    }
                }
            }

            class UIManager {
                constructor(state) {
                    this.state = state;
                    this.blockNodes = {};
                    this.dragState = { type: null, sourceId: null };
                    this.setupDelegation();
                    this.setupKeyboardNav();
                    this.listenToEvents();
                }

                setupDelegation() {
                    const grid = document.getElementById("schedule-grid");
                    const hierarchyList =
                        document.getElementById("hierarchy-list");
                    let isPainting = false;

                    grid.addEventListener("mousedown", (e) => {
                        if (!this.state.paintProjectId) return;
                        const block = e.target.closest(".schedule-block");
                        if (block) {
                            isPainting = true;
                            document.body.classList.add("select-none");
                            this.paintBlock(block);
                        }
                    });
                    grid.addEventListener("mouseover", (e) => {
                        if (isPainting && this.state.paintProjectId) {
                            const block = e.target.closest(".schedule-block");
                            if (block) this.paintBlock(block);
                        }
                    });
                    document.addEventListener("mouseup", () => {
                        isPainting = false;
                        document.body.classList.remove("select-none");
                    });

                    grid.addEventListener("click", (e) => {
                        if (this.state.paintProjectId) return;
                        const block = e.target.closest(".schedule-block");
                        if (block) {
                            e.stopPropagation();
                            this.closeAllMenus();
                            if (block.classList.contains("filled")) {
                                globalBus.emit("block:update", {
                                    row: block.dataset.row,
                                    col: block.dataset.col,
                                    projectId: null,
                                });
                                return;
                            }
                            block.classList.add("active-block");
                            this.renderChoiceMenu(
                                block,
                                block.dataset.row,
                                block.dataset.col,
                            );
                        }
                    });

                    document.addEventListener("click", (e) => {
                        if (!e.target.closest(".choice-menu"))
                            this.closeAllMenus();
                    });

                    grid.addEventListener("contextmenu", (e) => {
                        const block = e.target.closest(".schedule-block");
                        if (block) {
                            e.preventDefault();
                            globalBus.emit("block:update", {
                                row: block.dataset.row,
                                col: block.dataset.col,
                                projectId: null,
                            });
                        }
                    });

                    hierarchyList.addEventListener(
                        "focus",
                        (e) => {
                            if (e.target.hasAttribute("contenteditable"))
                                e.target.dataset.original =
                                    e.target.innerText.trim();
                        },
                        true,
                    );
                    hierarchyList.addEventListener(
                        "blur",
                        (e) => {
                            if (e.target.hasAttribute("contenteditable")) {
                                const newText = e.target.innerText.trim();
                                const original = e.target.dataset.original;
                                if (!newText) {
                                    e.target.innerText = original;
                                    Toast.show("Name cannot be empty", "error");
                                    return;
                                }
                                if (newText === original) return;
                                const entityType = e.target.dataset.entity;
                                const id = e.target.dataset.id;
                                let isDuplicate = false;
                                if (entityType === "type")
                                    isDuplicate = this.state
                                        .getTypes()
                                        .some(
                                            (t) =>
                                                t.name.toLowerCase() ===
                                                    newText.toLowerCase() &&
                                                t.id !== id,
                                        );
                                if (entityType === "project")
                                    isDuplicate = this.state
                                        .getProjects()
                                        .some(
                                            (p) =>
                                                p.name.toLowerCase() ===
                                                    newText.toLowerCase() &&
                                                p.id !== id,
                                        );
                                if (isDuplicate) {
                                    e.target.innerText = original;
                                    Toast.show(
                                        `"${newText}" already exists!`,
                                        "error",
                                    );
                                    return;
                                }
                                if (entityType === "type")
                                    globalBus.emit("hierarchy:updateType", {
                                        id,
                                        name: newText,
                                        element: e.target,
                                    });
                                else if (entityType === "project")
                                    globalBus.emit("hierarchy:updateProject", {
                                        id,
                                        name: newText,
                                        element: e.target,
                                    });
                            }
                        },
                        true,
                    );

                    hierarchyList.addEventListener("keydown", (e) => {
                        if (
                            e.key === "Enter" &&
                            e.target.hasAttribute("contenteditable")
                        ) {
                            e.preventDefault();
                            e.target.blur();
                        }
                    });
                    hierarchyList.addEventListener("change", (e) => {
                        if (e.target.dataset.entity === "project-color")
                            globalBus.emit("hierarchy:updateProjectColor", {
                                id: e.target.dataset.id,
                                color: e.target.value,
                            });
                    });
                    hierarchyList.addEventListener("dragstart", (e) => {
                        const target = e.target.closest("[data-drag-id]");
                        if (!target) return;
                        this.dragState.type = target.dataset.dragEntity;
                        this.dragState.sourceId = target.dataset.dragId;
                        e.dataTransfer.effectAllowed = "move";
                        target.style.opacity = "0.5";
                        target.classList.add("dragging");
                    });
                    hierarchyList.addEventListener("dragover", (e) => {
                        e.preventDefault();
                        const target = e.target.closest("[data-drop-zone]");
                        if (!target) return;
                        if (
                            this.dragState.type === "type" &&
                            target.dataset.dropEntity === "type"
                        )
                            target.classList.add("drag-over-top");
                        else if (
                            this.dragState.type === "project" &&
                            target.dataset.dropEntity === "project"
                        )
                            target.classList.add("drag-over-top");
                        else if (
                            this.dragState.type === "project" &&
                            target.dataset.dropEntity === "type-container"
                        )
                            target.classList.add("drag-over");
                    });
                    hierarchyList.addEventListener("dragleave", (e) => {
                        const target = e.target.closest("[data-drop-zone]");
                        if (target)
                            target.classList.remove(
                                "drag-over-top",
                                "drag-over",
                            );
                    });
                    hierarchyList.addEventListener("dragend", (e) => {
                        e.target.style.opacity = "1";
                        e.target.classList.remove("dragging");
                        document
                            .querySelectorAll(".drag-over, .drag-over-top")
                            .forEach((el) =>
                                el.classList.remove(
                                    "drag-over",
                                    "drag-over-top",
                                ),
                            );
                        document
                            .querySelectorAll(".dragging")
                            .forEach((el) => el.classList.remove("dragging"));
                        this.dragState = { type: null, sourceId: null };
                    });
                    hierarchyList.addEventListener("drop", (e) => {
                        e.preventDefault();
                        document
                            .querySelectorAll(".drag-over, .drag-over-top")
                            .forEach((el) =>
                                el.classList.remove(
                                    "drag-over",
                                    "drag-over-top",
                                ),
                            );
                        document
                            .querySelectorAll(".dragging")
                            .forEach((el) => el.classList.remove("dragging"));
                        const target = e.target.closest("[data-drop-zone]");
                        if (!target || !this.dragState.sourceId) return;
                        if (
                            this.dragState.type === "type" &&
                            target.dataset.dropEntity === "type"
                        ) {
                            globalBus.emit("hierarchy:reorderType", {
                                sourceId: this.dragState.sourceId,
                                targetId: target.dataset.dragId,
                            });
                        } else if (this.dragState.type === "project") {
                            if (target.dataset.dropEntity === "project")
                                globalBus.emit("hierarchy:reorderProject", {
                                    sourceId: this.dragState.sourceId,
                                    targetId: target.dataset.dragId,
                                });
                            else if (
                                target.dataset.dropEntity === "type-container"
                            )
                                globalBus.emit("hierarchy:moveProjectToType", {
                                    projectId: this.dragState.sourceId,
                                    typeId: target.dataset.dropId,
                                });
                        }
                    });

                    document.addEventListener("keydown", (e) => {
                        if (e.key === "Escape") {
                            this.closeAllMenus();
                            app.closeSettingsModal();
                            app.cancelConfirm();
                            if (this.state.paintProjectId) {
                                this.state.paintProjectId = null;
                                globalBus.emit("hierarchy:refreshed");
                                Toast.show("Exited Paint Mode");
                            }
                        }
                    });
                }

                setupKeyboardNav() {
                    const grid = document.getElementById("schedule-grid");

                    // Track custom focus for returning from command palette
                    grid.addEventListener("focusin", (e) => {
                        if (e.target.classList.contains("schedule-block")) {
                            document
                                .querySelectorAll(".js-focus")
                                .forEach((el) =>
                                    el.classList.remove("js-focus"),
                                );
                            e.target.classList.add("js-focus");
                        }
                    });

                    grid.addEventListener("keydown", (e) => {
                        const block = e.target.closest(".schedule-block");
                        if (!block) return;
                        const r = parseInt(block.dataset.row);
                        const c = parseInt(block.dataset.col);
                        let nextR = r;
                        let nextC = c;
                        if (e.key === "ArrowRight") nextC++;
                        else if (e.key === "ArrowLeft") nextC--;
                        else if (e.key === "ArrowDown") nextR++;
                        else if (e.key === "ArrowUp") nextR--;
                        else if (e.key === "Enter" || e.key === " ") {
                            e.preventDefault();
                            block.click();
                            return;
                        } else return;

                        if (nextC > 5) {
                            nextC = 0;
                            nextR++;
                        }
                        if (nextC < 0) {
                            nextC = 5;
                            nextR--;
                        }
                        if (nextR < 0 || nextR > 16) return;

                        const nextBlock = this.blockNodes[`${nextR}-${nextC}`];
                        if (nextBlock) {
                            e.preventDefault();
                            nextBlock.focus();
                        }
                    });
                }

                paintBlock(block) {
                    const row = block.dataset.row;
                    const col = block.dataset.col;
                    const currentProjId =
                        this.state.getCurrentSchedule()?.blocks[
                            `${row}-${col}`
                        ];
                    if (currentProjId !== this.state.paintProjectId)
                        globalBus.emit("block:update", {
                            row,
                            col,
                            projectId: this.state.paintProjectId,
                        });
                }

                listenToEvents() {
                    globalBus.on("block:updated", ({ row, col, project }) => {
                        const blockEl = this.blockNodes[`${row}-${col}`];
                        if (!blockEl) return;
                        if (project) {
                            blockEl.style.backgroundColor = project.color;
                            blockEl.classList.add("filled");
                            blockEl.title = project.name;
                            blockEl.classList.remove("pulse-fill");
                            void blockEl.offsetWidth;
                            blockEl.classList.add("pulse-fill");
                        } else {
                            blockEl.style.backgroundColor = "";
                            blockEl.classList.remove("filled", "pulse-fill");
                            blockEl.title = "Empty (Click to set)";
                        }
                    });
                    globalBus.on("view:refresh", () => this.refreshAllViews());
                    globalBus.on("schedule:refreshed", () =>
                        this.renderSchedule(
                            this.state.getCurrentSchedule(),
                            this.state.getHours(),
                            this.state.getProjects(),
                        ),
                    );
                    globalBus.on("analytics:refreshed", () =>
                        this.renderAnalytics(
                            this.state.getDailyAnalytics(),
                            this.state.getTypes(),
                        ),
                    );
                    globalBus.on("hierarchy:refreshed", () => {
                        this.renderSettings();
                        this.renderSidebarProjects(
                            this.state.getProjects(),
                            this.state.getTypes(),
                        );
                        this.closeAllMenus();
                    });
                }

                closeAllMenus() {
                    document
                        .querySelectorAll(".choice-menu")
                        .forEach((m) => m.remove());
                    document
                        .querySelectorAll(".active-block")
                        .forEach((b) => b.classList.remove("active-block"));
                }

                refreshAllViews() {
                    const date = this.state.getCurrentDate();
                    this.renderHeader(date);
                    this.renderCalendar();
                    this.renderSidebarProjects(
                        this.state.getProjects(),
                        this.state.getTypes(),
                    );
                    this.renderSchedule(
                        this.state.getCurrentSchedule(),
                        this.state.getHours(),
                        this.state.getProjects(),
                    );
                    this.renderAnalytics(
                        this.state.getDailyAnalytics(),
                        this.state.getTypes(),
                    );
                }

                renderHeader(dateStr) {
                    const [year, month, day] = dateStr.split("-");
                    const dateObj = new Date(year, month - 1, day);
                    const parts = dateObj
                        .toLocaleDateString("en-US", {
                            weekday: "long",
                            year: "numeric",
                            month: "long",
                            day: "numeric",
                        })
                        .split(", ");
                    document.getElementById("display-day").innerText = parts[0];
                    document.getElementById("display-date").innerText =
                        parts[1] + ", " + parts[2];
                }

                renderCalendar() {
                    const grid = document.getElementById("calendar-grid");
                    const monthLabel = document.getElementById(
                        "calendar-month-label",
                    );
                    grid.innerHTML = "";
                    const year = this.state.viewYear;
                    const month = this.state.viewMonth;
                    monthLabel.innerText = new Date(
                        year,
                        month,
                        1,
                    ).toLocaleString("default", {
                        month: "long",
                        year: "numeric",
                    });
                    const firstDay = new Date(year, month, 1).getDay();
                    const daysInMonth = new Date(year, month + 1, 0).getDate();
                    for (let i = 0; i < firstDay; i++)
                        grid.innerHTML += `<div class="py-2"></div>`;
                    for (let day = 1; day <= daysInMonth; day++) {
                        const loopDateStr = `${year}-${String(month + 1).padStart(2, "0")}-${String(day).padStart(2, "0")}`;
                        const isActive =
                            loopDateStr === this.state.getCurrentDate();
                        grid.innerHTML += `<div onclick="app.selectDate('${loopDateStr}')" class="py-1 cursor-pointer hover:bg-indigo-50 rounded-md transition ${isActive ? "active-date shadow-md" : "text-gray-700"}">${day}</div>`;
                    }
                }

                renderSidebarProjects(projects, types) {
                    const list = document.getElementById("project-list");
                    list.innerHTML = "";
                    types.forEach((t) => {
                        const typeProjects = projects.filter(
                            (p) => p.typeId === t.id,
                        );
                        if (typeProjects.length === 0) return;
                        const header = document.createElement("div");
                        header.className =
                            "text-xs font-bold text-gray-400 uppercase tracking-wider mt-4 mb-2 pl-1";
                        header.textContent = t.name;
                        list.appendChild(header);
                        typeProjects.forEach((p) => {
                            const isActivePaint =
                                this.state.paintProjectId === p.id;
                            const badgeHTML = isActivePaint
                                ? `<span class="paint-active-indicator">Paint</span>`
                                : "";
                            const pCard = document.createElement("div");
                            pCard.className = `flex items-center gap-3 p-2 rounded-lg bg-white border ${isActivePaint ? "paint-active" : "border-gray-100"} shadow-sm cursor-pointer hover:shadow-md transition`;
                            pCard.innerHTML = `<div class="w-4 h-4 rounded-full flex-shrink-0" style="background-color: ${p.color};"></div><span class="text-sm font-semibold text-gray-800 truncate">${p.name}</span>${badgeHTML}`;
                            pCard.onclick = () => app.togglePaintMode(p.id);
                            list.appendChild(pCard);
                        });
                    });
                }

                renderAnalytics(typeCounts, types) {
                    const bar = document.getElementById("analytics-bar");
                    bar.innerHTML = "";
                    let totalAssigned = 0;
                    types.forEach((t) => {
                        const bCount = typeCounts[t.id] || 0;
                        if (bCount > 0) {
                            const minutes = bCount * 10;
                            const hoursStr =
                                minutes >= 60
                                    ? `${(minutes / 60).toFixed(1)}h`
                                    : `${minutes}m`;
                            bar.innerHTML += `<div class="flex items-center gap-2 px-3 py-1.5 rounded-full bg-gray-50 border border-gray-200 shadow-sm"><span class="text-xs font-semibold text-gray-700">${t.name}: <span class="text-gray-500">${hoursStr}</span></span></div>`;
                            totalAssigned++;
                        }
                    });
                    if (totalAssigned === 0)
                        bar.innerHTML = `<span class="text-sm text-gray-400 font-medium italic">Press '/' to explore commands or click to schedule.</span>`;
                }

                renderSchedule(scheduleObj, hours, projects) {
                    const container = document.getElementById("schedule-grid");
                    container.innerHTML = "";
                    this.blockNodes = {};
                    const blocks = scheduleObj.blocks;
                    const todayStr = new Date(
                        new Date().getTime() -
                            new Date().getTimezoneOffset() * 60000,
                    )
                        .toISOString()
                        .split("T")[0];
                    const isToday = this.state.getCurrentDate() === todayStr;
                    const now = new Date();
                    let currentHour = now.getHours();
                    let currentHourStr =
                        currentHour === 0
                            ? "12 AM"
                            : currentHour > 12
                              ? `${currentHour - 12} PM`
                              : currentHour === 12
                                ? "12 PM"
                                : `${currentHour} AM`;

                    hours.forEach((time, rowIndex) => {
                        const rowEl = document.createElement("div");
                        rowEl.className =
                            "flex items-center gap-4 md:gap-8 group";
                        const timeLabel = document.createElement("div");
                        timeLabel.className =
                            "w-12 md:w-16 text-[10px] md:text-xs font-bold text-gray-400 uppercase tracking-wider text-right shrink-0";
                        timeLabel.textContent = time;
                        if (isToday && time === currentHourStr)
                            timeLabel.classList.add("current-time-label");

                        const blocksContainer = document.createElement("div");
                        blocksContainer.className =
                            "flex gap-2 md:gap-3 flex-wrap bg-gray-50 p-2 rounded-2xl group-hover:bg-gray-100 transition";

                        for (let colIndex = 0; colIndex < 6; colIndex++) {
                            const block = document.createElement("button");
                            block.className =
                                "schedule-block circle-btn shadow-sm";
                            block.dataset.row = rowIndex;
                            block.dataset.col = colIndex;
                            block.tabIndex = 0;

                            const blockProjectId =
                                blocks[`${rowIndex}-${colIndex}`];
                            const project = projects.find(
                                (p) => p.id === blockProjectId,
                            );

                            if (project) {
                                block.style.backgroundColor = project.color;
                                block.classList.add("filled");
                                block.title = project.name;
                            } else {
                                block.title = "Empty (Click to set)";
                            }

                            this.blockNodes[`${rowIndex}-${colIndex}`] = block;
                            blocksContainer.appendChild(block);
                        }
                        rowEl.appendChild(timeLabel);
                        rowEl.appendChild(blocksContainer);
                        container.appendChild(rowEl);
                    });
                }

                renderChoiceMenu(blockElement, rowIndex, colIndex) {
                    const menu = document.createElement("div");
                    menu.className = "choice-menu";
                    const clearBtn = document.createElement("button");
                    clearBtn.className =
                        "flex items-center gap-2 p-2 w-full hover:bg-gray-100 rounded-lg transition text-left text-xs font-bold text-gray-500 mb-1";
                    clearBtn.innerHTML = `<span>✕</span> Clear Block`;
                    clearBtn.onclick = (event) => {
                        event.stopPropagation();
                        globalBus.emit("block:update", {
                            row: rowIndex,
                            col: colIndex,
                            projectId: null,
                        });
                        this.closeAllMenus();
                    };
                    menu.appendChild(clearBtn);

                    this.state.getTypes().forEach((t) => {
                        const typeProjs = this.state.getProjectsByType(t.id);
                        if (typeProjs.length === 0) return;
                        const header = document.createElement("div");
                        header.className =
                            "text-[10px] font-bold text-gray-400 uppercase tracking-wider px-2 py-1 mt-1 border-t border-gray-100 pt-2";
                        header.innerText = t.name;
                        menu.appendChild(header);

                        typeProjs.forEach((p) => {
                            const btn = document.createElement("button");
                            btn.className =
                                "flex items-center justify-between p-2 w-full hover:bg-gray-100 rounded-lg transition text-left group/btn";
                            btn.innerHTML = `
                            <div class="flex items-center gap-3 overflow-hidden"><div class="w-4 h-4 rounded-full shadow-sm flex-shrink-0" style="background-color: ${p.color}"></div><span class="text-xs font-bold text-gray-700 truncate">${p.name}</span></div>
                            <div class="opacity-0 group-hover/btn:opacity-100 focus-visible:opacity-100 bg-indigo-50 text-indigo-700 font-bold px-2 py-1 rounded border border-indigo-100 text-[10px] fill-hour-btn shadow-sm transition" title="Fill entire hour">FILL HR</div>`;
                            btn.onclick = (event) => {
                                event.stopPropagation();
                                if (
                                    event.target.classList.contains(
                                        "fill-hour-btn",
                                    )
                                )
                                    globalBus.emit("schedule:fillRow", {
                                        row: rowIndex,
                                        projectId: p.id,
                                    });
                                else
                                    globalBus.emit("block:update", {
                                        row: rowIndex,
                                        col: colIndex,
                                        projectId: p.id,
                                    });
                                this.closeAllMenus();
                            };
                            menu.appendChild(btn);
                        });
                    });

                    document.body.appendChild(menu);
                    const rect = blockElement.getBoundingClientRect();
                    const menuHeight = menu.offsetHeight;
                    let top = rect.bottom + window.scrollY + 8;
                    let left =
                        rect.left + window.scrollX + rect.width / 2 - 100;
                    if (top + menuHeight > window.innerHeight + window.scrollY)
                        top = rect.top + window.scrollY - menuHeight - 8;
                    if (left < 10) left = 10;
                    if (left + 200 > window.innerWidth)
                        left = window.innerWidth - 210;
                    menu.style.top = `${top}px`;
                    menu.style.left = `${left}px`;
                    setTimeout(() => {
                        const firstBtn = menu.querySelector("button");
                        if (firstBtn) firstBtn.focus();
                    }, 50);
                }

                renderSettings() {
                    const list = document.getElementById("hierarchy-list");
                    list.innerHTML = "";
                    const types = this.state.getTypes();
                    const projects = this.state.getProjects();
                    types.forEach((t) => {
                        const typeProjs = projects.filter(
                            (p) => p.typeId === t.id,
                        );
                        const typeBlock = document.createElement("div");
                        typeBlock.className = "mb-8 pb-4";
                        typeBlock.draggable = true;
                        typeBlock.dataset.dragEntity = "type";
                        typeBlock.dataset.dragId = t.id;
                        typeBlock.dataset.dropZone = "true";
                        typeBlock.dataset.dropEntity = "type";
                        typeBlock.innerHTML = `
                            <div class="flex items-center justify-between mb-3 group/type border-b border-gray-200 pb-2">
                                <div class="flex items-center gap-2"><svg class="grab-handle w-5 h-5 text-gray-400" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="9" cy="12" r="1"/><circle cx="9" cy="5" r="1"/><circle cx="9" cy="19" r="1"/><circle cx="15" cy="12" r="1"/><circle cx="15" cy="5" r="1"/><circle cx="15" cy="19" r="1"/></svg><h4 class="text-sm font-black text-gray-900 uppercase tracking-widest" contenteditable="true" data-entity="type" data-id="${t.id}" title="Click to edit">${t.name}</h4><span class="text-xs text-gray-400 bg-gray-100 px-2 py-0.5 rounded-full">${typeProjs.length}</span></div>
                                <div class="flex gap-2 opacity-0 group-hover/type:opacity-100 transition"><button onclick="app.addProjectToType('${t.id}')" class="text-xs font-bold text-indigo-600 hover:bg-indigo-50 px-2 py-1 rounded border border-indigo-100">Add Project</button><button onclick="app.requestRemoveType('${t.id}')" class="text-xs font-bold text-red-500 hover:bg-red-50 px-2 py-1 rounded">Delete</button></div>
                            </div>
                            <div class="flex flex-col gap-2 pl-6 pb-4" id="proj-container-${t.id}" data-drop-zone="true" data-drop-entity="type-container" data-drop-id="${t.id}"></div>
                        `;
                        list.appendChild(typeBlock);
                        const projContainer = document.getElementById(
                            `proj-container-${t.id}`,
                        );
                        if (typeProjs.length === 0)
                            projContainer.innerHTML = `<div class="text-xs text-gray-400 italic py-3 pointer-events-none">Empty category. Drop projects here or click 'Add'.</div>`;
                        else {
                            typeProjs.forEach((p) => {
                                const pCard = document.createElement("div");
                                pCard.className =
                                    "flex items-center justify-between p-3 bg-white border border-gray-100 rounded-xl shadow-sm hover:shadow-md transition group/proj";
                                pCard.draggable = true;
                                pCard.dataset.dragEntity = "project";
                                pCard.dataset.dragId = p.id;
                                pCard.dataset.dropZone = "true";
                                pCard.dataset.dropEntity = "project";
                                pCard.innerHTML = `
                                    <div class="flex items-center gap-3 flex-1 overflow-hidden"><svg class="grab-handle w-5 h-5 text-gray-300 shrink-0" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><line x1="8" y1="6" x2="16" y2="6"/><line x1="8" y1="12" x2="16" y2="12"/><line x1="8" y1="18" x2="16" y2="18"/></svg><input type="color" data-entity="project-color" data-id="${p.id}" value="${p.color}" class="w-6 h-6 rounded-md cursor-pointer border-0 p-0 shadow-inner shrink-0 bg-transparent"/><span class="text-sm font-semibold text-gray-800 truncate" contenteditable="true" data-entity="project" data-id="${p.id}" title="Click to edit">${p.name}</span></div>
                                    <button onclick="app.removeProject('${p.id}')" class="opacity-0 group-hover/proj:opacity-100 text-red-400 hover:text-red-600 font-bold text-xs transition px-2 py-1">Remove</button>
                                `;
                                projContainer.appendChild(pCard);
                            });
                        }
                    });
                }

                toggleModal(modalId, show) {
                    const modal = document.getElementById(modalId);
                    const bg = modal;
                    const content = modal.querySelector(".modal-content");
                    if (show) {
                        modal.classList.remove("hidden");
                        bg.classList.remove("closing");
                        content.classList.remove("closing");
                    } else {
                        bg.classList.add("closing");
                        content.classList.add("closing");
                        setTimeout(() => {
                            modal.classList.add("hidden");
                            bg.classList.remove("closing");
                            content.classList.remove("closing");
                        }, 100);
                    }
                }

                showConfirm(typeId) {
                    const t = this.state
                        .getTypes()
                        .find((x) => x.id === typeId);
                    const projs = this.state.getProjectsByType(typeId);
                    document.getElementById("confirm-count").innerText =
                        projs.length;
                    document.getElementById("confirm-project-list").innerHTML =
                        projs.map((p) => `<li>${p.name}</li>`).join("");
                    document.getElementById("confirm-action-btn").onclick =
                        () => {
                            app.executeRemoveType(typeId);
                            this.toggleModal("confirm-modal", false);
                        };
                    this.toggleModal("confirm-modal", true);
                }
            }

            class AppController {
                constructor() {
                    this.state = new StateManager();
                    this.ui = new UIManager(this.state);
                    this.cmd = new CommandPalette(this, this.state);
                    this.setupLogicListeners();
                    this.state.ensureDateExists(this.state.getCurrentDate());
                    globalBus.emit("view:refresh");

                    // NEW: Set initial keyboard focus to first block on startup
                    setTimeout(() => {
                        const firstBlock =
                            document.querySelector(".schedule-block");
                        if (firstBlock) {
                            firstBlock.focus();
                            firstBlock.classList.add("js-focus");
                        }
                    }, 300);
                }

                setupLogicListeners() {
                    globalBus.on("block:update", ({ row, col, projectId }) => {
                        this.state.updateState((data) => {
                            const blocks =
                                data.schedules[data.currentDate].blocks;
                            if (projectId) blocks[`${row}-${col}`] = projectId;
                            else delete blocks[`${row}-${col}`];
                        });
                        globalBus.emit("block:updated", {
                            row,
                            col,
                            project: projectId
                                ? this.state.getProjectById(projectId)
                                : null,
                        });
                        globalBus.emit("analytics:refreshed");
                    });

                    globalBus.on("schedule:fillRow", ({ row, projectId }) => {
                        this.state.updateState((data) => {
                            const blocks =
                                data.schedules[data.currentDate].blocks;
                            for (let c = 0; c < 6; c++) {
                                if (projectId)
                                    blocks[`${row}-${c}`] = projectId;
                                else delete blocks[`${row}-${c}`];
                            }
                        });
                        globalBus.emit("schedule:refreshed");
                        globalBus.emit("analytics:refreshed");
                    });

                    globalBus.on(
                        "hierarchy:updateType",
                        ({ id, name, element }) => {
                            this.state.updateState((data) => {
                                const t = data.types.find((x) => x.id === id);
                                if (t) t.name = name;
                            });
                            element.classList.add("edit-success");
                            setTimeout(
                                () => element.classList.remove("edit-success"),
                                600,
                            );
                            Toast.show("Saved");
                            globalBus.emit("hierarchy:refreshed");
                        },
                    );
                    globalBus.on(
                        "hierarchy:updateProject",
                        ({ id, name, element }) => {
                            this.state.updateState((data) => {
                                const p = data.projects.find(
                                    (x) => x.id === id,
                                );
                                if (p) p.name = name;
                            });
                            element.classList.add("edit-success");
                            setTimeout(
                                () => element.classList.remove("edit-success"),
                                600,
                            );
                            Toast.show("Saved");
                            globalBus.emit("schedule:refreshed");
                            globalBus.emit("hierarchy:refreshed");
                        },
                    );
                    globalBus.on(
                        "hierarchy:updateProjectColor",
                        ({ id, color }) => {
                            this.state.updateState((data) => {
                                const p = data.projects.find(
                                    (x) => x.id === id,
                                );
                                if (p) p.color = color;
                            });
                            globalBus.emit("schedule:refreshed");
                            globalBus.emit("hierarchy:refreshed");
                        },
                    );
                    globalBus.on(
                        "hierarchy:reorderType",
                        ({ sourceId, targetId }) => {
                            if (sourceId === targetId) return;
                            this.state.updateState((data) => {
                                const arr = data.types;
                                const fromIdx = arr.findIndex(
                                    (t) => t.id === sourceId,
                                );
                                const toIdx = arr.findIndex(
                                    (t) => t.id === targetId,
                                );
                                const [item] = arr.splice(fromIdx, 1);
                                arr.splice(toIdx, 0, item);
                            });
                            globalBus.emit("hierarchy:refreshed");
                        },
                    );
                    globalBus.on(
                        "hierarchy:reorderProject",
                        ({ sourceId, targetId }) => {
                            if (sourceId === targetId) return;
                            this.state.updateState((data) => {
                                const arr = data.projects;
                                const fromIdx = arr.findIndex(
                                    (p) => p.id === sourceId,
                                );
                                const toIdx = arr.findIndex(
                                    (p) => p.id === targetId,
                                );
                                const targetType = arr[toIdx].typeId;
                                const [item] = arr.splice(fromIdx, 1);
                                item.typeId = targetType;
                                arr.splice(toIdx, 0, item);
                            });
                            globalBus.emit("hierarchy:refreshed");
                        },
                    );
                    globalBus.on(
                        "hierarchy:moveProjectToType",
                        ({ projectId, typeId }) => {
                            this.state.updateState((data) => {
                                const p = data.projects.find(
                                    (x) => x.id === projectId,
                                );
                                if (p) p.typeId = typeId;
                            });
                            globalBus.emit("hierarchy:refreshed");
                        },
                    );
                }

                toggleSidebar() {
                    const sidebar = document.getElementById("app-sidebar");
                    sidebar.classList.toggle("sidebar-collapsed");
                    const burger = document.getElementById("icon-burger");
                    const arrow = document.getElementById("icon-arrow");
                    if (sidebar.classList.contains("sidebar-collapsed")) {
                        burger.style.opacity = "0";
                        burger.style.transform = "rotate(90deg)";
                        arrow.style.opacity = "1";
                        arrow.style.transform = "rotate(0deg)";
                    } else {
                        burger.style.opacity = "1";
                        burger.style.transform = "rotate(0deg)";
                        arrow.style.opacity = "0";
                        arrow.style.transform = "rotate(-90deg)";
                    }
                }

                togglePaintMode(projectId) {
                    if (this.state.paintProjectId === projectId) {
                        this.state.paintProjectId = null;
                        Toast.show("Exited Paint Mode");
                    } else {
                        this.state.paintProjectId = projectId;
                        Toast.show("Paint Mode Active. Drag to fill.");
                    }
                    globalBus.emit("hierarchy:refreshed");
                }

                // --- NEW DATE/SCHEDULING ACTIONS FOR COMMANDS ---
                shiftMonth(dir) {
                    let m = this.state.viewMonth + dir;
                    let y = this.state.viewYear;
                    if (m < 0) {
                        m = 11;
                        y--;
                    } else if (m > 11) {
                        m = 0;
                        y++;
                    }
                    this.state.viewMonth = m;
                    this.state.viewYear = y;
                    this.ui.renderCalendar();
                }

                shiftDate(days) {
                    const curr = new Date(
                        this.state.getCurrentDate() + "T00:00:00",
                    );
                    curr.setDate(curr.getDate() + days);
                    const localISOTime = new Date(
                        curr.getTime() - curr.getTimezoneOffset() * 60000,
                    )
                        .toISOString()
                        .split("T")[0];
                    this.state.viewMonth = curr.getMonth();
                    this.state.viewYear = curr.getFullYear();
                    this.selectDate(localISOTime);
                }

                clearDay() {
                    this.state.updateState((data) => {
                        data.schedules[data.currentDate] = { blocks: {} };
                    });
                    globalBus.emit("schedule:refreshed");
                    globalBus.emit("analytics:refreshed");
                    Toast.show("Day cleared");
                }

                fillDay(projectId) {
                    this.state.updateState((data) => {
                        const blocks = {};
                        for (let r = 0; r < 17; r++) {
                            for (let c = 0; c < 6; c++)
                                blocks[`${r}-${c}`] = projectId;
                        }
                        data.schedules[data.currentDate] = { blocks };
                    });
                    globalBus.emit("schedule:refreshed");
                    globalBus.emit("analytics:refreshed");
                    Toast.show("Day filled");
                }

                pasteDay(scheduleObj) {
                    this.state.updateState((data) => {
                        data.schedules[data.currentDate] = JSON.parse(
                            JSON.stringify(scheduleObj),
                        );
                    });
                    globalBus.emit("schedule:refreshed");
                    globalBus.emit("analytics:refreshed");
                    Toast.show("Schedule pasted");
                }

                goToToday() {
                    const today = new Date();
                    const offset = today.getTimezoneOffset() * 60000;
                    this.state.viewMonth = today.getMonth();
                    this.state.viewYear = today.getFullYear();
                    this.selectDate(
                        new Date(today - offset).toISOString().split("T")[0],
                    );
                }

                selectDate(dateStr) {
                    this.state.updateState((data) => {
                        data.currentDate = dateStr;
                    });
                    this.state.ensureDateExists(dateStr);
                    globalBus.emit("view:refresh");
                }

                openSettingsModal() {
                    this.ui.renderSettings();
                    this.ui.toggleModal("settings-modal", true);
                }
                closeSettingsModal() {
                    this.ui.toggleModal("settings-modal", false);
                }

                addType() {
                    const input = document.getElementById("new-type-name");
                    const name = input.value.trim();
                    if (!name) return;
                    if (
                        this.state
                            .getTypes()
                            .some(
                                (t) =>
                                    t.name.toLowerCase() === name.toLowerCase(),
                            )
                    ) {
                        Toast.show(
                            `Category "${name}" already exists!`,
                            "error",
                        );
                        return;
                    }
                    this.state.updateState((data) => {
                        data.types.push({ id: "t_" + Date.now(), name });
                    });
                    input.value = "";
                    Toast.show(`Added ${name}`);
                    globalBus.emit("hierarchy:refreshed");
                }

                requestRemoveType(id) {
                    const projectsLinked = this.state.getProjectsByType(id);
                    if (projectsLinked.length > 0) this.ui.showConfirm(id);
                    else this.executeRemoveType(id);
                }

                cancelConfirm() {
                    this.ui.toggleModal("confirm-modal", false);
                }

                executeRemoveType(id) {
                    this.state.updateState((data) => {
                        data.types = data.types.filter((t) => t.id !== id);
                        const toDeleteIds = this.state
                            .getProjectsByType(id)
                            .map((p) => p.id);
                        data.projects = data.projects.filter(
                            (p) => !toDeleteIds.includes(p.id),
                        );
                        for (let date in data.schedules) {
                            const blocks = data.schedules[date].blocks;
                            for (let key in blocks)
                                if (toDeleteIds.includes(blocks[key]))
                                    delete blocks[key];
                        }
                    });
                    Toast.show("Category deleted");
                    globalBus.emit("view:refresh");
                    this.ui.renderSettings();
                }

                addProjectToType(typeId) {
                    const baseName = "New Project";
                    let newName = baseName;
                    let counter = 1;
                    while (
                        this.state.getProjects().some((p) => p.name === newName)
                    ) {
                        newName = `${baseName} ${counter}`;
                        counter++;
                    }
                    const randomHex =
                        "#" +
                        Math.floor(Math.random() * 16777215)
                            .toString(16)
                            .padStart(6, "0");
                    this.state.updateState((data) => {
                        data.projects.push({
                            id: "p_" + Date.now(),
                            name: newName,
                            color: randomHex,
                            typeId: typeId,
                        });
                    });
                    Toast.show("Added new project");
                    globalBus.emit("hierarchy:refreshed");
                }

                removeProject(id) {
                    this.state.updateState((data) => {
                        data.projects = data.projects.filter(
                            (p) => p.id !== id,
                        );
                        for (let date in data.schedules) {
                            const blocks = data.schedules[date].blocks;
                            for (let key in blocks)
                                if (blocks[key] === id) delete blocks[key];
                        }
                    });
                    Toast.show("Project removed");
                    globalBus.emit("view:refresh");
                    this.ui.renderSettings();
                }
            }

            window.app = new AppController();
        </script>
    </body>
</html>
